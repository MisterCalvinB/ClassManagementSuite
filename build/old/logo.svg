<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <filter id="shadow" x="-15%" y="-15%" width="145%" height="150%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.22"/>
    </filter>
    <clipPath id="tile-clip">
      <rect x="6" y="6" width="108" height="108" rx="18"/>
    </clipPath>
  </defs>

  <!-- Background tile with shadow -->
  <rect x="6" y="6" width="108" height="108" rx="18" fill="white" filter="url(#shadow)"/>
  <rect x="6" y="6" width="108" height="108" rx="18" fill="white" stroke="#111" stroke-width="2"/>

  <!-- Subtle green accent strip at very bottom of tile -->
  <rect x="6" y="96" width="108" height="18" rx="0" fill="#2d6a4f" clip-path="url(#tile-clip)"/>
  <!-- Bottom rounded corners to match the tile -->
  <rect x="6" y="96" width="108" height="10" fill="#2d6a4f" clip-path="url(#tile-clip)"/>

  <!-- Mortarboard diamond (solid black) -->
  <polygon points="60,16 92,33 60,50 28,33" fill="#111"/>
  <!-- White highlight on top-right face of diamond -->
  <line x1="60" y1="16" x2="92" y2="33" stroke="white" stroke-width="2" stroke-opacity="0.35" stroke-linecap="round"/>

  <!-- Cap brim (dark green) -->
  <rect x="44" y="49" width="32" height="10" rx="2" fill="#2d6a4f"/>
  <!-- White shine on brim -->
  <line x1="47" y1="52.5" x2="72" y2="52.5" stroke="white" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>

  <!-- Tassel: line from right corner of diamond -->
  <line x1="92" y1="33" x2="92" y2="60" stroke="#2d6a4f" stroke-width="3" stroke-linecap="round"/>
  <!-- Tassel knot -->
  <circle cx="92" cy="64" r="4.5" fill="#2d6a4f"/>
  <circle cx="92" cy="64" r="1.8" fill="white" fill-opacity="0.5"/>

  <!-- Roster list -->
  <!-- Row 1 -->
  <circle cx="24" cy="72" r="4.5" fill="#2d6a4f"/>
  <circle cx="24" cy="72" r="1.8" fill="white" fill-opacity="0.5"/>
  <rect x="34" y="68.5" width="32" height="7" rx="3.5" fill="#111"/>

  <!-- Row 2 -->
  <circle cx="24" cy="84" r="4.5" fill="#2d6a4f"/>
  <circle cx="24" cy="84" r="1.8" fill="white" fill-opacity="0.5"/>
  <rect x="34" y="80.5" width="44" height="7" rx="3.5" fill="#111"/>

  <!-- Row 3 - on the green strip, white bars instead -->
  <circle cx="24" cy="100" r="4.5" fill="white"/>
  <circle cx="24" cy="100" r="1.8" fill="#2d6a4f"/>
  <rect x="34" y="96.5" width="28" height="7" rx="3.5" fill="white"/>

</svg>
