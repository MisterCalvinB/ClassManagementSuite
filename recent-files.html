<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recent Files</title>
  <script src="electron-bridge.js"></script>
  <script src="i18n.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #fff;
      color: #000;
      min-height: 100vh;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    /* ── Back link ──────────────────────────────────────── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.88rem;
      font-weight: 700;
      color: #000;
      text-decoration: none;
      margin-bottom: 28px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
    }
    .back-link:hover { text-decoration: underline; }

    /* ── Page title ─────────────────────────────────────── */
    .page-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 4px; }
    .page-subtitle { font-size: 0.9rem; font-weight: 600; color: #000; margin-bottom: 32px; }

    /* ── Toolbar ────────────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .toolbar input[type="search"] {
      flex: 1;
      min-width: 160px;
      border: 2px solid #000;
      border-radius: 6px;
      padding: 7px 11px;
      font-family: inherit;
      font-size: 0.88rem;
      color: #000;
      background: #fff;
    }
    .toolbar input[type="search"]:focus { outline: none; box-shadow: 2px 2px 0 #000; }
    .toolbar select {
      border: 2px solid #000;
      border-radius: 6px;
      padding: 7px 11px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      color: #000;
      background: #fff;
      cursor: pointer;
    }
    .toolbar select:focus { outline: none; box-shadow: 2px 2px 0 #000; }
    .result-count {
      font-size: 0.83rem;
      font-weight: 700;
      color: #000;
      margin-left: auto;
      white-space: nowrap;
    }

    /* ── File list ──────────────────────────────────────── */
    .file-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .file-row {
      background: #fff;
      border: 2px solid #000;
      border-radius: 8px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: box-shadow 0.1s, transform 0.1s;
    }
    .file-row:hover {
      box-shadow: 3px 3px 0 #000;
      transform: translate(-1px, -1px);
    }

    .file-type-tag {
      flex-shrink: 0;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 7px;
      border-radius: 4px;
      border: 1.5px solid #000;
      background: #fff;
      color: #000;
      white-space: nowrap;
    }

    /* ── Section heading ────────────────────────────────────*/
    .section-heading {
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #000;
      margin-top: 36px;
      margin-bottom: 12px;
    }

    .file-info { flex: 1; min-width: 0; }
    .file-name {
      font-size: 0.93rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .file-meta { font-size: 0.78rem; font-weight: 600; color: #000; }

    .open-btn {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 6px;
      border: 2px solid #000;
      background: #000;
      color: #fff;
      font-family: inherit;
      font-size: 0.84rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s, color 0.1s;
    }
    .open-btn:hover { background: #fff; color: #000; }

    /* ── Empty / loading states ─────────────────────────── */
    .state-msg {
      text-align: center;
      padding: 48px 24px;
      color: #000;
      font-size: 0.93rem;
      font-weight: 600;
      background: #fff;
      border: 2px solid #000;
      border-radius: 10px;
    }
    .state-msg .state-icon { font-size: 2.5rem; margin-bottom: 12px; display: block; }
  </style>
</head>
<body>
<div class="page">

  <button class="back-link" id="backBtn" data-i18n="btnBack">← Back to Launcher</button>

  <h1 class="page-title" data-i18n="rfTitle">Recent Files</h1>
  <p class="page-subtitle" data-i18n="rfSubtitle">Board sessions and constellation maps saved to your data folder.</p>

  <div class="toolbar">
    <input type="search" id="searchBox" placeholder="Search files…" data-i18n-placeholder="rfSearchPlaceholder">
    <select id="typeFilter">
      <option value="all" data-i18n="rfFilterAll">All types</option>
      <optgroup label="Session files" data-i18n-label="rfFilterSessions">
        <option value="mindmaps" data-i18n="rfFilterMindmaps">Constellation maps</option>
      </optgroup>
      <optgroup label="Documents" data-i18n-label="rfFilterDocs">
        <option value="pdf">PDF</option>
        <option value="image">Image</option>
        <option value="sound">Sound</option>
        <option value="book">Book</option>
      </optgroup>
    </select>
    <select id="sortOrder">
      <option value="date-desc" data-i18n="rfSortNewest">Newest first</option>
      <option value="date-asc" data-i18n="rfSortOldest">Oldest first</option>
      <option value="name-asc" data-i18n="rfSortNameAZ">Name A→Z</option>
      <option value="name-desc" data-i18n="rfSortNameZA">Name Z→A</option>
      <option value="size-desc" data-i18n="rfSortLargest">Largest first</option>
    </select>
    <span class="result-count" id="resultCount"></span>
  </div>

  <div class="file-list" id="fileList">
    <div class="state-msg"><span class="state-icon">⏳</span><span data-i18n="rfLoading">Loading files…</span></div>
  </div>

  <h2 class="section-heading" id="docsHeading" style="display:none" data-i18n="rfDocsHeading">Added Documents</h2>
  <div class="file-list" id="docsList"></div>

</div>

<script>

  var allFiles = [];
  var allDocs  = [];

  var TYPE_INFO = {
    mindmaps: { label: 'Constellation', cssClass: 'constellation' }
  };

  function goBack() {
    if (window.parent !== window) {
      window.parent.postMessage('cmt-close-modal', '*');
      return;
    }
    if (window.Desktop && Desktop.isElectron()) {
      window.close();
    } else {
      window.location.href = 'launcher.html';
    }
  }

  document.getElementById('backBtn').addEventListener('click', goBack);

  function formatDate(ms) {
    if (!ms) return '—';
    var d = new Date(ms);
    return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }) +
           ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
  }

  function prettyName(filename) {
    return filename
      .replace(/\.(js|json)$/i, '')
      .replace(/_/g, ' ')
      .replace(/-Autosave$/, ' (autosave)')
      .trim();
  }

  function openFile(target, filename, relativePath) {
    if (!window.Desktop || !Desktop.isElectron()) {
      alert(typeof t === 'function' ? t('rfElectronRequired') : 'Opening files requires the Electron desktop app.');
      return;
    }
    Desktop.openTool('board.html', {
      query: { openSession: '1', openTarget: target, openFilename: filename, openRelPath: relativePath || filename }
    });
  }

  function fileDateMs(f) {
    return f.savedAt || f.createdAt || f.mtimeMs || 0;
  }

  function getSortFn(order) {
    switch (order) {
      case 'date-asc':
        return function (a, b) { return fileDateMs(a) - fileDateMs(b); };
      case 'name-asc':
        return function (a, b) { return prettyName(a.filename).localeCompare(prettyName(b.filename)); };
      case 'name-desc':
        return function (a, b) { return prettyName(b.filename).localeCompare(prettyName(a.filename)); };
      case 'size-desc':
        return function (a, b) { return (b.size || 0) - (a.size || 0); };
      default: // date-desc
        return function (a, b) { return fileDateMs(b) - fileDateMs(a); };
    }
  }

  function renderFiles(files) {
    var list = document.getElementById('fileList');

    if (files.length === 0) {
      list.innerHTML = '<div class="state-msg"><span class="state-icon">📭</span>' + (typeof t === 'function' ? t('rfNoFiles') : 'No files found.') + '</div>';
      return;
    }

    list.innerHTML = '';
    files.forEach(function (f) {
      var info = TYPE_INFO[f.target] || { label: f.target, cssClass: '' };
      var row = document.createElement('div');
      row.className = 'file-row';

      var tag = document.createElement('span');
      tag.className = 'file-type-tag ' + info.cssClass;
      tag.textContent = info.label;

      var fileInfo = document.createElement('div');
      fileInfo.className = 'file-info';

      var name = document.createElement('div');
      name.className = 'file-name';
      name.textContent = prettyName(f.filename);
      name.title = f.filename;

      var meta = document.createElement('div');
      meta.className = 'file-meta';
      var sizeKb = f.size ? (f.size / 1024).toFixed(1) + ' KB' : '';
      meta.textContent = formatDate(fileDateMs(f)) + (sizeKb ? ' · ' + sizeKb : '');

      fileInfo.appendChild(name);
      fileInfo.appendChild(meta);

      var btn = document.createElement('button');
      btn.className = 'open-btn';
      btn.textContent = typeof t === 'function' ? t('rfOpenInBoard') : 'Open in Board ↗';
      (function (target, filename, relPath) {
        btn.addEventListener('click', function () { openFile(target, filename, relPath); });
      })(f.target, f.filename, f.relativePath);

      row.appendChild(tag);
      row.appendChild(fileInfo);
      row.appendChild(btn);
      list.appendChild(row);
    });
  }

  function renderDocs(files) {
    var docsHeading = document.getElementById('docsHeading');
    var docsList    = document.getElementById('docsList');

    if (files.length === 0) {
      docsHeading.style.display = 'none';
      docsList.innerHTML = '';
      return;
    }

    docsHeading.style.display = '';
    docsList.innerHTML = '';

    files.forEach(function (f) {
      var info = docTypeInfo(f.filename);

      var row = document.createElement('div');
      row.className = 'file-row';

      var tag = document.createElement('span');
      tag.className = 'file-type-tag ' + info.cssClass;
      tag.textContent = info.label;

      var fileInfo = document.createElement('div');
      fileInfo.className = 'file-info';

      var name = document.createElement('div');
      name.className = 'file-name';
      name.textContent = f.filename;
      name.title = f.relativePath || f.filename;

      var meta = document.createElement('div');
      meta.className = 'file-meta';
      var sizeKb = f.size ? (f.size / 1024).toFixed(1) + ' KB' : '';
      meta.textContent = formatDate(f.mtimeMs) + (sizeKb ? ' · ' + sizeKb : '');

      fileInfo.appendChild(name);
      fileInfo.appendChild(meta);
      row.appendChild(tag);
      row.appendChild(fileInfo);
      docsList.appendChild(row);
    });
  }

  var SESSION_TYPES = ['mindmaps'];
  var DOC_TYPE_FILTERS = ['pdf', 'image', 'sound', 'book'];

  function applyFilters() {
    var filter = document.getElementById('typeFilter').value;
    var search = document.getElementById('searchBox').value.trim().toLowerCase();
    var sort   = document.getElementById('sortOrder').value;

    var isDocFilter     = DOC_TYPE_FILTERS.indexOf(filter) !== -1;
    var isSessionFilter = SESSION_TYPES.indexOf(filter) !== -1;

    var filteredFiles = isDocFilter ? [] : allFiles.filter(function (f) {
      if (isSessionFilter && f.target !== filter) return false;
      if (search && prettyName(f.filename).toLowerCase().indexOf(search) === -1) return false;
      return true;
    });
    filteredFiles.sort(getSortFn(sort));
    renderFiles(filteredFiles);

    var filteredDocs = isSessionFilter ? [] : allDocs.filter(function (f) {
      if (isDocFilter && docTypeInfo(f.filename).cssClass !== filter) return false;
      if (search && f.filename.toLowerCase().indexOf(search) === -1) return false;
      return true;
    });
    filteredDocs.sort(getSortFn(sort));
    renderDocs(filteredDocs);

    var total = filteredFiles.length + filteredDocs.length;
    var fileWord = typeof t === 'function' ? (total === 1 ? t('rfFile') : t('rfFiles')) : (total === 1 ? 'file' : 'files');
    document.getElementById('resultCount').textContent = total + ' ' + fileWord;
  }

  document.getElementById('typeFilter').addEventListener('change', applyFilters);
  document.getElementById('sortOrder').addEventListener('change', applyFilters);
  document.getElementById('searchBox').addEventListener('input', applyFilters);

  async function loadFiles() {
    var list = document.getElementById('fileList');

    if (!window.Desktop || !Desktop.isElectron()) {
      list.innerHTML = '<div class="state-msg"><span class="state-icon">⚠</span>' + (typeof t === 'function' ? t('rfElectronRequiredPage') : 'This page requires the Electron desktop app.') + '</div>';
      return;
    }

    var targets = ['mindmaps'];
    var gathered = [];

    try {
      for (var i = 0; i < targets.length; i++) {
        var target = targets[i];
        try {
          var res = await Desktop.listByPath(target, '', {
            extensions: ['.js', '.json'],
            recursive: true
          });
          if (res && res.ok && Array.isArray(res.files)) {
            res.files.forEach(function (f) {
              var relPath = (f.relativePath || f.filename || '').replace(/\\/g, '/');
              if (relPath.split('/').indexOf('archived') !== -1) return;
              gathered.push(Object.assign({}, f, { target: target }));
            });
          }
        } catch (e) {
          console.warn('Could not list ' + target + ':', e);
        }
      }

      allFiles = gathered;
    } catch (e) {
      list.innerHTML = '<div class="state-msg"><span class="state-icon">⚠</span>' + (typeof t === 'function' ? t('rfErrLoading') : 'Error loading files:') + ' ' + escHtml(e.message || String(e)) + '</div>';
    }
  }

  function escHtml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  var IMAGE_EXTS = ['.png', '.jpg', '.jpeg', '.gif', '.webp', '.svg'];
  var SOUND_EXTS = ['.mp3', '.wav', '.ogg', '.m4a', '.aac'];
  var DOC_EXTS   = IMAGE_EXTS.concat(SOUND_EXTS, ['.pdf', '.epub']);

  function docTypeInfo(filename) {
    var ext = '.' + (filename || '').split('.').pop().toLowerCase();
    if (IMAGE_EXTS.indexOf(ext) !== -1) return { label: 'Image', cssClass: 'image' };
    if (SOUND_EXTS.indexOf(ext) !== -1) return { label: 'Sound', cssClass: 'sound' };
    if (ext === '.pdf')  return { label: 'PDF',  cssClass: 'pdf' };
    if (ext === '.epub') return { label: 'Book', cssClass: 'book' };
    return { label: ext.slice(1).toUpperCase(), cssClass: '' };
  }

  async function loadDocs() {
    if (!window.Desktop || !Desktop.isElectron()) return;

    try {
      var res = await Desktop.listByPath('user', 'custom-data', {
        extensions: DOC_EXTS,
        recursive: true
      });

      if (!res || !res.ok || !Array.isArray(res.files)) return;

      allDocs = res.files.filter(function (f) {
        var rel = (f.relativePath || f.filename || '').replace(/\\/g, '/');
        return rel.split('/').indexOf('archived') === -1;
      });
    } catch (e) {
      console.warn('Could not load added documents:', e);
    }
  }

  document.addEventListener('DOMContentLoaded', function () {
    if (typeof applyTranslations === 'function') applyTranslations();
    Promise.all([loadFiles(), loadDocs()]).then(applyFilters, applyFilters);
  });
</script>
</body>
</html>
