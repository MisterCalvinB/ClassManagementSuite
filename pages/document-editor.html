<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Editor</title>
  <link rel="stylesheet" href="../modules/katex/dist/katex.min.css">
  <link rel="stylesheet" href="../modules/lexend/lexend.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f4f4f4;
      color: #111;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Nav ───────────────────────────────────────────── */
    #app-nav {
      background: #111;
      color: #fff;
      padding: 0 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      height: 44px;
      flex-shrink: 0;
      font-size: .82rem;
      font-weight: 600;
    }
    .nav-brand {
      font-weight: 900;
      font-size: .9rem;
      letter-spacing: .5px;
      text-transform: uppercase;
      margin-right: 6px;
      white-space: nowrap;
    }
    .nav-sep { width: 1px; height: 22px; background: #444; margin: 0 4px; flex-shrink: 0; }
    .nav-btn {
      background: none;
      border: 1px solid #555;
      color: #ddd;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: .8rem;
      font-weight: 600;
      font-family: inherit;
      white-space: nowrap;
      transition: border-color .12s, color .12s;
    }
    .nav-btn:hover { border-color: #fff; color: #fff; }
    .nav-btn.nav-btn-primary { background: #fff; color: #111; border-color: #fff; }
    .nav-btn.nav-btn-primary:hover { background: #ddd; }
    #doc-name-indicator {
      margin-left: auto;
      font-size: .78rem;
      font-weight: 600;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }
    #doc-name-indicator.modified::after { content: ' *'; color: #f90; }

    #btn-doc-type {
      font-size: .7rem;
      font-weight: 700;
      padding: 2px 7px;
      border: 1.5px solid #888;
      border-radius: 4px;
      background: transparent;
      color: #ccc;
      cursor: pointer;
      font-family: monospace;
      flex-shrink: 0;
      transition: border-color .12s, color .12s;
    }
    #btn-doc-type:hover { border-color: #fff; color: #fff; }
    #btn-doc-type.html-mode { border-color: #f07; color: #f07; }

    #main-hm-wrap { margin-left: 0; }

    /* ── Nav hover groups ──────────────────────────────── */
    .nav-group { position: relative; display: flex; align-items: center; }
    .nav-group-popup {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      min-width: 190px;
      background: #1e1e1e;
      border: 1px solid #444;
      border-top: none;
      border-radius: 0 0 6px 6px;
      padding: 4px 0;
      z-index: 8000;
      box-shadow: 0 6px 20px rgba(0,0,0,.5);
    }
    .nav-group:hover .nav-group-popup { display: block; }
    .nav-pop-item {
      display: block;
      width: 100%;
      padding: 7px 14px;
      background: none;
      border: none;
      color: #ccc;
      text-align: left;
      cursor: pointer;
      font-size: .8rem;
      font-family: inherit;
      font-weight: 500;
      white-space: nowrap;
      line-height: 1.4;
    }
    .nav-pop-item:hover { background: #2d2d2d; color: #fff; }
    .nav-pop-sep { border: none; border-top: 1px solid #333; margin: 4px 0; }
    .nav-pop-hint {
      float: right;
      margin-left: 20px;
      color: #666;
      font-size: .72rem;
      font-weight: 400;
    }

    /* ── Book import dropdown (inside Insert popup) ────── */
    #de-book-select {
      display: block;
      width: calc(100% - 16px);
      margin: 4px 8px 6px;
      background: #2a2a2a;
      color: #ccc;
      border: 1px solid #444;
      border-radius: 4px;
      font-size: .8rem;
      font-weight: 500;
      font-family: inherit;
      padding: 5px 7px;
      cursor: pointer;
    }
    #de-book-select:hover { border-color: #888; color: #fff; }

    /* ── Book text picker modal ────────────────────────── */
    #de-book-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 9000;
      align-items: center;
      justify-content: center;
    }
    #de-book-overlay.active { display: flex; }
    #de-book-modal {
      background: #fff;
      border-radius: 8px;
      width: 700px;
      max-width: 95vw;
      height: 72vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 40px rgba(0,0,0,.35);
      overflow: hidden;
    }
    #de-book-modal-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
      background: #fafafa;
    }
    #de-book-modal-title { font-weight: 700; flex: 1; font-size: .88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #de-book-modal-hint { font-size: .78rem; color: #888; white-space: nowrap; }
    #de-book-modal-insert {
      background: #111; color: #fff; border: none;
      border-radius: 4px; padding: 5px 14px; cursor: pointer;
      font-size: .82rem; font-weight: 700; font-family: inherit;
      white-space: nowrap;
    }
    #de-book-modal-insert:hover { background: #333; }
    #de-book-modal-insert:disabled { opacity: .35; cursor: default; }
    #de-book-modal-close {
      background: none; border: 1px solid #ccc; border-radius: 4px;
      padding: 4px 9px; font-size: .82rem; cursor: pointer; color: #555;
      font-family: inherit;
    }
    #de-book-modal-close:hover { border-color: #999; color: #111; }
    #de-book-modal-text {
      flex: 1; border: none; padding: 16px 18px; resize: none;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: .88rem; line-height: 1.7; outline: none;
      overflow-y: auto; white-space: pre-wrap; color: #111;
      background: #fff;
    }
    #de-book-modal-search-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-bottom: 1px solid #e0e0e0;
      background: #f5f5f5;
      flex-shrink: 0;
    }
    #de-book-search-input {
      flex: 1;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: .83rem;
      font-family: inherit;
      outline: none;
    }
    #de-book-search-input:focus { border-color: #555; }
    .de-book-search-nav {
      background: #fff; border: 1px solid #ccc; border-radius: 4px;
      padding: 3px 9px; cursor: pointer; font-size: .82rem;
      font-family: inherit; line-height: 1.4;
    }
    .de-book-search-nav:hover { border-color: #555; }
    .de-book-search-nav:disabled { opacity: .35; cursor: default; }
    #de-book-search-count { font-size: .78rem; color: #777; white-space: nowrap; min-width: 60px; }

    /* ── CSS Panel ─────────────────────────────────────── */
    #css-panel {
      background: #fff;
      border-bottom: 2px solid #ddd;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    #css-panel-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      flex-wrap: wrap;
      min-height: 44px;
    }
    .cp-label {
      font-size: .7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #666;
      white-space: nowrap;
    }
    .cp-sep { width: 1px; height: 20px; background: #ddd; margin: 0 2px; flex-shrink: 0; }
    .cp-btn {
      background: #fff;
      border: 1.5px solid #ccc;
      border-radius: 4px;
      padding: 3px 9px;
      font-size: .77rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      color: #333;
      transition: border-color .1s, background .1s;
    }
    .cp-btn:hover { border-color: #000; background: #f5f5f5; }
    .cp-btn.cp-btn-danger:hover { border-color: #c00; color: #c00; }
    #stylesheet-select {
      border: 1.5px solid #ccc;
      border-radius: 4px;
      padding: 3px 7px;
      font-family: inherit;
      font-size: .8rem;
      font-weight: 600;
      color: #333;
      background: #fff;
      cursor: pointer;
      max-width: 180px;
    }
    #stylesheet-select:focus { outline: none; border-color: #000; }
    #rule-selector, #rule-value {
      border: 1.5px solid #ccc;
      border-radius: 4px;
      padding: 3px 7px;
      font-family: inherit;
      font-size: .8rem;
      color: #333;
      background: #fff;
      transition: border-color .1s;
    }
    #rule-selector { width: 110px; }
    #rule-value { width: 120px; }
    #rule-selector:focus, #rule-value:focus { outline: none; border-color: #000; }
    #rule-property {
      border: 1.5px solid #ccc;
      border-radius: 4px;
      padding: 3px 7px;
      font-family: inherit;
      font-size: .8rem;
      font-weight: 600;
      color: #333;
      background: #fff;
      cursor: pointer;
      max-width: 150px;
    }
    #rule-property:focus { outline: none; border-color: #000; }
    #btn-toggle-css-editor {
      margin-left: auto;
      background: #f0f0f0;
      border: 1.5px solid #ccc;
      border-radius: 4px;
      padding: 3px 9px;
      font-size: .77rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      color: #555;
      transition: border-color .1s;
    }
    #btn-toggle-css-editor:hover { border-color: #000; color: #000; }
    #css-editor-wrapper {
      display: none;
      height: 160px;
      border-top: 1px solid #e0e0e0;
      flex-shrink: 0;
    }
    #css-editor-wrapper.visible { display: block; }
    #css-editor-container { width: 100%; height: 100%; }

    /* ── Main split ─────────────────────────────────────── */
    #main-split {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }
    #editor-pane {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 100px;
    }
    #md-editor-container { flex: 1; min-height: 0; }
    #split-divider {
      width: 5px;
      cursor: col-resize;
      background: #ddd;
      flex-shrink: 0;
      transition: background .1s;
      position: relative;
      z-index: 10;
    }
    #split-divider:hover, #split-divider.dragging { background: #999; }
    #preview-pane {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-width: 100px;
      background: #f0f0f0;
    }
    #preview-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0 0 40px;
    }

    /* ── Preview document styles ────────────────────────── */
    .doc-preview {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 40px;
      background: #fff;
      min-height: 100%;
      line-height: 1.65;
      color: #1a1a1a;
      font-size: 15px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .doc-preview h1 { font-size: 2em; font-weight: 800; margin: .67em 0 .4em; padding-bottom: .3em; border-bottom: 2px solid #eee; }
    .doc-preview h2 { font-size: 1.5em; font-weight: 700; margin: 1em 0 .4em; padding-bottom: .2em; border-bottom: 1px solid #eee; }
    .doc-preview h3 { font-size: 1.17em; font-weight: 700; margin: 1em 0 .4em; }
    .doc-preview h4 { font-size: 1em; font-weight: 700; margin: .8em 0 .3em; }
    .doc-preview h5, .doc-preview h6 { font-size: .9em; font-weight: 700; margin: .8em 0 .3em; color: #444; }
    .doc-preview p { margin: 0 0 1em; }
    .doc-preview ul, .doc-preview ol { padding-left: 2em; margin: 0 0 1em; }
    .doc-preview li { margin: .25em 0; }
    .doc-preview pre {
      background: #f6f8fa;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      padding: 16px;
      overflow-x: auto;
      margin: 0 0 1em;
      font-size: .88em;
    }
    .doc-preview code {
      background: rgba(27,31,35,.07);
      padding: 2px 5px;
      border-radius: 3px;
      font-size: .9em;
      font-family: 'Consolas', 'Courier New', monospace;
    }
    .doc-preview pre code { background: none; padding: 0; font-size: inherit; }
    .doc-preview blockquote {
      border-left: 4px solid #dfe2e5;
      padding: 2px 16px;
      color: #6a737d;
      margin: 0 0 1em;
    }
    .doc-preview table { border-collapse: collapse; width: 100%; margin: 0 0 1em; }
    .doc-preview th, .doc-preview td { border: 1px solid #dfe2e5; padding: 8px 13px; }
    .doc-preview th { background: #f6f8fa; font-weight: 700; }
    .doc-preview tr:nth-child(even) td { background: #fafbfc; }
    .doc-preview img { max-width: 100%; border-radius: 4px; }
    .doc-preview hr { border: none; border-top: 2px solid #eee; margin: 1.5em 0; }
    .doc-preview a { color: #0366d6; text-decoration: none; }
    .doc-preview a:hover { text-decoration: underline; }
    .math-display { margin: 1em 0; overflow-x: auto; text-align: center; }
    .math-error { color: #c00; font-size: .85em; }
    .render-error { color: #c00; background: #fff0f0; border: 1px solid #fcc; border-radius: 4px; padding: 8px 12px; }

    /* ── Full-page preview overlay ──────────────────────── */
    #full-preview-overlay {
      position: fixed;
      inset: 0;
      z-index: 3000;
      background: #d0d0d0;
      display: flex;
      flex-direction: column;
    }
    #full-preview-overlay[hidden] { display: none; }
    #full-preview-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #1a1a1a;
      color: #fff;
      flex-shrink: 0;
      font-size: .88rem;
      font-weight: 700;
    }
    #full-preview-bar-title { font-size: .9rem; letter-spacing: .03em; opacity: .85; }
    #btn-close-preview {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,.5);
      color: #fff;
      border-radius: 4px;
      padding: 4px 14px;
      font-family: inherit;
      font-size: .82rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .02em;
    }
    #btn-close-preview:hover { background: rgba(255,255,255,.15); border-color: #fff; }
    #full-preview-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 36px 16px 60px;
    }
    #full-preview-content.doc-preview {
      box-shadow: 0 4px 24px rgba(0,0,0,.18);
    }

    /* ── Presentation mode ──────────────────────────────── */
    #de-pres-view {
      display: none;
      position: fixed;
      inset: 0;
      background: #1a1a1a;
      flex-direction: column;
      z-index: 9000;
    }
    html.de-pres-mode #de-pres-view { display: flex; }
    html.de-pres-mode body > *:not(#de-pres-view) { display: none !important; }
    #de-pres-scroll {
      flex: 1;
      overflow-y: auto;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 24px 60px;
    }
    #de-pres-doc {
      background: #fff;
      box-shadow: 0 8px 40px rgba(0,0,0,.55);
    }

    /* Presentation active indicator in nav */
    #de-pres-status {
      display: none;
      align-items: center;
      gap: 7px;
    }
    .de-pres-active #de-pres-status { display: flex; }
    .de-pres-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e44;
      animation: de-pres-pulse 1.5s ease-in-out infinite;
    }
    @keyframes de-pres-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .25; }
    }
    .de-pres-label { color: #f88; font-size: .77rem; font-weight: 700; letter-spacing: .02em; }
    .de-pres-stop-btn {
      background: none;
      border: 1px solid #c44;
      color: #f77;
      padding: 3px 9px;
      border-radius: 4px;
      cursor: pointer;
      font-size: .77rem;
      font-weight: 700;
      font-family: inherit;
    }
    .de-pres-stop-btn:hover { background: rgba(200,50,50,.2); }

    /* ── Modals ─────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay[hidden] { display: none; }
    .modal-box {
      background: #fff;
      border: 2px solid #000;
      border-radius: 10px;
      box-shadow: 4px 4px 0 #000;
      min-width: 340px;
      max-width: 600px;
      width: 90vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-box.modal-narrow { max-width: 380px; }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 12px;
      border-bottom: 2px solid #000;
      flex-shrink: 0;
    }
    .modal-title { font-size: 1.05rem; font-weight: 800; }
    .modal-close-btn {
      background: #fff;
      border: 1.5px solid #000;
      border-radius: 5px;
      padding: 3px 9px;
      font-size: .88rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background .1s, color .1s;
    }
    .modal-close-btn:hover { background: #000; color: #fff; }
    .modal-body { padding: 16px 18px 18px; overflow-y: auto; flex: 1; }
    .modal-label {
      display: block;
      font-size: .72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 5px;
      color: #333;
    }
    .modal-input {
      width: 100%;
      border: 2px solid #000;
      border-radius: 5px;
      padding: 7px 10px;
      font-family: inherit;
      font-size: .9rem;
      color: #000;
      background: #fff;
      margin-bottom: 14px;
    }
    .modal-input:focus { outline: none; box-shadow: 2px 2px 0 #000; }
    .modal-actions { display: flex; gap: 8px; margin-top: 4px; }
    .modal-btn {
      flex: 1;
      padding: 8px 12px;
      border: 2px solid #000;
      border-radius: 6px;
      font-family: inherit;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      background: #000;
      color: #fff;
      transition: background .1s, color .1s;
    }
    .modal-btn:hover { background: #333; }
    .modal-btn.modal-btn-cancel { background: #fff; color: #000; }
    .modal-btn.modal-btn-cancel:hover { background: #f0f0f0; }
    .modal-empty {
      text-align: center;
      padding: 30px 20px;
      font-size: .9rem;
      color: #777;
      font-weight: 600;
    }
    .file-list { display: flex; flex-direction: column; gap: 6px; }
    .file-row {
      border: 2px solid #e0e0e0;
      border-radius: 7px;
      padding: 9px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: border-color .1s, box-shadow .1s;
    }
    .file-row:hover { border-color: #000; box-shadow: 2px 2px 0 #000; }
    .file-row-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .file-row-name {
      font-size: .88rem;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .file-row-path {
      font-size: .74rem;
      color: #888;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .file-row-btn {
      flex-shrink: 0;
      background: #000;
      color: #fff;
      border: 2px solid #000;
      border-radius: 5px;
      padding: 4px 11px;
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background .1s, color .1s;
    }
    .file-row-btn:hover { background: #333; }
    .file-row-btn-outline { background: #fff; color: #000; }
    .file-row-btn-outline:hover { background: #f0f0f0; }
    .file-row-btn-del { background: #fff; color: #c00; border-color: #c00; }
    .file-row-btn-del:hover { background: #ffeaea; }
    .modal-toolbar { display: flex; gap: 8px; margin-bottom: 12px; }
    .modal-toolbar-btn {
      background: #fff;
      border: 2px solid #000;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: .82rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background .1s, color .1s;
    }
    .modal-toolbar-btn:hover { background: #000; color: #fff; }
    .modal-box-history { max-width: 580px; }
    #hist-preview-pane {
      margin-top: 12px;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: .78rem;
      font-family: 'Consolas', 'Courier New', monospace;
      color: #333;
      background: #f8f8f8;
      max-height: 160px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
    }
    #hist-preview-pane.visible { display: block; }


    /* ── Page Layout popup ──────────────────────────────── */
    #page-layout-wrap { position: relative; }
    #page-layout-popup {
      display: none;
      position: fixed;
      top: 44px;
      left: 0;
      background: #fff;
      border: 2px solid #000;
      border-radius: 9px;

    .pl-margin-cell { display: flex; flex-direction: column; align-items: center; gap: 2px; }

    .pl-margin-input {

      padding: 3px 5px; font-family: inherit; font-size: .8rem; text-align: right;
    }
    .pl-margin-input:focus { outline: none; border-color: #000; }
    .pl-margin-spacer { /* empty grid cell */ }
    .de-preview-footer {
      margin-top: 2.5em;
      padding-top: .6em;
      border-top: 1px solid #ddd;
      font-size: .82em;
      color: #777;
      font-style: italic;
    }

    /* ── Settings modal ─────────────────────────────────── */
    .stg-box { max-width: 680px; width: 95vw; max-height: 88vh; }
    .stg-tabs { display: flex; border-bottom: 2px solid #000; flex-shrink: 0; background: #f8f8f8; overflow-x: auto; }
    .stg-tab {
      padding: 9px 18px; border: none; background: none; font-family: inherit;
      font-size: .83rem; font-weight: 700; cursor: pointer; color: #777;
      border-bottom: 3px solid transparent; margin-bottom: -2px;
      transition: color .1s, border-color .1s; white-space: nowrap; flex-shrink: 0;
    }
    .stg-tab:hover { color: #000; }
    .stg-tab.active { color: #000; border-bottom-color: #000; }
    .stg-body { flex: 1; overflow-y: auto; padding: 14px 16px 18px; min-height: 200px; }
    .stg-toolbar { display: flex; gap: 8px; margin-bottom: 12px; }
    .stg-add-btn {
      background: #fff; border: 2px solid #000; border-radius: 6px;
      padding: 6px 14px; font-size: .82rem; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: background .1s, color .1s;
    }
    .stg-add-btn:hover { background: #000; color: #fff; }
    .stg-item-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border: 1.5px solid #e0e0e0;
      border-radius: 6px; margin-bottom: 6px; transition: border-color .1s;
    }
    .stg-item-row:hover { border-color: #bbb; }
    .stg-item-main { flex: 1; min-width: 0; }
    .stg-item-title { font-size: .88rem; font-weight: 700; }
    .stg-item-sub { font-size: .74rem; color: #777; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stg-badge {
      font-size: .64rem; font-weight: 800; text-transform: uppercase; letter-spacing: .4px;
      padding: 2px 7px; border-radius: 10px; flex-shrink: 0;
    }
    .stg-badge-completion { background: #deeeff; color: #0055bb; }
    .stg-badge-typed { background: #e0f4e0; color: #277027; }
    .stg-badge-both { background: #ede0ff; color: #5c1daa; }
    .stg-item-btn {
      flex-shrink: 0; padding: 3px 9px; border-radius: 4px; border: 1.5px solid;

    .stg-form {

    .stg-form-title {

    .stg-field { margin-bottom: 11px; }

      letter-spacing: .5px; color: #555; margin-bottom: 4px;
    }
    .stg-input {
      width: 100%; border: 1.5px solid #bbb; border-radius: 5px;
      padding: 6px 9px; font-family: inherit; font-size: .88rem;
      color: #000; background: #fff; transition: border-color .1s;
    }
    .stg-input:focus { outline: none; border-color: #000; }
    .stg-textarea {
      width: 100%; border: 1.5px solid #bbb; border-radius: 5px;
      padding: 6px 9px; font-family: 'Consolas', monospace; font-size: .84rem;

      transition: border-color .1s;
    }
    .stg-textarea:focus { outline: none; border-color: #000; }
    .stg-select {
      width: 100%; border: 1.5px solid #bbb; border-radius: 5px; padding: 6px 9px;
      font-family: inherit; font-size: .88rem; color: #333; background: #fff; cursor: pointer;
    }
    .stg-select:focus { outline: none; border-color: #000; }
    .stg-key-input { cursor: pointer; background: #f5f5f5; font-family: 'Consolas', monospace; }
    .stg-key-input:focus { background: #e8f0ff; border-color: #0060cc; outline: none; }
    .stg-radio-group { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 2px; }
    .stg-radio-label { display: flex; align-items: center; gap: 5px; font-size: .85rem; font-weight: 600; cursor: pointer; }
    .stg-form-row { display: flex; gap: 10px; }
    .stg-form-row .stg-field { flex: 1; }
    .stg-form-actions { display: flex; gap: 8px; margin-top: 14px; }
    .stg-btn {
      padding: 7px 16px; border: 2px solid #000; border-radius: 5px;
      font-family: inherit; font-size: .82rem; font-weight: 700;
      cursor: pointer; background: #000; color: #fff; transition: background .1s;
    }
    .stg-btn:hover { background: #333; }
    .stg-btn-cancel { background: #fff; color: #000; }
    .stg-btn-cancel:hover { background: #f0f0f0; }
    .stg-empty { text-align: center; padding: 28px 20px; color: #999; font-size: .88rem; font-weight: 600; }
    .stg-hint { font-size: .72rem; color: #888; margin-top: 5px; font-style: italic; }
    .stg-info {
      background: #f5f7fa; border-left: 3px solid #c0c8d4; border-radius: 0 5px 5px 0;
      padding: 9px 12px; margin-bottom: 14px; font-size: .78rem; color: #555; line-height: 1.6;
    }
    .stg-info strong { color: #222; }
    .stg-info code {
      background: #e8ecf0; border-radius: 3px; padding: 1px 4px;
      font-family: 'Consolas', monospace; font-size: .9em;
    }
    .prefs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 22px; }

    /* ── Table insert picker ──────────────────────────────── */
    #table-insert-wrap { position: relative; }
    #table-grid-popup {
      display: none;
      position: absolute;
      top: 0;
      left: 100%;
      background: #fff;
      border: 2px solid #000;
      border-radius: 9px;
      box-shadow: 4px 4px 0 rgba(0,0,0,.18);
      padding: 10px 10px 8px;
      z-index: 3000;
      user-select: none;
    }
    #table-insert-wrap.open #table-grid-popup { display: block; }
    .tg-grid {
      display: grid;
      grid-template-columns: repeat(6, 22px);
      gap: 3px;
      margin-bottom: 6px;
    }
    .tg-cell {
      width: 22px; height: 22px;
      border: 1.5px solid #ccc;
      border-radius: 3px;
      cursor: pointer;
      transition: border-color .08s, background .08s;
    }
    .tg-cell.active { border-color: #000; background: #e8eef8; }
    .tg-label {
      font-size: .72rem;
      font-weight: 700;
      color: #555;
      text-align: center;
    }

    /* ── Image drop overlay ───────────────────────────────── */
    #main-split { position: relative; }
    #img-drop-overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 4000;
      background: rgba(0, 80, 220, 0.07);
      border: 3px dashed #0050dc;
      border-radius: 4px;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .img-drop-msg {

      color: #fff;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      pointer-events: none;

<!-- ── Nav ──────────────────────────────────────────────── -->

      <button class="nav-pop-item" id="btn-save-all-doc">Save All <span class="nav-pop-hint">Ctrl+⇧S</span></button>

    <div id="de-book-modal-header">
      <span id="de-book-modal-title">📂 Book</span>
      <span id="de-book-modal-hint">Select text, then click Insert</span>

// ── Marked + KaTeX setup ─────────────────────────────────
function setupMarked() {
  marked.use({
    breaks: true,
    gfm: true,
    extensions: [
      {
        name: 'math-block',
        level: 'block',
        start(src) { return src.indexOf('$$'); },
        tokenizer(src) {
          const m = src.match(/^\$\$([\s\S]+?)\$\$/);
          if (m) return { type: 'math-block', raw: m[0], math: m[1].trim() };
        },
        renderer(token) {
          try {
            return '<div class="math-display">' +
              katex.renderToString(token.math, { displayMode: true, throwOnError: false }) +
              '</div>\n';
          } catch(e) {
            return '<div class="math-error">' + escHtml(String(e.message)) + '</div>\n';
          }
        }
      },
      {
        name: 'math-inline',
        level: 'inline',
        start(src) { return src.indexOf('$'); },
        tokenizer(src) {
          if (src.startsWith('$$')) return;
          const m = src.match(/^\$([^\$\n]+?)\$/);
          if (m) return { type: 'math-inline', raw: m[0], math: m[1] };
        },
        renderer(token) {
          try {
            return katex.renderToString(token.math, { displayMode: false, throwOnError: false });
          } catch(e) {
            return '<code>' + escHtml(token.math) + '</code>';
          }
        }
      }
    ]
  });
}

function setDocType(type) {
  currentDocType = type;
  if (mdEditor) monaco.editor.setModelLanguage(mdEditor.getModel(), type === 'html' ? 'html' : 'markdown');
  const btn = document.getElementById('btn-doc-type');

  renderPreview();
}

function renderPreview() {
  if (!mdEditor) return;
  try {
    const raw = mdEditor.getValue();
    const html = currentDocType === 'html' ? raw : marked.parse(raw);
    const container = document.getElementById('preview-content');
    container.innerHTML = html;
    fixPreviewImages(container);
  } catch(e) {
    document.getElementById('preview-content').innerHTML =
      '<div class="render-error">Render error: ' + escHtml(String(e.message)) + '</div>';

  updatePreviewFooter();

function scheduleRender() {

// ── Insert text at editor cursor ──────────────────────────
function insertTextAtCursor(text) {

  mdEditor.executeEdits('user-insert', [{ range: sel, text, forceMoveMarkers: true }]);
  mdEditor.focus();
}

// ── Book text import ─────────────────────────────────────
function deBookHtmlToText(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  tmp.querySelectorAll('p,div,br,h1,h2,h3,h4,h5,h6,li,tr,blockquote').forEach(el => {
    el.insertAdjacentText('afterend', '\n');
  });
  tmp.querySelectorAll('script,style,noscript').forEach(el => el.remove());
  return tmp.innerText
    .replace(/\r\n/g, '\n')
    .replace(/[ \t]+/g, ' ')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

function deZipParse(arrayBuffer) {
  const buf = new Uint8Array(arrayBuffer);
  const view = new DataView(arrayBuffer);
  const u16 = o => view.getUint16(o, true);
  const u32 = o => view.getUint32(o, true);
  let eocd = -1;
  for (let i = buf.length - 22; i >= Math.max(0, buf.length - 65558); i--) {
    if (u32(i) === 0x06054b50) { eocd = i; break; }
  }
  if (eocd === -1) throw new Error('Not a valid ZIP/EPUB file.');
  const cdOffset = u32(eocd + 16);
  const cdCount  = u16(eocd + 10);
  const entries = [];
  let pos = cdOffset;
  for (let i = 0; i < cdCount; i++) {
    if (u32(pos) !== 0x02014b50) break;
    const compMethod  = u16(pos + 10);
    const compSize    = u32(pos + 20);
    const nameLen     = u16(pos + 28);
    const extraLen    = u16(pos + 30);
    const commentLen  = u16(pos + 32);
    const localOffset = u32(pos + 42);
    const name        = new TextDecoder('utf-8').decode(buf.slice(pos + 46, pos + 46 + nameLen));
    entries.push({ name, compMethod, compSize, localOffset });
    pos += 46 + nameLen + extraLen + commentLen;
  }
  return { entries, buf, view, u16, u32 };
}

async function deDecompressDeflate(compressedBytes) {
  const ds = new DecompressionStream('deflate-raw');
  const writer = ds.writable.getWriter();
  const reader = ds.readable.getReader();
  writer.write(compressedBytes);
  writer.close();
  const chunks = [];
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  const total = chunks.reduce((s, c) => s + c.length, 0);
  const out = new Uint8Array(total);
  let off = 0;
  for (const c of chunks) { out.set(c, off); off += c.length; }
  return out;
}

async function deEpubExtractText(arrayBuffer) {
  const zip = deZipParse(arrayBuffer);
  const { buf, view, u16, u32 } = zip;
  async function extractBytes(entry) {
    const lh = entry.localOffset;
    const lNameLen  = u16(lh + 26);
    const lExtraLen = u16(lh + 28);
    const dataStart = lh + 30 + lNameLen + lExtraLen;
    const compressed = buf.slice(dataStart, dataStart + entry.compSize);
    if (entry.compMethod === 0) return compressed;
    if (entry.compMethod === 8) return await deDecompressDeflate(compressed);
    throw new Error('Unsupported compression: ' + entry.compMethod);
  }
  async function extractText(entry) {
    return new TextDecoder('utf-8').decode(await extractBytes(entry));
  }
  const containerEntry = zip.entries.find(e => e.name === 'META-INF/container.xml');
  let opfPath = null;
  if (containerEntry) {
    const m = (await extractText(containerEntry)).match(/full-path="([^"]+\.opf)"/i);
    if (m) opfPath = m[1];
  }
  let orderedHtmlEntries = [];
  if (opfPath) {
    const opfEntry = zip.entries.find(e => e.name === opfPath);
    if (opfEntry) {
      const opfXml = await extractText(opfEntry);
      const manifest = {};
      const opfDir = opfPath.includes('/') ? opfPath.slice(0, opfPath.lastIndexOf('/') + 1) : '';
      let mm;
      const manifestRe = /<item[^>]+id="([^"]+)"[^>]+href="([^"]+)"[^>]*>/gi;
      while ((mm = manifestRe.exec(opfXml)) !== null) manifest[mm[1]] = opfDir + mm[2];
      const spineRe = /<itemref[^>]+idref="([^"]+)"/gi;
      let sm;
      while ((sm = spineRe.exec(opfXml)) !== null) {
        const href = manifest[sm[1]];
        if (href) {
          const e = zip.entries.find(en => en.name === href || en.name === href.replace(/^\//, ''));
          if (e) orderedHtmlEntries.push(e);
        }
      }
    }
  }
  if (!orderedHtmlEntries.length) {
    orderedHtmlEntries = zip.entries.filter(e =>
      /\.(xhtml|html|htm)$/i.test(e.name) && !e.name.includes('toc') && !e.name.includes('nav')
    ).sort((a, b) => a.name.localeCompare(b.name));
  }
  const parts = [];
  for (const entry of orderedHtmlEntries) parts.push(deBookHtmlToText(await extractText(entry)));
  return parts.join('\n\n').replace(/\n{3,}/g, '\n\n').trim();
}

async function deBookPopulateDropdown() {
  const sel = document.getElementById('de-book-select');
  if (!sel) return;
  if (!(window.Desktop && Desktop.isElectron && Desktop.isElectron() && typeof Desktop.listFiles === 'function')) return;
  try {
    const result = await Desktop.listFiles('customBooks', { extensions: ['.epub', '.html', '.htm', '.xhtml', '.txt'] });
    const files = result && result.ok && Array.isArray(result.files) ? result.files : [];
    if (!files.length) return;
    files.forEach(file => {
      const opt = document.createElement('option');
      opt.value = file.relativePath || file.filename;
      opt.textContent = String(file.filename).replace(/\.(epub|html?|xhtml|txt)$/i, '');
      sel.appendChild(opt);
    });
    sel.style.display = '';
  } catch(e) {
    console.warn('Could not list customBooks:', e);
  }
}

async function deBookLoadSelected() {
  const sel = document.getElementById('de-book-select');
  if (!sel || !sel.value) return;
  const relativePath = sel.value;
  const label = sel.options[sel.selectedIndex].textContent;
  sel.disabled = true;
  try {
    const result = await Desktop.readByPath('customBooks', relativePath, { encoding: 'base64' });
    if (!result || !result.ok || !result.content) throw new Error(result && result.error ? result.error : 'Could not read file.');
    const binary = atob(result.content);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const lp = relativePath.toLowerCase();
    let text;
    if (lp.endsWith('.epub')) {
      text = await deEpubExtractText(bytes.buffer);
    } else {
      const rawText = new TextDecoder('utf-8').decode(bytes);
      text = (lp.endsWith('.html') || lp.endsWith('.htm') || lp.endsWith('.xhtml'))
        ? deBookHtmlToText(rawText)
        : rawText.trim();
    }
    if (!text) throw new Error('No readable text found.');
    deBookOpenModal(text, label);
  } catch(e) {
    showToast('Could not load book: ' + e.message, true);
  } finally {
    sel.disabled = false;
    sel.value = '';
  }
}

let _deBookSearchMatches = [];
let _deBookSearchIdx = -1;

function deBookOpenModal(text, label) {
  document.getElementById('de-book-modal-title').textContent = '📂 ' + label;
  const ta = document.getElementById('de-book-modal-text');
  ta.value = text;
  ta.onselect = ta.onmouseup = ta.onkeyup = deBookUpdateInsertBtn;
  ta.onkeydown = function(e) {
    if (e.key === 'Enter') { e.preventDefault(); deBookSearchStep(e.shiftKey ? -1 : 1); }
  };
  document.getElementById('de-book-modal-insert').disabled = true;
  document.getElementById('de-book-search-input').value = '';
  document.getElementById('de-book-search-count').textContent = '';
  document.getElementById('de-book-search-prev').disabled = true;
  document.getElementById('de-book-search-next').disabled = true;
  _deBookSearchMatches = [];
  _deBookSearchIdx = -1;
  document.getElementById('de-book-overlay').classList.add('active');
  document.getElementById('de-book-search-input').focus();
}

function deBookUpdateInsertBtn() {
  const ta = document.getElementById('de-book-modal-text');
  document.getElementById('de-book-modal-insert').disabled = ta.selectionStart === ta.selectionEnd;
}

function deBookSearchRun() {
  const query = document.getElementById('de-book-search-input').value;
  const ta = document.getElementById('de-book-modal-text');
  const countEl = document.getElementById('de-book-search-count');
  _deBookSearchMatches = [];
  _deBookSearchIdx = -1;
  if (!query) {
    countEl.textContent = '';
    document.getElementById('de-book-search-prev').disabled = true;
    document.getElementById('de-book-search-next').disabled = true;
    return;
  }
  const text = ta.value;
  const lower = text.toLowerCase();
  const q = query.toLowerCase();
  let pos = 0;
  while (true) {
    const idx = lower.indexOf(q, pos);
    if (idx === -1) break;
    _deBookSearchMatches.push(idx);
    pos = idx + 1;
  }
  const hasMatches = _deBookSearchMatches.length > 0;
  document.getElementById('de-book-search-prev').disabled = !hasMatches;
  document.getElementById('de-book-search-next').disabled = !hasMatches;
  if (hasMatches) {
    _deBookSearchIdx = 0;
    deBookSearchHighlight(query.length);
    countEl.textContent = _deBookSearchMatches.length + ' match' + (_deBookSearchMatches.length !== 1 ? 'es' : '') + ' — press Enter ↵';
  } else {
    countEl.textContent = 'No matches';
  }
}

function deBookSearchStep(dir) {
  if (!_deBookSearchMatches.length) return;
  _deBookSearchIdx = (_deBookSearchIdx + dir + _deBookSearchMatches.length) % _deBookSearchMatches.length;
  const query = document.getElementById('de-book-search-input').value;
  deBookSearchHighlight(query.length);
  document.getElementById('de-book-modal-text').focus();
}

function deBookScrollToPos(pos) {
  const ta = document.getElementById('de-book-modal-text');
  const style = window.getComputedStyle(ta);
  const mirror = document.createElement('div');
  mirror.style.cssText =
    'position:absolute;visibility:hidden;overflow:hidden;white-space:pre-wrap;word-wrap:break-word;' +
    'width:' + ta.clientWidth + 'px;' +
    'padding:' + style.padding + ';' +
    'font:' + style.font + ';' +
    'line-height:' + style.lineHeight + ';';
  mirror.textContent = ta.value.substring(0, pos);
  document.body.appendChild(mirror);
  const top = mirror.scrollHeight;
  document.body.removeChild(mirror);
  ta.scrollTop = Math.max(0, top - ta.clientHeight / 3);
}

function deBookSearchHighlight(len) {
  const ta = document.getElementById('de-book-modal-text');
  const start = _deBookSearchMatches[_deBookSearchIdx];
  ta.setSelectionRange(start, start + len);
  deBookScrollToPos(start);
  deBookUpdateInsertBtn();
  document.getElementById('de-book-search-count').textContent =
    (_deBookSearchIdx + 1) + ' / ' + _deBookSearchMatches.length;
}

function deBookSearchKey(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    deBookSearchStep(e.shiftKey ? -1 : 1);
  }
}

function deBookInsertSelection() {
  const ta = document.getElementById('de-book-modal-text');
  const selected = ta.value.substring(ta.selectionStart, ta.selectionEnd).trim();
  if (!selected) return;
  insertTextAtCursor(selected);
  deBookCloseModal();
  showToast('Text inserted');
}

function deBookCloseModal() {
  document.getElementById('de-book-overlay').classList.remove('active');
}

// ── Table insert ──────────────────────────────────────────
function insertTable(cols, rows) {
  const header = '| ' + Array.from({length: cols}, (_, i) => 'Col ' + (i + 1)).join(' | ') + ' |';
  const sep    = '| ' + Array.from({length: cols}, () => '---').join(' | ') + ' |';
  const row    = '| ' + Array.from({length: cols}, () => '   ').join(' | ') + ' |';
  const lines  = [header, sep, ...Array.from({length: rows}, () => row)];
  insertTextAtCursor('\n' + lines.join('\n') + '\n');
}

function initTablePicker() {
  const grid  = document.getElementById('tg-grid');
  const label = document.getElementById('tg-label');
  const COLS = 6, ROWS = 6;

  for (let r = 1; r <= ROWS; r++) {
    for (let c = 1; c <= COLS; c++) {
      const cell = document.createElement('span');
      cell.className = 'tg-cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      grid.appendChild(cell);
    }
  }

  grid.addEventListener('mousemove', function(e) {
    const cell = e.target.closest('.tg-cell');
    if (!cell) return;
    const hr = +cell.dataset.r, hc = +cell.dataset.c;
    label.textContent = hc + ' × ' + hr + ' table';
    grid.querySelectorAll('.tg-cell').forEach(el => {
      el.classList.toggle('active', +el.dataset.r <= hr && +el.dataset.c <= hc);
    });
  });

  grid.addEventListener('mouseleave', function() {
    grid.querySelectorAll('.tg-cell').forEach(el => el.classList.remove('active'));
    label.textContent = '—';
  });

  grid.addEventListener('click', function(e) {
    const cell = e.target.closest('.tg-cell');
    if (!cell) return;
    const rows = +cell.dataset.r, cols = +cell.dataset.c;
    document.getElementById('table-insert-wrap').classList.remove('open');
    insertTable(cols, rows);
  });
}

// ── Image insert ──────────────────────────────────────────
const IMAGE_MIME_MAP = {
  jpg: 'image/jpeg', jpeg: 'image/jpeg', png: 'image/png',
  gif: 'image/gif', webp: 'image/webp', svg: 'image/svg+xml',
  bmp: 'image/bmp', avif: 'image/avif'
};

async function fixPreviewImages(container) {
  if (!window.Desktop || !Desktop.isElectron()) return;
  const imgs = container.querySelectorAll('img[src]');
  await Promise.all([...imgs].map(async (img) => {
    const src = img.getAttribute('src');
    if (!src || src.startsWith('data:') || src.startsWith('http://') ||
        src.startsWith('https://') || src.startsWith('//')) return;
    const filename = decodeURIComponent(src.replace(/\?.*$/, '').split('/').pop());
    if (!filename) return;
    try {
      const r = await Desktop.readByPath('docEditorDocs', filename, { encoding: 'base64' });
      if (r && r.content) {
        const ext = filename.split('.').pop().toLowerCase();
        img.src = 'data:' + (IMAGE_MIME_MAP[ext] || 'image/jpeg') + ';base64,' + r.content;
      }
    } catch(e) {}
  }));
}

async function embedImageFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const name = (file.name.replace(/\s+/g, '_').replace(/[^\w.\-]/g, '')) || 'image';

  if (window.Desktop && Desktop.isElectron()) {
    try {
      const r = await Desktop.saveBlob('docEditorDocs', name, file, currentDocSubdir);
      if (r && r.ok) {
        const filename = (r.file && r.file.filename) ? r.file.filename : name;
        insertTextAtCursor('\n![' + name + '](' + filename + ')\n');
        showToast('Image saved: ' + name);
      } else {
        showToast('Image save failed: ' + (r && r.error ? r.error : 'unknown'), true);
      }
    } catch(e) {
      showToast('Image error: ' + e.message, true);
    }
  } else {
    // Non-Electron fallback: embed as base64
    const reader = new FileReader();
    reader.onload = function(ev) {
      insertTextAtCursor('\n![' + name + '](' + ev.target.result + ')\n');
      showToast('Image embedded');
    };
    reader.readAsDataURL(file);
  }
}

function initImageDrop() {
  const overlay   = document.getElementById('img-drop-overlay');
  const mainSplit = document.getElementById('main-split');
  let dragDepth   = 0;

  mainSplit.addEventListener('dragenter', function(e) {
    const dt = e.dataTransfer;
    if (!dt || ![...dt.types].includes('Files')) return;
    e.preventDefault();
    dragDepth++;
    overlay.classList.add('active');
  });

  mainSplit.addEventListener('dragleave', function() {
    dragDepth = Math.max(0, dragDepth - 1);
    if (dragDepth === 0) overlay.classList.remove('active');
  });

  mainSplit.addEventListener('dragover', function(e) {
    if (e.dataTransfer && [...e.dataTransfer.types].includes('Files')) e.preventDefault();
  });

  mainSplit.addEventListener('drop', function(e) {
    dragDepth = 0;
    overlay.classList.remove('active');
    const files = e.dataTransfer && e.dataTransfer.files;
    if (!files || !files.length) return;
    const imgFile = Array.from(files).find(f => f.type.startsWith('image/'));
    if (imgFile) { e.preventDefault(); embedImageFile(imgFile); }
  });
}

async function refreshDocList() {
  if (!window.Desktop || !Desktop.isElectron()) return [];
  try {
    const r = await Desktop.listByPath('docEditorDocs', '', { extensions: ['.md', '.html'] });
    if (!r || !r.ok || !Array.isArray(r.files)) return [];
    return r.files.filter(f => {
      const rp = f.relativePath || '';
      if (rp.startsWith('history/')) return false;
      const parts = rp.split('/');
      if (parts.length === 1) return true; // flat doc
      if (parts.length === 2) return parts[1] === parts[0] + '.md' || parts[1] === parts[0] + '.html'; // my-doc/my-doc.* only
      return false;
    });
  } catch(e) { return []; }
}

async function openDocModal() {
  const files = await refreshDocList();
  fileModalMode = 'open-doc';
  document.getElementById('file-modal-title').textContent = 'Open Document';
  const body = document.getElementById('file-modal-body');
  if (!files.length) {
    body.innerHTML = '<div class="modal-empty">No saved documents yet.<br>Use <strong>Save</strong> to create one.</div>';
  } else {
    body.innerHTML = '';
    const list = document.createElement('div');
    list.className = 'file-list';
    files.forEach(f => {
      const rp = f.relativePath || f.filename || '';
      const displayName = f.filename || rp;
      const isFolder = rp.includes('/');
      const row = document.createElement('div');
      row.className = 'file-row';
      const info = document.createElement('div');
      info.className = 'file-row-info';
      info.innerHTML = '<span class="file-row-name">' + escHtml(displayName) + '</span>'
        + (rp !== displayName ? '<span class="file-row-path">' + escHtml(rp) + '</span>' : '');
      row.appendChild(info);
      const openBtn = document.createElement('button');
      openBtn.className = 'file-row-btn';
      openBtn.textContent = 'Open';
      openBtn.onclick = () => loadDoc(rp);
      const delBtn = document.createElement('button');
      delBtn.className = 'file-row-btn file-row-btn-del';
      delBtn.textContent = 'Del';
      delBtn.onclick = async () => {
        if (!await showConfirm('Delete "' + displayName + '"?')) return;
        if (isFolder) {
          await Desktop.deleteByPath('docEditorDocs', rp.split('/')[0]).catch(() => {});
        } else {
          await Desktop.deleteByPath('docEditorDocs', rp).catch(() => {});
          await Desktop.deleteByPath('docEditorDocs', rp + '.json').catch(() => {});
        }
        openDocModal();
      };
      row.appendChild(openBtn);
      row.appendChild(delBtn);
      list.appendChild(row);
    });
    body.appendChild(list);
  }
  showModal('file-modal');
}

async function loadDoc(relativePath) {
  if (!window.Desktop || !Desktop.isElectron()) return;
  try {
    const r = await Desktop.readByPath('docEditorDocs', relativePath);
    if (r && r.ok) {
      mdEditor.setValue(r.content || '');
      const parts = relativePath.split('/');
      currentDocName = parts[parts.length - 1];
      currentDocSubdir = parts.length > 1 ? parts[0] : null;
      currentDocType = relativePath.toLowerCase().endsWith('.html') ? 'html' : 'md';
      docModified = false;
      updateDocIndicator();
      const typeBtn = document.getElementById('btn-doc-type');
      if (typeBtn) { typeBtn.textContent = currentDocType.toUpperCase(); typeBtn.classList.toggle('html-mode', currentDocType === 'html'); }
      if (mdEditor) monaco.editor.setModelLanguage(mdEditor.getModel(), currentDocType === 'html' ? 'html' : 'markdown');
      hideModal('file-modal');
      // Restore associated stylesheet
      try {
        const metaR = await Desktop.readByPath('docEditorDocs', relativePath + '.json');
        if (metaR && metaR.ok && metaR.content) {
          const meta = JSON.parse(metaR.content);
          const ss = meta.stylesheet || null;
          const sel = document.getElementById('stylesheet-select');
          if (ss && meta.stylesheetInDocs) {
            // Co-located stylesheet — may be inside doc's folder
            const cssPath = currentDocSubdir ? currentDocSubdir + '/' + ss : ss;
            const cssR = await Desktop.readByPath('docEditorDocs', cssPath).catch(() => null);
            const cssContent = (cssR && cssR.ok) ? (cssR.content || '') : '';
            cssEditor && cssEditor.setValue(cssContent);
            document.getElementById('custom-css-style').textContent = cssContent;
            cssModified = false;
            injectPairedSSOption(ss);
            currentStylesheetName = '@docs@' + ss;
          } else if (ss && [...sel.options].some(o => o.value === ss)) {
            sel.value = ss;
            await loadStylesheet(ss);
            localStorage.setItem('cmt-doceditor-last-ss', ss);
          } else if (!ss) {
            sel.value = '';
            currentStylesheetName = null;
            cssEditor && cssEditor.setValue('');
            document.getElementById('custom-css-style').textContent = '';
            cssModified = false;
          }
        }
      } catch(e) {}
      renderPreview();
    }
  } catch(e) { showToast('Could not load: ' + e.message, true); }
}

async function openFromQueryParams() {

      // Restore associated stylesheet from co-located metadata
      try {

            document.getElementById('custom-css-style').textContent = cssContent;
            cssModified = false;
            injectPairedSSOption(ss);

          } else if (ss && [...sel.options].some(o => o.value === ss)) {

async function saveExternalDoc() {
  const content = mdEditor.getValue();
  const relPath = currentEditRelPath;
  const lastSlash = relPath.lastIndexOf('/');
  const filename = lastSlash >= 0 ? relPath.slice(lastSlash + 1) : relPath;
  const subdir = lastSlash >= 0 ? relPath.slice(0, lastSlash) : null;
  try {
    const r = await Desktop.saveText(currentEditTarget, filename, content, subdir);

async function saveDoc() {
  if (!window.Desktop || !Desktop.isElectron()) {
    showToast('File saving requires the Electron app.', true);
    return;
  }
  if (currentEditTarget && currentEditRelPath) {
    await saveExternalDoc();
  } else if (currentDocName) {
    await doSaveDoc(currentDocName);
  } else {
    const ext = '.' + currentDocType;
    openSaveModal('Save Document', ext, async name => {
      if (/\.(md|html)$/i.test(name)) { setDocType(/\.html$/i.test(name) ? 'html' : 'md'); }
      else name += ext;
      await doSaveDoc(name);
    });
  }
}

async function saveDocAs() {
  if (!window.Desktop || !Desktop.isElectron()) return;
  const ext = '.' + currentDocType;
  openSaveModal('Save Document As', ext, async name => {
    if (/\.(md|html)$/i.test(name)) { setDocType(/\.html$/i.test(name) ? 'html' : 'md'); }
