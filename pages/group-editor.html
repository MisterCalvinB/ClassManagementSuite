<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Group Editor</title>
  <link rel="stylesheet" href="../modules/lexend/lexend.css">
  <script src="../electron-bridge.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/dialogs.js"></script>
  <script src="../js/menus.js"></script>
  <link rel="stylesheet" href="../css/stylesheet.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #fff;
      color: #000;
      min-height: 100vh;
    }

    .ge-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 24px 80px;
    }

    .ge-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .ge-back-btn {
      background: #fff;
      border: 2px solid #000;
      border-radius: 7px;
      padding: 7px 14px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      color: #000;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      white-space: nowrap;
    }
    .ge-back-btn:hover { background: #000; color: #fff; }

    .ge-title {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.3px;
      flex: 1;
    }
    .ge-subtitle {
      font-size: 0.83rem;
      font-weight: 600;
      color: #000;
      width: 100%;
      margin-top: -8px;
    }

    /* ── CSV buttons ─────────────────────────────────────── */
    .ge-csv-bar {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .ge-csv-btn {
      padding: 7px 12px;
      background: #fff;
      border: 2px solid #000;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      transition: background 0.1s, color 0.1s;
      white-space: nowrap;
    }
    .ge-csv-btn:hover { background: #000; color: #fff; }

    /* ── Groups list ─────────────────────────────────────── */
    .ge-section-title {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #000;
      margin-bottom: 10px;
    }

    #ge-groups-body {
      margin-bottom: 16px;
    }

    /* ── Student toggle button ────────────────────────────── */
    .eg-students-toggle {
      padding: 4px 9px;
      font-size: 0.73rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      border: 1.5px solid #bbb;
      border-radius: 4px;
      cursor: pointer;
      background: #fff;
      color: #666;
      flex-shrink: 0;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .eg-students-toggle:hover { border-color: #111; color: #111; }
    .eg-students-toggle.active { border-color: #0891b2; background: #0891b2; color: #fff; }
    .eg-students-toggle:disabled { opacity: 0.5; cursor: default; }

    /* ── Student section ─────────────────────────────────── */
    .eg-student-section {
      background: #f7f7f7;
      border: 1px solid #e0e0e0;
      border-radius: 5px;
      padding: 8px 12px 10px;
      margin-bottom: 8px;
    }
    .eg-student-header {
      display: grid;
      grid-template-columns: 1fr 1fr 120px 80px 44px 28px;
      gap: 4px;
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #aaa;
      padding: 0 2px 5px;
    }
    .eg-student-row {
      display: grid;
      grid-template-columns: 1fr 1fr 120px 80px 44px 28px;
      gap: 4px;
      margin-bottom: 3px;
    }
    .eg-s-sen-cell {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .eg-s-sen { width: 16px; height: 16px; cursor: pointer; }
    .eg-s-input {
      padding: 4px 7px;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-family: inherit;
      font-size: 0.8rem;
      background: #fff;
    }
    .eg-s-input:focus { border-color: #555; outline: none; }
    .eg-s-del {
      width: 28px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 3px;
      cursor: pointer;
      color: #bbb;
      font-size: 0.85rem;
      transition: all 0.1s;
      line-height: 1;
    }
    .eg-s-del:hover { border-color: #c33; color: #c33; }
    .eg-s-add {
      margin-top: 7px;
      padding: 4px 14px;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      background: #fff;
      border: 1.5px dashed #bbb;
      border-radius: 4px;
      cursor: pointer;
      color: #666;
      transition: all 0.12s;
    }
    .eg-s-add:hover { border-color: #111; color: #111; }

    /* ── Add new group ──────────────────────────────────── */
    .ge-add-section {
      border-top: 2px solid #000;
      padding-top: 18px;
      margin-top: 24px;
    }
    .ge-add-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .ge-add-name {
      flex: 1;
      min-width: 140px;
      padding: 7px 10px;
      border: 2px solid #000;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.85rem;
    }
    .ge-add-students {
      flex: 3;
      min-width: 220px;
      padding: 7px 10px;
      border: 2px solid #000;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.85rem;
      resize: vertical;
      min-height: 36px;
    }
    .ge-add-year {
      width: 96px;
      padding: 7px 8px;
      border: 2px solid #000;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.82rem;
    }
    .ge-add-select {
      padding: 7px 4px;
      border: 2px solid #000;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.82rem;
    }
    .ge-add-btn {
      padding: 7px 16px;
      background: #000;
      color: #fff;
      border: 2px solid #000;
      border-radius: 4px;
      font-family: inherit;
      font-weight: 700;
      font-size: 0.82rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      transition: background 0.1s, color 0.1s;
    }
    .ge-add-btn:hover { background: #fff; color: #000; }

    /* ── Bottom save bar ─────────────────────────────────── */
    .ge-save-bar {
      position: sticky;
      bottom: 0;
      background: #fff;
      border-top: 2px solid #000;
      padding: 14px 0 10px;
      display: flex;
      gap: 10px;
      margin-top: 32px;
    }
    .ge-save-btn {
      flex: 1;
      background: #000;
      color: #fff;
      border: 2px solid #000;
      border-radius: 6px;
      padding: 11px;
      font-family: inherit;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: background 0.1s, color 0.1s;
    }
    .ge-save-btn:hover { background: #fff; color: #000; }
    .ge-save-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Archived section ─────────────────────────────── */
    .ge-arch-toggle {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #000;
      padding: 0;
      margin-bottom: 8px;
    }
    .ge-arch-sep {
      border-top: 2px dashed #000;
      padding-top: 12px;
      margin-top: 20px;
    }

    /* ── Active context banner ───────────────────────── */
    .ge-active-banner {
      background: #f8f8f8;
      border: 1.5px solid #000;
      border-radius: 7px;
      padding: 12px 16px 10px;
      margin-bottom: 20px;
    }
    .ge-active-banner-label {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #000;
      margin-bottom: 8px;
    }
    .ge-active-banner-fields {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .ge-active-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: #555;
      white-space: nowrap;
    }
    .ge-active-input {
      width: 100px;
      padding: 5px 8px;
      border: 2px solid #000;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.82rem;
    }
    .ge-active-select {
      padding: 5px 6px;
      border: 2px solid #000;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.82rem;
    }
    .ge-active-date {
      width: 130px;
      padding: 5px 8px;
      border: 2px solid #ccc;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.82rem;
    }
    .ge-active-hint {
      font-size: 0.76rem;
      color: #777;
      margin-top: 7px;
    }

    /* ── Semester group sections ─────────────────────────── */
    .ge-sem-group { margin-bottom: 16px; }
    .ge-sem-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0 4px;
      border-bottom: 2px solid #000;
      margin-bottom: 8px;
    }
    .ge-sem-label {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #000;
      flex: 1;
    }
    .ge-sem-label.ge-sem-label-none { color: #888; }
    .ge-sem-archive-btn {
      padding: 3px 10px;
      font-size: 0.7rem;
      font-weight: 700;
      background: #fff;
      border: 1.5px solid #bbb;
      border-radius: 4px;
      cursor: pointer;
      color: #666;
      font-family: inherit;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .ge-sem-archive-btn:hover { border-color: #111; color: #111; }
    .ge-sem-toggle {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.72rem;
      font-weight: 800;
      color: #555;
      padding: 0 2px;
      line-height: 1;
    }

    /* ── End-of-semester banner ──────────────────────────── */
    .ge-eos-banner {
      background: #fffde7;
      border: 2px solid #000;
      border-radius: 7px;
      padding: 10px 14px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .ge-eos-msg {
      flex: 1;
      font-size: 0.82rem;
      font-weight: 600;
      color: #000;
      min-width: 160px;
    }
    .ge-eos-archive {
      padding: 5px 12px;
      font-size: 0.78rem;
      font-weight: 700;
      border: 2px solid #000;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      background: #000;
      color: #fff;
      transition: all 0.1s;
      white-space: nowrap;
    }
    .ge-eos-archive:hover { background: #fff; color: #000; }
    .ge-eos-dismiss {
      padding: 5px 10px;
      font-size: 0.78rem;
      font-weight: 700;
      border: 1.5px solid #bbb;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      background: #fff;
      color: #666;
      transition: all 0.1s;
    }
    .ge-eos-dismiss:hover { border-color: #333; color: #333; }

    /* ── Status notice ────────────────────────────────── */
    .ge-notice {
      font-size: 0.82rem;
      font-weight: 600;
      color: #000;
      padding: 6px 12px;
      background: #fff;
      border: 2px solid #000;
      border-radius: 5px;
      margin-bottom: 16px;
    }
    .ge-error {
      background: #fff;
      border-color: #000;
      color: #000;
      font-weight: 800;
    }
  </style>
</head>
<body>
<nav id="app-nav">
  <span class="nav-brand"></span>
  <div id="app-hamburger" class="hm-wrap">
    <button class="hm-btn" aria-label="Open menu">☰</button>
    <div class="hm-menu"></div>
  </div>
</nav>
<div class="ge-page">
  <header class="ge-header">
    <button class="ge-back-btn" onclick="goBack()" data-i18n="geBack">← Launcher</button>
    <h1 class="ge-title" data-i18n="geTitle">Group Editor</h1>
    <div class="ge-csv-bar">
      <button class="ge-csv-btn" onclick="triggerCsvImport()" title="Import groups and students from a CSV file">⬆ Import CSV</button>
      <button class="ge-csv-btn" onclick="exportCsv()" title="Export all groups and students to a CSV file">⬇ Export CSV</button>
    </div>
    <p class="ge-subtitle" data-i18n="geSubtitle">Create, edit, archive, and delete class groups. Changes are saved directly to user/class-groups.js.</p>
  </header>

  <input type="file" id="csv-import-input" accept=".csv,text/csv" style="display:none" onchange="handleCsvImport(event)">

  <div id="ge-notice" style="display:none;" class="ge-notice"></div>

  <div class="ge-active-banner">
    <div class="ge-active-banner-label" data-i18n="geActiveContextTitle">Active Context</div>
    <div class="ge-active-banner-fields">
      <span class="ge-active-label" data-i18n="geActiveYear">Year</span>
      <input id="ge-active-year" class="ge-active-input" type="text" placeholder="2025-2026">
      <span class="ge-active-label" data-i18n="geActiveSem">Term</span>
      <select id="ge-active-semester" class="ge-active-select">
        <option value="">—</option>
      </select>
      <span class="ge-active-label" data-i18n="geActiveSemStart">Start date</span>
      <input id="ge-active-sem-start" class="ge-active-date" type="date">
      <span class="ge-active-label" data-i18n="geActiveSemEnd">End date</span>
      <input id="ge-active-sem-end" class="ge-active-date" type="date">
      <span class="ge-active-label" data-i18n="geTermsPerYear">Terms / yr</span>
      <select id="ge-terms-per-year" class="ge-active-select" onchange="onTermsPerYearChange(this.value)" style="width:52px;">
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
      </select>
      <button class="ge-csv-btn" onclick="syncFromPlanner()" style="font-size:0.73rem;padding:5px 10px;" data-i18n="gePlannerSyncBtn" title="Fill dates from Planner terms">↕ Planner</button>
    </div>
    <div id="ge-planner-hint" style="display:none;margin:6px 0 0;padding:7px 10px;background:#f0f7ff;border:1.5px solid #b3d4f5;border-radius:5px;font-size:0.78rem;align-items:center;gap:8px;">
      <span id="ge-planner-hint-text" style="flex:1;color:#2563a8;"></span>
      <button onclick="syncFromPlanner()" data-i18n="gePlannerSyncBtn" style="padding:3px 10px;font-size:0.75rem;font-weight:700;border:1.5px solid #2563a8;border-radius:4px;background:#fff;color:#2563a8;cursor:pointer;font-family:inherit;white-space:nowrap;">↕ Planner</button>
    </div>
    <p class="ge-active-hint" data-i18n="geActiveContextHint">Default year and semester for new groups and other tools.</p>
  </div>

  <!-- End-of-semester archive offer -->
  <div id="ge-eos-banner" style="display:none;" class="ge-eos-banner">
    <span class="ge-eos-msg" id="ge-eos-msg"></span>
    <button class="ge-eos-archive" id="ge-eos-archive-btn" onclick="eosArchive()"></button>
    <button class="ge-eos-dismiss" onclick="eosDismiss()" id="ge-eos-dismiss-btn"></button>
  </div>

  <div class="ge-section-title" data-i18n="geActiveGroups">Active Groups</div>
  <div id="ge-groups-body"></div>

  <div class="ge-add-section">
    <div class="ge-section-title" data-i18n="geAddNewGroup">Add New Group</div>
    <div class="ge-add-row">
      <input id="new-group-name" class="ge-add-name" type="text" placeholder="Group name (e.g. 5ANdf-01)" data-i18n-placeholder="geGroupNamePlaceholder">
      <textarea id="new-group-students" class="ge-add-students" rows="1"
        placeholder="Alice Smith, Bob Jones, … (First Last, one per line or comma-separated)" oninput="autoResizeStudents(this)"></textarea>
      <input id="new-group-year" class="ge-add-year" type="text" placeholder="2025-2026">
      <select id="new-group-semester" class="ge-add-select">
        <option value="">—</option>
      </select>
      <select id="new-group-level" class="ge-add-select">
        <option value="">Lvl</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
      </select>
      <button class="ge-add-btn" onclick="addNewGroupRow()" data-i18n="geAddBtn">Add</button>
    </div>
  </div>

  <div class="ge-save-bar">
    <button id="ge-save-btn" class="ge-save-btn" onclick="saveGroupsToFile()" data-i18n="geSaveBtn">💾 Save to class-groups.js</button>
  </div>
</div>

<!-- Planner semester picker -->
<div id="ge-planner-picker" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9001;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:10px;padding:24px 24px 18px;max-width:400px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,0.18);">
    <p id="ge-planner-picker-msg" style="font-size:0.88rem;font-weight:700;margin-bottom:14px;"></p>
    <div id="ge-planner-picker-btns" style="display:flex;flex-direction:column;gap:8px;"></div>
    <div style="margin-top:16px;display:flex;justify-content:flex-end;">
      <button onclick="closePlannerPicker()" style="padding:7px 18px;border:2px solid #000;border-radius:5px;font-family:inherit;font-size:0.85rem;font-weight:700;cursor:pointer;background:#fff;color:#000;transition:background 0.1s,color 0.1s;" onmouseover="this.style.background='#000';this.style.color='#fff'" onmouseout="this.style.background='#fff';this.style.color='#000'" data-i18n="btnCancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Confirm dialog -->
<div id="ge-confirm-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9000;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:10px;padding:28px 28px 20px;max-width:400px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,0.18);">
    <p id="ge-confirm-msg" style="font-size:0.95rem;line-height:1.55;margin-bottom:20px;white-space:pre-line;"></p>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button onclick="cancelConfirm()" style="padding:8px 18px;border:2px solid #000;border-radius:5px;font-family:inherit;font-size:0.85rem;font-weight:700;cursor:pointer;background:#fff;color:#000;transition:background 0.1s,color 0.1s;" onmouseover="this.style.background='#000';this.style.color='#fff'" onmouseout="this.style.background='#fff';this.style.color='#000'" data-i18n="btnCancel">Cancel</button>
      <button id="ge-confirm-ok" onclick="okConfirm()" style="padding:8px 18px;border:2px solid #111;border-radius:5px;font-family:inherit;font-size:0.85rem;font-weight:700;cursor:pointer;background:#111;color:#fff;transition:all 0.12s;" onmouseover="this.style.background='#fff';this.style.color='#111'" onmouseout="this.style.background='#111';this.style.color='#fff'" data-i18n="btnOk">OK</button>
    </div>
  </div>
</div>

<script>
  const GROUPS_FILE_TARGET = 'user';
  const GROUPS_FILE_NAME = 'class-groups.js';

  let rawData = {};
  let rawMeta = {};
  let _confirmCb = null;
  let _activeYear = '';
  let _activeSemester = null;
  let _activeSemStart = '';
  let _activeSemEnd = '';
  let _plannerSemesters = [];
  let _plannerActiveSemId = null;

  function getTermsPerYear() {
    try {
      const cfg = JSON.parse(localStorage.getItem('cmt-general-config') || '{}');
      return Math.max(2, Math.min(4, parseInt(cfg.termsPerYear, 10) || 2));
    } catch (e) { return 2; }
  }
  function setTermsPerYear(n) {
    try {
      const cfg = JSON.parse(localStorage.getItem('cmt-general-config') || '{}');
      cfg.termsPerYear = Number(n);
      localStorage.setItem('cmt-general-config', JSON.stringify(cfg));
    } catch (e) {}
  }
  function _buildTermSelectOptions(selectEl, currentVal) {
    if (!selectEl) return;
    const n = getTermsPerYear();
    const prev = currentVal !== undefined ? String(currentVal || '') : selectEl.value;
    selectEl.innerHTML = '<option value="">—</option>';
    for (let i = 1; i <= n; i++) {
      const opt = document.createElement('option');
      opt.value = String(i);
      opt.textContent = 'S' + i;
      selectEl.appendChild(opt);
    }
    if (prev) selectEl.value = prev;
  }
  function onTermsPerYearChange(val) {
    setTermsPerYear(Number(val) || 2);
    _buildTermSelectOptions(document.getElementById('ge-active-semester'), _activeSemester);
    _buildTermSelectOptions(document.getElementById('new-group-semester'), _activeSemester);
    renderGroupsList();
    checkEndOfSemesterPrompt();
  }

  // ── Navigation ──────────────────────────────────────────────
  function goBack() {
    if (window.electronApi) {
      window.electronApi.goToLauncher();
    } else {
      window.location.href = 'launcher.html';
    }
  }

  // ── Confirm dialog ──────────────────────────────────────────
  function showConfirm(msg, cb) {
    _confirmCb = cb || null;
    document.getElementById('ge-confirm-msg').textContent = msg;
    const overlay = document.getElementById('ge-confirm-overlay');
    overlay.style.display = 'flex';
    setTimeout(() => document.getElementById('ge-confirm-ok').focus(), 40);
  }
  function okConfirm() {
    document.getElementById('ge-confirm-overlay').style.display = 'none';
    const cb = _confirmCb; _confirmCb = null;
    if (cb) cb();
  }
  function cancelConfirm() {
    document.getElementById('ge-confirm-overlay').style.display = 'none';
    _confirmCb = null;
  }

  // ── Notice ──────────────────────────────────────────────────
  function showNotice(msg, isError) {
    const el = document.getElementById('ge-notice');
    el.textContent = msg;
    el.className = 'ge-notice' + (isError ? ' ge-error' : '');
    el.style.display = '';
    clearTimeout(showNotice._timer);
    if (!isError) showNotice._timer = setTimeout(() => { el.style.display = 'none'; }, 3000);
  }

  // ── Student helpers ──────────────────────────────────────────
  function studentDisplayName(s) {
    if (typeof s === 'string') return s.trim().toUpperCase();
    const fn = (s.firstName || '').trim().toUpperCase();
    const ln = (s.lastName || '').trim().toUpperCase();
    return (fn + ' ' + ln).trim();
  }

  function getStudentsForGroup(groupName) {
    const metaStudents = rawMeta[groupName] && rawMeta[groupName].students;
    if (Array.isArray(metaStudents) && metaStudents.length > 0) return metaStudents;
    return (rawData[groupName] || []).map(entry => {
      if (typeof entry === 'object' && entry) return entry;
      const parts = String(entry).trim().split(/\s+/);
      return { firstName: parts[0] || '', lastName: parts.slice(1).join(' ') || '', dob: '', adminClass: '' };
    });
  }

  function parseNamesText(text) {
    return text.split(/[\n,]/).map(s => s.trim()).filter(Boolean).map(entry => {
      const parts = entry.split(/\s+/);
      return {
        firstName: (parts[0] || '').toUpperCase(),
        lastName: parts.slice(1).join(' ').toUpperCase(),
        dob: '',
        adminClass: ''
      };
    });
  }

  function collectStudentsFromTable(studentSection) {
    const results = [];
    studentSection.querySelectorAll('.eg-student-row').forEach(row => {
      const fn = (row.querySelector('.eg-s-fn')?.value || '').trim().toUpperCase();
      const ln = (row.querySelector('.eg-s-ln')?.value || '').trim().toUpperCase();
      const dob = (row.querySelector('.eg-s-dob')?.value || '').trim();
      const ac = (row.querySelector('.eg-s-class')?.value || '').trim().toUpperCase();
      const senCb = row.querySelector('.eg-s-sen');
      const sen = senCb ? senCb.checked : false;
      if (fn || ln) {
        const entry = { firstName: fn, lastName: ln, dob, adminClass: ac };
        if (sen) entry.sen = true;
        results.push(entry);
      }
    });
    return results;
  }

  function getStudentNamesFromSection(studentSection) {
    return collectStudentsFromTable(studentSection).map(studentDisplayName).filter(Boolean);
  }

  function autoResizeStudents(el) {
    if (!el) return;
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  // ── Load class-groups.js ─────────────────────────────────────
  async function loadGroups() {
    if (window.Desktop && Desktop.isElectron() && typeof Desktop.readText === 'function') {
      try {
        const result = await Desktop.readText(GROUPS_FILE_TARGET, GROUPS_FILE_NAME);
        if (result && result.ok && result.content) {
          try {
            const fn = new Function(
              result.content +
              '\nreturn (typeof CLASS_GROUPS_DATA !== "undefined") ? CLASS_GROUPS_DATA' +
              ' : { classGroups: (typeof CLASS_GROUPS !== "undefined" ? CLASS_GROUPS : null),' +
              '   classGroupsMeta: (typeof CLASS_GROUPS_META !== "undefined" ? CLASS_GROUPS_META : null) };'
            );
            const parsed = fn();
            rawData = (parsed && parsed.classGroups) ? parsed.classGroups : {};
            rawMeta = (parsed && parsed.classGroupsMeta) ? parsed.classGroupsMeta : {};
            _activeYear = (parsed && parsed.activeYear) ? parsed.activeYear : '';
            _activeSemester = (parsed && parsed.activeSemester) ? parsed.activeSemester : null;
            _activeSemStart = (parsed && parsed.activeSemesterStart) ? parsed.activeSemesterStart : '';
            _activeSemEnd = (parsed && parsed.activeSemesterEnd) ? parsed.activeSemesterEnd : '';
            _populateActiveBanner();
          } catch (parseErr) {
            showNotice('Could not parse class-groups.js: ' + parseErr.message, true);
          }
        } else {
          showNotice('Could not read class-groups.js: ' + (result && result.error || 'unknown error'), true);
        }
      } catch (e) {
        showNotice('Error loading class-groups.js: ' + e.message, true);
      }
    } else {
      rawData = (typeof CLASS_GROUPS !== 'undefined' && CLASS_GROUPS) ? CLASS_GROUPS : {};
      rawMeta = (typeof CLASS_GROUPS_META !== 'undefined' && CLASS_GROUPS_META) ? CLASS_GROUPS_META : {};
      if (typeof CLASS_GROUPS_DATA !== 'undefined' && CLASS_GROUPS_DATA) {
        _activeYear = CLASS_GROUPS_DATA.activeYear || '';
        _activeSemester = CLASS_GROUPS_DATA.activeSemester || null;
        _activeSemStart = CLASS_GROUPS_DATA.activeSemesterStart || '';
        _activeSemEnd = CLASS_GROUPS_DATA.activeSemesterEnd || '';
        _populateActiveBanner();
      }
    }
    renderGroupsList();
    checkEndOfSemesterPrompt();
    loadPlannerConfig(); // non-blocking, populates _plannerSemesters for the sync button
  }

  function _populateActiveBanner() {
    const yearEl = document.getElementById('ge-active-year');
    const semEl = document.getElementById('ge-active-semester');
    const startEl = document.getElementById('ge-active-sem-start');
    const endEl = document.getElementById('ge-active-sem-end');
    const tpyEl = document.getElementById('ge-terms-per-year');
    if (tpyEl) tpyEl.value = String(getTermsPerYear());
    if (yearEl) yearEl.value = _activeYear;
    _buildTermSelectOptions(semEl, _activeSemester);
    if (startEl) startEl.value = _activeSemStart;
    if (endEl) endEl.value = _activeSemEnd;
    // Pre-fill add-new-group inputs with active defaults
    const ngYear = document.getElementById('new-group-year');
    const ngSem = document.getElementById('new-group-semester');
    if (ngYear && !ngYear.value) ngYear.value = _activeYear;
    _buildTermSelectOptions(ngSem, ngSem && ngSem.value ? ngSem.value : _activeSemester);
  }

  function _readActiveBanner() {
    return {
      activeYear: (document.getElementById('ge-active-year')?.value.trim()) || '',
      activeSemester: (() => { const v = document.getElementById('ge-active-semester')?.value; return v ? Number(v) : null; })(),
      activeSemesterStart: (document.getElementById('ge-active-sem-start')?.value) || '',
      activeSemesterEnd: (document.getElementById('ge-active-sem-end')?.value) || ''
    };
  }

  // ── Planner config sync ──────────────────────────────────────
  async function loadPlannerConfig() {
    if (!window.Desktop || !Desktop.isElectron() || typeof Desktop.readText !== 'function') return;
    try {
      const result = await Desktop.readText('user', 'planner-config.js');
      if (!result?.ok || !result.content) return;
      const sandbox = {};
      const fn = new Function('window', result.content + '\nreturn window.PLANNER_CONFIG || null;');
      const cfg = fn(sandbox);
      if (cfg && Array.isArray(cfg.semesters) && cfg.semesters.length) {
        _plannerSemesters = cfg.semesters;
        _plannerActiveSemId = cfg.activeSemesterId || null;
        _showPlannerHintIfNeeded();
      }
    } catch (_) {}
  }

  function _showPlannerHintIfNeeded() {
    const hintEl = document.getElementById('ge-planner-hint');
    if (!hintEl || !_plannerSemesters.length) return;
    // Only offer when active-context dates aren't set yet
    if (_activeSemStart || _activeSemEnd) return;
    const activeSem = _plannerSemesters.find(s => s.id === _plannerActiveSemId) || _plannerSemesters[0];
    let msg;
    if (_plannerSemesters.length === 1 && activeSem) {
      const label = activeSem.label || ('S1');
      const start = activeSem.semesterStart || '';
      const end   = activeSem.semesterEnd   || '';
      if (!start && !end) return; // nothing useful to offer
      msg = typeof tFmt === 'function'
        ? tFmt('gePlannerHintSingle', { label, start: start || '?', end: end || '?' })
        : `Planner term: ${label} (${start} → ${end})`;
    } else {
      msg = typeof tFmt === 'function'
        ? tFmt('gePlannerHintMulti', { n: _plannerSemesters.length })
        : `Planner has ${_plannerSemesters.length} term(s) configured`;
    }
    document.getElementById('ge-planner-hint-text').textContent = msg;
    hintEl.style.display = 'flex';
  }

  function deriveYearFromDates(startDate, endDate) {
    if (!startDate) return '';
    const sy = startDate.substring(0, 4);
    const ey = endDate ? endDate.substring(0, 4) : sy;
    return sy === ey ? sy : sy + '-' + ey;
  }

  function syncFromPlanner() {
    if (!_plannerSemesters.length) {
      showToast(typeof t === 'function' ? t('gePlannerSyncNone') : 'No semesters found in the Planner.');
      return;
    }
    if (_plannerSemesters.length === 1) {
      applyPlannerSemester(_plannerSemesters[0], 0);
      return;
    }
    const picker = document.getElementById('ge-planner-picker');
    const msg = document.getElementById('ge-planner-picker-msg');
    const btns = document.getElementById('ge-planner-picker-btns');
    msg.textContent = typeof t === 'function' ? t('gePlannerSyncHint') : 'Use dates from which Planner semester?';
    btns.innerHTML = '';
    _plannerSemesters.forEach((sem, idx) => {
      const btn = document.createElement('button');
      btn.style.cssText = 'padding:9px 14px;border:2px solid #ccc;border-radius:5px;font-family:inherit;font-size:0.84rem;font-weight:700;cursor:pointer;background:#fff;color:#000;transition:all 0.1s;text-align:left;width:100%;';
      btn.onmouseover = () => { btn.style.borderColor = '#111'; };
      btn.onmouseout = () => { btn.style.borderColor = '#ccc'; };
      const semNum = idx + 1;
      const yearStr = deriveYearFromDates(sem.semesterStart, sem.semesterEnd);
      const dateRange = [sem.semesterStart, sem.semesterEnd].filter(Boolean).join(' → ');
      btn.innerHTML = `<strong>S${semNum}${sem.label ? ' — ' + sem.label : ''}</strong>${yearStr ? ' (' + yearStr + ')' : ''}<br><span style="font-size:0.75rem;font-weight:600;color:#666;">${dateRange}</span>`;
      btn.onclick = () => { closePlannerPicker(); applyPlannerSemester(sem, idx); };
      btns.appendChild(btn);
    });
    picker.style.display = 'flex';
  }

  function closePlannerPicker() {
    document.getElementById('ge-planner-picker').style.display = 'none';
  }

  function applyPlannerSemester(sem, semIndex) {
    const semNum = semIndex + 1;
    const year = deriveYearFromDates(sem.semesterStart, sem.semesterEnd);
    const yearEl = document.getElementById('ge-active-year');
    const semEl = document.getElementById('ge-active-semester');
    const startEl = document.getElementById('ge-active-sem-start');
    const endEl = document.getElementById('ge-active-sem-end');
    if (yearEl && year) yearEl.value = year;
    if (semEl) semEl.value = String(semNum);
    if (startEl && sem.semesterStart) startEl.value = sem.semesterStart;
    if (endEl && sem.semesterEnd) endEl.value = sem.semesterEnd;
    const ngYear = document.getElementById('new-group-year');
    const ngSem = document.getElementById('new-group-semester');
    if (ngYear && year) ngYear.value = year;
    if (ngSem) ngSem.value = String(semNum);
    _activeYear = year || _activeYear;
    _activeSemester = semNum;
    _activeSemStart = sem.semesterStart || '';
    _activeSemEnd = sem.semesterEnd || '';
    const hintEl = document.getElementById('ge-planner-hint');
    if (hintEl) hintEl.style.display = 'none';
    showNotice((typeof tFmt === 'function' ? tFmt('geSemSectionLabel', { sem: semNum }) : 'S' + semNum) + (year ? ' — ' + year : '') + ' applied from Planner.');
  }

  // ── Build file content ────────────────────────────────────────
  // classGroups stores string names for compatibility with class-management and other tools.
  // classGroupsMeta stores extended student objects (firstName, lastName, dob, adminClass).
  function buildGroupsFileContent(data, meta) {
    const groupLines = Object.keys(data).map(name => {
      const students = data[name].map(s => JSON.stringify(s)).join(', ');
      return `    ${JSON.stringify(name)}: [${students}]`;
    });
    const metaLines = Object.keys(data).map(name => {
      const m = (meta && meta[name]) ? meta[name] : { year: '', semester: '', level: '' };
      const metaEntry = { year: m.year ?? '', semester: m.semester === '' ? '' : m.semester, level: m.level === '' ? '' : m.level };
      if (m.halfGroups && (m.halfGroups.A && m.halfGroups.A.length || m.halfGroups.B && m.halfGroups.B.length)) metaEntry.halfGroups = m.halfGroups;
      if (m.students && m.students.length) metaEntry.students = m.students;
      if (m.archived) metaEntry.archived = true;
      return `    ${JSON.stringify(name)}: ${JSON.stringify(metaEntry)}`;
    });
    const ac = _readActiveBanner();
    return [
      'const CLASS_GROUPS_DATA = {',
      `  "activeYear": ${JSON.stringify(ac.activeYear)},`,
      `  "activeSemester": ${JSON.stringify(ac.activeSemester)},`,
      `  "activeSemesterStart": ${JSON.stringify(ac.activeSemesterStart)},`,
      `  "activeSemesterEnd": ${JSON.stringify(ac.activeSemesterEnd)},`,
      '  "classGroups": {',
      groupLines.join(',\n').split('\n').map(l => '  ' + l).join('\n'),
      '  },',
      '  "classGroupsMeta": {',
      metaLines.join(',\n').split('\n').map(l => '  ' + l).join('\n'),
      '  }',
      '};',
      '',
      'var CLASS_GROUPS = CLASS_GROUPS_DATA.classGroups || {};',
      'var CLASS_GROUPS_META = CLASS_GROUPS_DATA.classGroupsMeta || {};',
      ''
    ].join('\n');
  }

  async function persistGroupsToUserFile(data, meta) {
    const content = buildGroupsFileContent(data, meta);
    if (window.Desktop && typeof Desktop.saveText === 'function') {
      try {
        return await Desktop.saveText(GROUPS_FILE_TARGET, GROUPS_FILE_NAME, content);
      } catch (e) {
        return { ok: false, error: e.message || 'Unable to save' };
      }
    }
    const blob = new Blob([content], { type: 'text/javascript' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = GROUPS_FILE_NAME; a.click();
    URL.revokeObjectURL(url);
    return { ok: true, mode: 'download' };
  }

  // ── Meta inputs ──────────────────────────────────────────────
  function makeMetaInputs(meta) {
    const yearInput = document.createElement('input');
    yearInput.type = 'text';
    yearInput.className = 'eg-row-year';
    yearInput.value = (meta && meta.year) ? meta.year : '';
    yearInput.placeholder = '2025-2026';
    yearInput.title = 'Calendar year';
    yearInput.style.cssText = 'width:96px; padding:5px 7px; border:1px solid #ccc; border-radius:4px; font-size:0.82rem;';

    const semSelect = document.createElement('select');
    semSelect.className = 'eg-row-semester';
    semSelect.title = typeof t === 'function' ? t('geActiveSem') : 'Term';
    semSelect.style.cssText = 'width:72px; padding:5px 4px; border:1px solid #ccc; border-radius:4px; font-size:0.82rem;';
    _buildTermSelectOptions(semSelect, meta && meta.semester);

    const lvlSelect = document.createElement('select');
    lvlSelect.className = 'eg-row-level';
    lvlSelect.title = 'Level';
    lvlSelect.style.cssText = 'width:64px; padding:5px 4px; border:1px solid #ccc; border-radius:4px; font-size:0.82rem;';
    [['', 'Lvl'], ['1', '1'], ['2', '2'], ['3', '3'], ['4', '4']].forEach(([v, t]) => {
      const opt = document.createElement('option');
      opt.value = v; opt.textContent = t;
      if (String(meta && meta.level) === v) opt.selected = true;
      lvlSelect.appendChild(opt);
    });

    return { yearInput, semSelect, lvlSelect };
  }

  // ── Student table section ────────────────────────────────────
  function buildStudentInputRow(student, isDisabled) {
    const row = document.createElement('div');
    row.className = 'eg-student-row';

    const makeInput = (cls, val, placeholder, type) => {
      const input = document.createElement('input');
      input.type = type || 'text';
      input.className = 'eg-s-input ' + cls;
      input.value = val || '';
      input.placeholder = placeholder;
      if (isDisabled) input.disabled = true;
      return input;
    };

    const fnInput = makeInput('eg-s-fn', student.firstName, 'First name');
    const lnInput = makeInput('eg-s-ln', student.lastName, 'Last name');
    const dobInput = makeInput('eg-s-dob', student.dob, '', 'date');
    const acInput = makeInput('eg-s-class', student.adminClass, 'Class');

    const senCell = document.createElement('div');
    senCell.className = 'eg-s-sen-cell';
    const senCb = document.createElement('input');
    senCb.type = 'checkbox';
    senCb.className = 'eg-s-sen';
    senCb.checked = student.sen === true;
    senCb.title = 'SEN';
    if (isDisabled) senCb.disabled = true;
    senCell.appendChild(senCb);

    const delBtn = document.createElement('button');
    delBtn.type = 'button';
    delBtn.className = 'eg-s-del';
    delBtn.textContent = '×';
    delBtn.title = 'Remove student';
    if (isDisabled) {
      delBtn.disabled = true;
    } else {
      delBtn.onclick = () => row.remove();
    }

    row.appendChild(fnInput);
    row.appendChild(lnInput);
    row.appendChild(dobInput);
    row.appendChild(acInput);
    row.appendChild(senCell);
    row.appendChild(delBtn);
    return row;
  }

  function buildStudentSection(students, isDisabled) {
    const section = document.createElement('div');
    section.className = 'eg-student-section';
    section.style.display = 'none';

    const header = document.createElement('div');
    header.className = 'eg-student-header';
    ['First Name', 'Last Name', 'Date of Birth', 'Class', 'SEN', ''].forEach(label => {
      const span = document.createElement('span');
      span.textContent = label;
      header.appendChild(span);
    });
    section.appendChild(header);

    const tableBody = document.createElement('div');
    tableBody.className = 'eg-student-body';
    students.forEach(s => tableBody.appendChild(buildStudentInputRow(s, isDisabled)));
    section.appendChild(tableBody);

    if (!isDisabled) {
      const addBtn = document.createElement('button');
      addBtn.type = 'button';
      addBtn.className = 'eg-s-add';
      addBtn.textContent = '+ Student';
      addBtn.onclick = () => tableBody.appendChild(buildStudentInputRow({ firstName: '', lastName: '', dob: '', adminClass: '' }, false));
      section.appendChild(addBtn);
    }

    return section;
  }

  function updateStudentCountBtn(toggle, count) {
    toggle.textContent = count === 0 ? 'Students' : count + ' student' + (count !== 1 ? 's' : '');
  }

  // ── Half-group chips ──────────────────────────────────────────
  // studentNames: string array of display names (already uppercased)
  function buildHalfGroupChips(halfSection, studentNames, existingHalfGroups) {
    halfSection.innerHTML = '';
    if (!studentNames || studentNames.length === 0) {
      halfSection.innerHTML = '<em style="font-size:0.8rem;color:#aaa;">' + (typeof t === 'function' ? t('geAddStudentsFirst') : 'Add students to the group first.') + '</em>';
      return;
    }
    const hgA = (existingHalfGroups && existingHalfGroups.A) ? existingHalfGroups.A.map(s => s.toUpperCase()) : [];
    const hgB = (existingHalfGroups && existingHalfGroups.B) ? existingHalfGroups.B.map(s => s.toUpperCase()) : [];
    const legend = document.createElement('div');
    legend.style.cssText = 'font-size:0.72rem; color:#888; margin-bottom:7px; font-weight:600;';
    const legendText = typeof t === 'function' ? t('geHalfLegend') : 'Click to cycle: ■ A → ■ B → unassigned';
    legend.innerHTML = legendText
      .replace('■ A', '<span style="color:#1e40af;font-weight:700;">■ A</span>')
      .replace('■ B', '<span style="color:#9a3412;font-weight:700;">■ B</span>');
    halfSection.appendChild(legend);
    const chipsWrap = document.createElement('div');
    chipsWrap.style.cssText = 'display:flex; flex-wrap:wrap;';
    studentNames.forEach(name => {
      const chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'eg-half-chip';
      chip.textContent = name;
      chip.dataset.student = name;
      chip.dataset.half = hgA.includes(name) ? 'A' : (hgB.includes(name) ? 'B' : '');
      chip.onclick = () => {
        const cur = chip.dataset.half;
        chip.dataset.half = cur === '' ? 'A' : (cur === 'A' ? 'B' : '');
      };
      chipsWrap.appendChild(chip);
    });
    halfSection.appendChild(chipsWrap);
  }

  function collectHalfGroupsFromSection(halfSection) {
    const result = { A: [], B: [] };
    halfSection.querySelectorAll('.eg-half-chip').forEach(chip => {
      if (chip.dataset.half === 'A') result.A.push(chip.dataset.student);
      else if (chip.dataset.half === 'B') result.B.push(chip.dataset.student);
    });
    return (result.A.length + result.B.length > 0) ? result : null;
  }

  // ── Build a single group row ──────────────────────────────────
  // DOM order after this call: row → studentSection → halfSection
  function buildGroupRow(groupName, body, isArchived) {
    const row = document.createElement('div');
    row.className = 'eg-row';
    row.dataset.group = groupName;

    const nameInput = document.createElement('input');
    nameInput.type = 'text';
    nameInput.className = 'eg-row-name';
    nameInput.value = groupName;
    nameInput.title = 'Group name';
    if (isArchived) { nameInput.disabled = true; nameInput.style.opacity = '0.6'; }

    const students = getStudentsForGroup(groupName);

    const studentsToggle = document.createElement('button');
    studentsToggle.type = 'button';
    studentsToggle.className = 'eg-students-toggle';
    updateStudentCountBtn(studentsToggle, students.length);
    studentsToggle.title = 'Show/hide student details';
    if (isArchived) studentsToggle.disabled = true;

    const { yearInput, semSelect, lvlSelect } = makeMetaInputs(rawMeta[groupName]);
    if (isArchived) {
      yearInput.disabled = true; semSelect.disabled = true; lvlSelect.disabled = true;
      [yearInput, semSelect, lvlSelect].forEach(el => el.style.opacity = '0.6');
    }

    const studentSection = buildStudentSection(students, isArchived);

    const halfSection = document.createElement('div');
    halfSection.className = 'eg-half-section';
    halfSection.style.display = 'none';
    if (isArchived) halfSection.style.opacity = '0.6';

    const halfToggle = document.createElement('button');
    halfToggle.type = 'button';
    halfToggle.className = 'eg-half-toggle';
    halfToggle.textContent = '½';
    halfToggle.title = typeof t === 'function' ? t('geHalfGroupTitle') : 'Define half-groups A / B';
    halfToggle.disabled = !!isArchived;

    if (!isArchived) {
      studentsToggle.onclick = () => {
        const isOpen = studentSection.style.display !== 'none';
        studentSection.style.display = isOpen ? 'none' : '';
        studentsToggle.classList.toggle('active', !isOpen);
      };

      const existingMeta = rawMeta[groupName];
      const hasHalves = existingMeta && existingMeta.halfGroups &&
        ((existingMeta.halfGroups.A && existingMeta.halfGroups.A.length) ||
         (existingMeta.halfGroups.B && existingMeta.halfGroups.B.length));
      if (hasHalves) {
        buildHalfGroupChips(halfSection, students.map(studentDisplayName).filter(Boolean), existingMeta.halfGroups);
        halfToggle.classList.add('active');
        halfSection.style.display = '';
      }

      halfToggle.onclick = () => {
        const isOpen = halfSection.style.display !== 'none';
        halfSection.style.display = isOpen ? 'none' : '';
        halfToggle.classList.toggle('active', !isOpen);
        if (!isOpen) {
          const names = getStudentNamesFromSection(studentSection);
          buildHalfGroupChips(halfSection, names, collectHalfGroupsFromSection(halfSection));
        }
      };
    }

    const archiveBtn = document.createElement('button');
    archiveBtn.type = 'button';
    archiveBtn.title = isArchived
      ? (typeof t === 'function' ? t('geUnarchiveTitle') : 'Unarchive this group')
      : (typeof t === 'function' ? t('geArchiveTitle') : 'Archive this group');
    archiveBtn.textContent = isArchived ? '↩' : '📦';
    archiveBtn.style.cssText = 'padding:5px 8px; font-size:0.78rem; background:#fff; border:1px solid #bbb; border-radius:4px; cursor:pointer; flex-shrink:0; transition:all 0.12s;';
    archiveBtn.onmouseover = () => { archiveBtn.style.background = isArchived ? '#e6f4ea' : '#fff3e0'; };
    archiveBtn.onmouseout = () => { archiveBtn.style.background = '#fff'; };
    archiveBtn.onclick = () => {
      if (isArchived) {
        showConfirm(typeof tFmt === 'function' ? tFmt('geConfirmUnarchive', {name: groupName}) : 'Unarchive "' + groupName + '"?\n\nIt will reappear in the class roster.', () => unarchiveGroup(groupName));
      } else {
        showConfirm(typeof tFmt === 'function' ? tFmt('geConfirmArchive', {name: groupName}) : 'Archive "' + groupName + '"?\n\nIt will be hidden from the roster.', () => archiveGroup(groupName));

      showConfirm(typeof tFmt === 'function' ? tFmt('geConfirmDelete', {name: groupName}) : 'Delete "' + groupName + '" permanently?\n\nThis cannot be undone.', () => {
        row.remove();
        studentSection.remove();
        if (halfSection.parentNode) halfSection.remove();
      });

    row.appendChild(nameInput);
    row.appendChild(studentsToggle);
    row.appendChild(yearInput);
    row.appendChild(semSelect);
    row.appendChild(lvlSelect);

    row.appendChild(archiveBtn);

  // ── Build a semester section element ─────────────────────────
  function createSemesterGroupElement(semNum, year, groups, isArchived) {
    const semGroup = document.createElement('div');
    semGroup.className = 'ge-sem-group';
    semGroup.dataset.semester = String(semNum);
    semGroup.dataset.year = year || '';

    const header = document.createElement('div');
    header.className = 'ge-sem-header';

    const label = document.createElement('span');
    label.className = 'ge-sem-label';
    const semLabel = typeof tFmt === 'function' ? tFmt('geSemSectionLabel', { sem: semNum }) : 'S' + semNum;
    label.textContent = semLabel + (year ? ' — ' + year : '');

    const toggleBtn = document.createElement('button');
    toggleBtn.className = 'ge-sem-toggle';
    toggleBtn.textContent = '▼';

    if (!isArchived) {
      const archiveBtn = document.createElement('button');
      archiveBtn.className = 'ge-sem-archive-btn';
      archiveBtn.textContent = typeof tFmt === 'function' ? tFmt('geArchiveSemBtn', { sem: semNum }) : 'Archive S' + semNum;
      archiveBtn.onclick = () => archiveSemester(semNum, year);
      header.appendChild(label);
      header.appendChild(archiveBtn);
    } else {
      header.appendChild(label);
    }
    header.appendChild(toggleBtn);
    semGroup.appendChild(header);

    groups.forEach(g => buildGroupRow(g, content, isArchived));

      const isOpen = content.style.display !== 'none';
      content.style.display = isOpen ? 'none' : '';
      toggleBtn.textContent = isOpen ? '▶' : '▼';

      const isOpen = content.style.display !== 'none';

  // ── Render the full groups list ──────────────────────────────
  function renderGroupsList() {
    const body = document.getElementById('ge-groups-body');
    body.innerHTML = '';

    const activeGroups = Object.keys(rawData).filter(g => !(rawMeta[g] && rawMeta[g].archived));
    const archivedGroups = Object.keys(rawData).filter(g => rawMeta[g] && rawMeta[g].archived);

    if (activeGroups.length === 0) {
      const empty = document.createElement('p');
      empty.style.cssText = 'color:#aaa; font-size:0.88rem; padding:16px 0;';
      empty.textContent = typeof t === 'function' ? t('geNoActiveGroups') : 'No active groups yet. Add one below.';
      body.appendChild(empty);
    } else {
      const contextYear = (document.getElementById('ge-active-year')?.value.trim()) || _activeYear;
      const byYearSem = {};
      const noSemGroups = [];
      activeGroups.forEach(g => {
        const meta = rawMeta[g];
        const sem = meta && meta.semester !== undefined && meta.semester !== ''
          ? String(meta.semester)
          : '';
        if (!sem) { noSemGroups.push(g); return; }
        const year = (meta && meta.year) ? meta.year : contextYear;
        const key = year + '|' + sem;
        if (!byYearSem[key]) byYearSem[key] = [];
        byYearSem[key].push(g);
      });

      const sortedKeys = Object.keys(byYearSem).sort((a, b) => {
        const lastA = a.lastIndexOf('|'), lastB = b.lastIndexOf('|');
        const yearA = a.substring(0, lastA), semA = a.substring(lastA + 1);
        const yearB = b.substring(0, lastB), semB = b.substring(lastB + 1);
        if (yearA !== yearB) return yearA < yearB ? -1 : 1;
        return Number(semA) - Number(semB);
      });

      sortedKeys.forEach(key => {
        const lastPipe = key.lastIndexOf('|');
        const year = key.substring(0, lastPipe);
        const semNum = key.substring(lastPipe + 1);
        body.appendChild(createSemesterGroupElement(semNum, year, byYearSem[key], false));
      });

      if (noSemGroups.length > 0) {
        body.appendChild(createNoSemGroupElement(noSemGroups));
      }
    }

    if (archivedGroups.length > 0) {
      const archSep = document.createElement('div');
      archSep.className = 'ge-arch-sep';

      const archToggle = document.createElement('button');
      archToggle.className = 'ge-arch-toggle';
      const archLabel = typeof t === 'function' ? t('geArchivedGroups') : 'Archived groups';
      archToggle.textContent = '▶ ' + archLabel + ' (' + archivedGroups.length + ')';

      const archContent = document.createElement('div');
      archContent.style.display = 'none';
      archivedGroups.forEach(g => buildGroupRow(g, archContent, true));

      archToggle.onclick = () => {
        const isOpen = archContent.style.display !== 'none';
        archContent.style.display = isOpen ? 'none' : '';
        archToggle.textContent = (isOpen ? '▶' : '▼') + ' ' + archLabel + ' (' + archivedGroups.length + ')';
      };

      archSep.appendChild(archToggle);
      archSep.appendChild(archContent);
      body.appendChild(archSep);
    }
  }

  // ── Collect all current edits from the DOM ───────────────────
  // Relies on DOM order: .eg-row → .eg-student-section → .eg-half-section
  function collectGroupEdits() {
    const updated = {};
    const updatedMeta = {};
    document.querySelectorAll('#ge-groups-body .eg-row').forEach(row => {
      const nameInput = row.querySelector('.eg-row-name');
      const name = nameInput.value.trim();
      if (!name) return;

      const studentSection = row.nextElementSibling;
      const students = (studentSection && studentSection.classList.contains('eg-student-section'))
        ? collectStudentsFromTable(studentSection)
        : getStudentsForGroup(row.dataset.group);

      updated[name] = students.map(s => studentDisplayName(s)).filter(Boolean);

      const yearEl = row.querySelector('.eg-row-year');
      const semEl = row.querySelector('.eg-row-semester');
      const lvlEl = row.querySelector('.eg-row-level');
      updatedMeta[name] = {
        year: yearEl ? yearEl.value.trim() : '',
        semester: semEl ? (semEl.value === '' ? '' : Number(semEl.value)) : '',
        level: lvlEl ? (lvlEl.value === '' ? '' : Number(lvlEl.value)) : ''
      };
      if (students.length > 0) updatedMeta[name].students = students;

      const halfSection = studentSection ? studentSection.nextElementSibling : null;
      if (halfSection && halfSection.classList.contains('eg-half-section')) {
        const hg = collectHalfGroupsFromSection(halfSection);
        if (hg) updatedMeta[name].halfGroups = hg;
      }

      const origMeta = rawMeta[row.dataset.group];
      if (origMeta && origMeta.archived) updatedMeta[name].archived = true;
    });
    return { groups: updated, meta: updatedMeta };
  }

  // ── Archive / unarchive ──────────────────────────────────────
  async function archiveGroup(groupName) {
    if (!rawMeta[groupName]) rawMeta[groupName] = {};
    rawMeta[groupName].archived = true;

    const { groups: updated, meta: updatedMeta } = collectGroupEdits();
    if (updatedMeta[groupName]) updatedMeta[groupName].archived = true;
    else if (updated[groupName]) updatedMeta[groupName] = { archived: true };

    const result = await persistGroupsToUserFile(updated, updatedMeta);
    if (!result?.ok && result?.mode !== 'download') {
      showNotice((typeof t === 'function' ? t('geArchiveFailed') : 'Failed to save archive status:') + ' ' + (result?.error || (typeof t === 'function' ? t('geUnknownError') : 'unknown error')), true);
      delete rawMeta[groupName].archived;
      return;
    }

    rawData = updated;
    rawMeta = updatedMeta;

    if (window.Desktop && typeof Desktop.renameByPath === 'function') {
      try { await Desktop.renameByPath('groupParticipation', groupName, 'archived/' + groupName); } catch (_) {}
    }

    showNotice(typeof tFmt === 'function' ? tFmt('geArchived', {name: groupName}) : '"' + groupName + '" archived.');
    renderGroupsList();
  }

  async function unarchiveGroup(groupName) {
    if (!rawMeta[groupName]) rawMeta[groupName] = {};
    delete rawMeta[groupName].archived;

    const { groups: updated, meta: updatedMeta } = collectGroupEdits();
    if (updatedMeta[groupName]) delete updatedMeta[groupName].archived;

    const result = await persistGroupsToUserFile(updated, updatedMeta);
    if (!result?.ok && result?.mode !== 'download') {
      showNotice((typeof t === 'function' ? t('geUnarchiveFailed') : 'Failed to save unarchive status:') + ' ' + (result?.error || (typeof t === 'function' ? t('geUnknownError') : 'unknown error')), true);
      rawMeta[groupName].archived = true;
      return;
    }

    rawData = updated;
    rawMeta = updatedMeta;

    if (window.Desktop && typeof Desktop.renameByPath === 'function') {
      try { await Desktop.renameByPath('groupParticipation', 'archived/' + groupName, groupName); } catch (_) {}
    }

    showNotice(typeof tFmt === 'function' ? tFmt('geUnarchived', {name: groupName}) : '"' + groupName + '" unarchived.');
    renderGroupsList();
  }

  // ── Archive whole semester ───────────────────────────────────
  async function archiveSemester(semNum, filterYear) {
    const { groups: currentGroups, meta: currentMeta } = collectGroupEdits();
    const toArchive = Object.keys(currentGroups).filter(name => {
      if (currentMeta[name] && currentMeta[name].archived) return false;
      if (String(currentMeta[name] && currentMeta[name].semester) !== String(semNum)) return false;
      if (filterYear && currentMeta[name] && currentMeta[name].year && currentMeta[name].year !== filterYear) return false;
      return true;
    });
    if (!toArchive.length) {
      showToast(typeof t === 'function' ? t('geNoGroupsToSave') : 'No groups to archive.');
      return;
    }
    const year = filterYear || (document.getElementById('ge-active-year')?.value.trim()) || _activeYear;
    showConfirm(
      typeof tFmt === 'function'
        ? tFmt('geConfirmArchiveSem', { n: toArchive.length, sem: semNum, year })
        : `Archive all ${toArchive.length} group(s) in S${semNum} (${year})?\n\nThey will be hidden from the roster across all tools.`,
      async () => {
        toArchive.forEach(name => {
          if (!currentMeta[name]) currentMeta[name] = {};
          currentMeta[name].archived = true;
        });
        const result = await persistGroupsToUserFile(currentGroups, currentMeta);
        if (!result?.ok && result?.mode !== 'download') {
          showNotice((typeof t === 'function' ? t('geArchiveSemFailed') : 'Failed to archive semester:') + ' ' + (result?.error || (typeof t === 'function' ? t('geUnknownError') : 'unknown error')), true);
          return;
        }
        rawData = currentGroups;
        rawMeta = currentMeta;
        if (window.Desktop && typeof Desktop.renameByPath === 'function') {
          for (const name of toArchive) {
            try { await Desktop.renameByPath('groupParticipation', name, 'archived/' + name); } catch (_) {}
          }
        }
        try { localStorage.setItem(`cmt-ge-sem-archived-${year}-${semNum}`, '1'); } catch (_) {}
        document.getElementById('ge-eos-banner').style.display = 'none';
        showNotice(typeof tFmt === 'function' ? tFmt('geArchivedSem', { n: toArchive.length, sem: semNum }) : `${toArchive.length} group(s) in S${semNum} archived.`);
        renderGroupsList();
      }
    );
  }

  // ── End-of-semester prompt ───────────────────────────────────
  function checkEndOfSemesterPrompt() {
    if (!_activeSemEnd || !_activeSemester) return;
    const today = new Date().toISOString().slice(0, 10);
    if (_activeSemEnd >= today) return;
    try { if (localStorage.getItem(`cmt-ge-sem-archived-${_activeYear}-${_activeSemester}`)) return; } catch (_) {}
    const semGroups = Object.keys(rawData).filter(g => {
      if (rawMeta[g] && rawMeta[g].archived) return false;
      if (String(rawMeta[g] && rawMeta[g].semester) !== String(_activeSemester)) return false;
      const gYear = rawMeta[g] && rawMeta[g].year;
      if (_activeYear && gYear && gYear !== _activeYear) return false;
      return true;
    });
    if (!semGroups.length) return;
    const endFormatted = new Date(_activeSemEnd + 'T12:00:00').toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
    showEndOfSemBanner(_activeSemester, _activeYear, endFormatted, semGroups.length);

  // ── Sync grade-sheet _class.js files after group renames ─────
  async function syncGradeSheetRenames(renames) {
    if (!window.Desktop || !Desktop.isElectron() || !renames.length) return;
    try {
      const listResult = await Desktop.listByPath('grades', '', { recursive: true, extensions: ['.js'] });
      if (!listResult?.ok || !Array.isArray(listResult.files)) return;
      const classFiles = listResult.files.filter(f => f.filename === '_class.js');
      for (const { oldName, newName } of renames) {
        for (const cf of classFiles) {
          const res = await Desktop.readByPath('grades', cf.relativePath);
          if (!res?.content) continue;
          const match = res.content.match(/"className"\s*:\s*"((?:[^"\\]|\\.)*)"/);
          if (!match || match[1] !== oldName) continue;
          const updated = res.content.replace(
            /"className"\s*:\s*"(?:[^"\\]|\\.)*"/,
            `"className": ${JSON.stringify(newName)}`
          );
          const parts = cf.relativePath.split('/');
          const subdir = parts.length > 1 ? parts.slice(0, -1).join('/') : undefined;
          await Desktop.saveText('grades', '_class.js', updated, subdir);
          break;
        }
      }
    } catch (e) {
      console.warn('syncGradeSheetRenames failed:', e);
    }
  }

  // ── Save ─────────────────────────────────────────────────────
  async function saveGroupsToFile() {
    const renames = [];
    document.querySelectorAll('#ge-groups-body .eg-row').forEach(row => {
      const oldName = row.dataset.group || '';
      const nameInput = row.querySelector('.eg-row-name');
      const newName = nameInput ? nameInput.value.trim() : '';
      if (oldName && newName && oldName !== newName) renames.push({ oldName, newName });
    });

    const { groups: updated, meta: updatedMeta } = collectGroupEdits();
    if (Object.keys(updated).length === 0) {
      showToast(typeof t === 'function' ? t('geNoGroupsToSave') : 'No groups to save.');
      return;
    }

    rawData = updated;
    rawMeta = updatedMeta;

    const result = await persistGroupsToUserFile(updated, updatedMeta);
    if (!result?.ok && result?.mode !== 'download') {
      showNotice((typeof t === 'function' ? t('geSaveFailed') : 'Save failed:') + ' ' + (result?.error || 'Unable to save class-groups.js'), true);
      return;
    }

    await syncGradeSheetRenames(renames);

    const saveBtn = document.getElementById('ge-save-btn');
    const orig = saveBtn.textContent;
    saveBtn.textContent = typeof t === 'function' ? t('geSaved') : '✓ Saved!';
    saveBtn.disabled = true;
    setTimeout(() => {
      saveBtn.textContent = orig;
      saveBtn.disabled = false;
      renderGroupsList();
    }, 1200);
  }

  // ── CSV Export ───────────────────────────────────────────────
  function csvEscape(val) {
    const s = String(val === null || val === undefined ? '' : val);
    if (s.includes(',') || s.includes('"') || s.includes('\n')) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  }

  function exportCsv() {
    const { groups, meta } = collectGroupEdits();
    if (Object.keys(groups).length === 0) {
      showToast('No groups to export.');
      return;
    }

    const rows = ['Group,First Name,Last Name,Date of Birth,Admin Class,Year,Term,Level,SEN'];
    Object.keys(groups).forEach(groupName => {
      const m = meta[groupName] || {};
      const students = m.students && m.students.length
        ? m.students
        : groups[groupName].map(name => {
            const parts = name.trim().split(/\s+/);
            return { firstName: parts[0] || '', lastName: parts.slice(1).join(' ') || '', dob: '', adminClass: '' };
          });

      if (students.length === 0) {
        rows.push([groupName, '', '', '', '', m.year || '', m.semester ?? '', m.level ?? '', ''].map(csvEscape).join(','));
      } else {
        students.forEach(s => {
          rows.push([groupName, s.firstName || '', s.lastName || '', s.dob || '', s.adminClass || '', m.year || '', m.semester ?? '', m.level ?? '', s.sen ? 'true' : ''].map(csvEscape).join(','));
        });
      }
    });

    const blob = new Blob(['﻿' + rows.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'class-groups.csv';
    a.click();
    URL.revokeObjectURL(url);
  }

  // ── CSV Import ───────────────────────────────────────────────
  function triggerCsvImport() {
    document.getElementById('csv-import-input').click();
  }

  function handleCsvImport(event) {
    const file = event.target.files[0];
    event.target.value = '';
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => parseCsvImport(e.target.result);
    reader.readAsText(file, 'utf-8');
  }

  function parseCsvLine(line) {
    const fields = [];
    let cur = '', inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (inQuotes) {
        if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
        else if (ch === '"') inQuotes = false;
        else cur += ch;
      } else {
        if (ch === '"') inQuotes = true;
        else if (ch === ',') { fields.push(cur); cur = ''; }
        else cur += ch;
      }
    }
    fields.push(cur);
    return fields;
  }

  function parseCsvImport(text) {
    const lines = text.replace(/^﻿/, '').replace(/\r/g, '').split('\n').filter(l => l.trim());
    if (lines.length < 2) { showNotice('CSV file is empty or has no data rows.', true); return; }

    const rawHeaders = parseCsvLine(lines[0]);
    const headers = rawHeaders.map(h => h.trim().toLowerCase().replace(/[^a-z]/g, ''));

    const find = (...terms) => headers.findIndex(h => terms.some(t => h.includes(t)));
    const idx = {
      group:     find('group'),
      firstName: find('first', 'firstname', 'fn', 'prenom', 'prénom'),
      lastName:  find('last', 'lastname', 'ln', 'nom', 'surname'),
      dob:       find('dob', 'birth', 'date', 'born'),
      adminClass: find('adminclass', 'admin', 'class'),
      year:      find('year', 'annee', 'année'),
      semester:  find('sem'),
      level:     find('level', 'lvl'),
      sen:       find('sen', 'special'),
    };

    // adminClass should not steal "group" if both match "class"
    if (idx.adminClass === idx.group && idx.adminClass >= 0) idx.adminClass = -1;

    if (idx.group < 0) { showNotice('CSV must have a "Group" column.', true); return; }

    const groups = {};
    const meta = {};

    for (let i = 1; i < lines.length; i++) {
      const cols = parseCsvLine(lines[i]);
      const gName = (cols[idx.group] || '').trim();
      if (!gName) continue;

      if (!groups[gName]) { groups[gName] = []; meta[gName] = {}; }

      const fn = idx.firstName >= 0 ? (cols[idx.firstName] || '').trim().toUpperCase() : '';
      const ln = idx.lastName  >= 0 ? (cols[idx.lastName]  || '').trim().toUpperCase() : '';
      const dob = idx.dob      >= 0 ? (cols[idx.dob]       || '').trim() : '';
      const ac = idx.adminClass >= 0 ? (cols[idx.adminClass] || '').trim().toUpperCase() : '';
      const senRaw = idx.sen >= 0 ? (cols[idx.sen] || '').trim().toLowerCase() : '';
      const isSen = senRaw === 'true' || senRaw === 'yes' || senRaw === '1' || senRaw === 'x';

      if (fn || ln) {
        const entry = { firstName: fn, lastName: ln, dob, adminClass: ac };
        if (isSen) entry.sen = true;
        groups[gName].push(entry);
      }

      if (idx.year >= 0 && cols[idx.year]?.trim()) meta[gName].year = cols[idx.year].trim();
      if (idx.semester >= 0 && cols[idx.semester]?.trim()) {
        const sv = Number(cols[idx.semester]);
        if (sv === 1 || sv === 2) meta[gName].semester = sv;
      }
      if (idx.level >= 0 && cols[idx.level]?.trim()) {
        const lv = Number(cols[idx.level]);
        if (lv >= 1 && lv <= 4) meta[gName].level = lv;
      }
    }

    const groupCount = Object.keys(groups).length;
    const studentCount = Object.values(groups).reduce((sum, g) => sum + g.length, 0);
    if (groupCount === 0) { showNotice('No valid groups found in CSV.', true); return; }

    showConfirm(
      `Import ${studentCount} student(s) into ${groupCount} group(s)?\n\nGroups with matching names will have their student list replaced. New groups will be added.`,
      () => applyCsvImport(groups, meta)
    );
  }

  function applyCsvImport(newGroups, newMeta) {
    Object.keys(newGroups).forEach(gName => {
      const students = newGroups[gName];
      rawData[gName] = students.map(s => studentDisplayName(s)).filter(Boolean);
      if (!rawMeta[gName]) rawMeta[gName] = {};
      rawMeta[gName].students = students;
      const m = newMeta[gName] || {};
      if (m.year)     rawMeta[gName].year = m.year;
      if (m.semester) rawMeta[gName].semester = m.semester;
      if (m.level)    rawMeta[gName].level = m.level;
    });

    renderGroupsList();
    showNotice('Imported ' + Object.keys(newGroups).length + ' group(s). Click Save to persist.');
  }

  // ── Init ─────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function () {
    initHamburger();
    if (typeof applyTranslations === 'function') applyTranslations();
    window._cmtApplyNavBrand();
    loadGroups();
  });
</script>
</body>
