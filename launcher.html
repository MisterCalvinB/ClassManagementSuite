<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launcher</title>
  <link rel="stylesheet" href="modules/lexend/lexend.css">
  <script src="electron-bridge.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/shortcuts-modal.js"></script>
  <script src="js/dialogs.js"></script>
  <script src="js/tutorial.js"></script>
  <script>
    // Startup: open configured apps in the background after the launcher renders.
    // Runs once per window session — navigating back to the launcher skips this.
    (function () {
      try {
        if (sessionStorage.getItem('cmt-launcher-started')) return;
        sessionStorage.setItem('cmt-launcher-started', '1');

        var cfg = JSON.parse(localStorage.getItem('cmt-general-config') || '{}');
        var layout  = cfg.startupLayout || 'separate';
        var apps    = Array.isArray(cfg.startupApps) ? cfg.startupApps : [];
        var hasApps = apps.length > 0;
        var isSplit = layout === 'split' && cfg.startupSplitLeft && cfg.startupSplitRight;

        if (!hasApps && !isSplit) return;

        // Wait for the launcher to render, then open apps silently in the background.
        window.addEventListener('DOMContentLoaded', function () {
          setTimeout(async function () {
            try {
              var api = window.electronApi;
              if (!api) return;
              if (isSplit && api.openSplit) {
                await api.openSplit({
                  pageFile1: cfg.startupSplitLeft,
                  pageFile2: cfg.startupSplitRight,
                  fraction:  cfg.startupSplitFraction || 0.5
                });
              } else if (hasApps && api.openTool) {
                var maximize = layout === 'maximize';
                for (var i = 0; i < apps.length; i++) {
                  await api.openTool({ pageFile: apps[i], maximize: maximize });
                }
              }
            } catch (e) {}
          }, 200);
        });
      } catch (e) {}
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #fff;
      color: #000;
      min-height: 100vh;
    }

    /* ── Two-column layout ──────────────────────────────── */
    .launcher-layout {
      max-width: 1540px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      gap: 28px;
      align-items: flex-start;
    }
    .launcher-layout.sb-collapsed {
      max-width: 1200px;
    }

    .launcher {
      flex: 1;
      min-width: 0;
      padding: 44px 0 60px;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    .launcher-sidebar {
      width: 288px;
      flex-shrink: 0;
      padding-top: 44px;
      position: sticky;
      top: 0;
      max-height: 100vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #ccc transparent;
    }
    .launcher-layout.sb-collapsed .launcher-sidebar {
      display: none;
    }

    .l-header-btn.sb-toggle-btn.active {
      background: #000;
      color: #fff;
    }

    .sb-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 40px;
    }
    .sb-section {
      border: 2px solid #000;
      border-radius: 10px;
      overflow: hidden;
    }
    .sb-section-hd {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 11px 7px;
      border-bottom: 2px solid #000;
      background: #000;
    }
    .sb-section-title {
      font-size: 0.66rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #fff;
      flex: 1;
    }
    .sb-count-btn {
      background: rgba(255,255,255,0.14);
      border: 1.5px solid rgba(255,255,255,0.35);
      border-radius: 4px;
      color: #fff;
      font-family: inherit;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 2px 7px;
      cursor: pointer;
      transition: background 0.1s;
      white-space: nowrap;
      line-height: 1.4;
    }
    .sb-count-btn:hover { background: rgba(255,255,255,0.28); }
    .sb-list { display: flex; flex-direction: column; }
    .sb-item {
      padding: 7px 11px;
      border-bottom: 1.5px solid #eee;
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
    }
    .sb-item:last-child { border-bottom: none; }
    .sb-item:hover { background: #f6f6f6; }
    .sb-item-top {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 2px;
      min-width: 0;
    }
    .sb-tag {
      font-size: 0.59rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      padding: 1px 4px;
      border-radius: 3px;
      border: 1.5px solid currentColor;
      white-space: nowrap;
      flex-shrink: 0;
      line-height: 1.35;
    }
    .sb-tag-lesson     { color: #1d6b3f; }
    .sb-tag-test       { color: #b91c1c; }
    .sb-tag-assignment { color: #92400e; }
    .sb-tag-other      { color: #555; }
    .sb-tag-mindmap    { color: #1d4ed8; }
    .sb-tag-doc        { color: #6d28d9; }
    .sb-date {
      font-size: 0.7rem;
      font-weight: 700;
      color: #888;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .sb-date.sb-today    { color: #000; font-weight: 800; }
    .sb-date.sb-tomorrow { color: #555; }
    .sb-name {
      font-size: 0.82rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sb-meta {
      font-size: 0.7rem;
      font-weight: 500;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }
    .sb-empty {
      padding: 14px 11px;
      font-size: 0.79rem;
      font-weight: 600;
      color: #bbb;
      text-align: center;
    }

    .sb-item.sb-todo-overdue { background: #fff5f5; }
    .sb-item.sb-todo-overdue:hover { background: #ffe8e8; }
    .sb-todo-done { opacity: 0.52; }
    .sb-todo-done .sb-name { text-decoration: line-through; }
    .sb-subtodos { display: flex; flex-direction: column; gap: 1px; margin-top: 4px; }
    .sb-std-row { display: flex; align-items: center; gap: 5px; }
    .sb-std-check {
      width: 10px; height: 10px; border: 1.5px solid #ccc; border-radius: 2px;
      flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center;
    }
    .sb-std-check.sb-std-checked { background: #1a8a4a; border-color: #1a8a4a; }
    .sb-std-check.sb-std-checked::after { content: '✓'; color: #fff; font-size: 6px; font-weight: 900; }
    .sb-std-text {
      font-size: .7rem; color: #555; min-width: 0; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; flex: 1;
    }
    .sb-std-text.sb-std-done { text-decoration: line-through; color: #bbb; }
    .sb-check {
      width: 14px; height: 14px; border: 2px solid #bbb; border-radius: 3px;
      flex-shrink: 0; cursor: pointer; display: inline-flex; align-items: center;
      justify-content: center; transition: border-color 0.1s, background 0.1s;
      margin-top: 1px;
    }
    .sb-check:hover { border-color: #555; }
    .sb-check.sb-checked { background: #1a8a4a; border-color: #1a8a4a; }
    .sb-check.sb-checked::after { content: '✓'; color: #fff; font-size: 8px; font-weight: 900; }

    /* ── Count popup ─────────────────────────────────────── */
    .sb-count-popup {
      position: fixed;
      z-index: 1100;
      background: #fff;
      border: 2px solid #000;
      border-radius: 7px;
      box-shadow: 3px 3px 0 #000;
      padding: 10px 12px 12px;
      width: 150px;
    }
    .sb-count-popup label {
      display: block;
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      color: #000;
    }
    .sb-count-popup input[type="number"] {
      width: 100%;
      border: 2px solid #000;
      border-radius: 4px;
      padding: 5px 7px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      color: #000;
      background: #fff;
    }
    .sb-count-popup input[type="number"]:focus {
      outline: none;
      box-shadow: 2px 2px 0 #000;
    }

    /* ── Header ─────────────────────────────────────────── */
    .l-header {
      text-align: center;
      margin-bottom: 44px;
    }
    .l-header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.4px;
    }
    .l-header .subtitle {
      margin-top: 8px;
      font-size: 0.93rem;
      font-weight: 600;
      color: #000;
    }
    .l-header-actions {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .l-header-btn {
      background: #fff;
      border: 2px solid #000;
      border-radius: 7px;
      padding: 7px 16px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      color: #000;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .l-header-btn:hover {
      background: #000;
      color: #fff;
    }

    /* ── Grid ───────────────────────────────────────────── */
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(268px, 1fr));
      gap: 10px;
    }

    /* ── Card ───────────────────────────────────────────── */
    .app-card {
      background: #fff;
      border: 2px solid #000;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: box-shadow 0.14s, transform 0.1s;
    }
    .app-card:hover {
      box-shadow: 4px 4px 0 #000;
      transform: translate(-2px, -2px);
    }
    .app-card.config-open {
      box-shadow: 4px 4px 0 #000;
    }

    .card-body {
      padding: 12px 14px 8px;
      flex: 1;
      cursor: pointer;
      user-select: none;
    }
    .card-body:hover .card-title {
      text-decoration: underline;
    }
    .card-icon {
      font-size: 1.7rem;
      display: block;
      margin-bottom: 6px;
      user-select: none;
    }
    .card-title {
      font-size: 1.06rem;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .card-desc {
      font-size: 0.86rem;
      color: #000;
      font-weight: 500;
      line-height: 1.55;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px 8px;
      border-top: 1.5px solid #000;
    }
    .card-gear-btn {
      background: none;
      border: 1.5px solid #000;
      cursor: pointer;
      color: #000;
      font-size: 1.05rem;
      padding: 4px 7px;
      border-radius: 5px;
      line-height: 1;
      transition: background 0.1s, color 0.1s;
    }
    .card-gear-btn:hover {
      background: #000;
      color: #fff;
    }
    .card-gear-btn.active {
      background: #000;
      color: #fff;
    }

    /* ── Card drag handle ───────────────────────────────── */
    .card-drag-handle {
      color: #ccc;
      font-size: 0.95rem;
      cursor: grab;
      padding: 4px 6px;
      border-radius: 4px;
      user-select: none;
      line-height: 1;
      transition: color 0.1s;
      flex-shrink: 0;
    }
    .card-drag-handle:hover { color: #888; }
    .card-drag-handle:active { cursor: grabbing; }
    .app-card.is-dragging { opacity: 0.35; }

    /* ── Sections ───────────────────────────────────────── */
    .sections-container {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      padding: 2px 0;
    }

    .section-drag-handle {
      color: #ccc;
      font-size: 1rem;
      cursor: grab;
      padding: 2px 5px;
      border-radius: 4px;
      user-select: none;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.1s;
    }
    .section-drag-handle:hover { color: #777; }
    .section-drag-handle:active { cursor: grabbing; }

    .section-title {
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: #555;
      flex: 1;
      outline: none;
      border: 1.5px solid transparent;
      background: transparent;
      padding: 3px 6px;
      border-radius: 4px;
      min-width: 30px;
      cursor: text;
      transition: border-color 0.1s, background 0.1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .section-title:focus {
      border-color: #ccc;
      background: #f8f8f8;
      color: #000;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
    }
    .section-title:empty::before {
      content: attr(data-placeholder);
      color: #bbb;
      font-weight: 600;
    }

    .section-delete-btn {
      flex-shrink: 0;
      background: none;
      border: 1.5px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.72rem;
      color: #bbb;
      padding: 2px 6px;
      font-family: inherit;
      transition: color 0.15s, border-color 0.15s;
      opacity: 0;
    }
    .app-section:hover .section-delete-btn { opacity: 1; }
    .section-delete-btn:hover { color: #000; border-color: #000; }

    .section-add-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin-top: 8px;
      padding: 12px 20px;
      background: none;
      border: 2px dashed #ccc;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      color: #bbb;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .section-add-btn:hover { border-color: #888; color: #555; }

    /* ── Drag states ────────────────────────────────────── */
    .app-section.is-dragging { opacity: 0.4; }

    .drag-placeholder {
      background: #f6f6f6;
      border: 2px dashed #ccc;
      border-radius: 10px;
      min-height: 110px;
      pointer-events: none;
    }

    .section-drop-line {
      height: 3px;
      background: #000;
      border-radius: 2px;
      margin: -4px 0;
      pointer-events: none;
      flex-shrink: 0;
    }

    /* ── Modal overlay ─────────────────────────────────── */
    .lm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(0,0,0,0.55);
      place-items: center;
      padding: 24px;
    }
    .lm-overlay.open { display: grid; }
    .lm-box {
      background: #fff;
      border: 2px solid #000;
      border-radius: 10px;
      box-shadow: 6px 6px 0 #000;
      position: relative;
      overflow: hidden;
      width: 100%;
      max-width: 1280px;
    }
    .lm-box.lm-wide { max-width: 1560px; }
    .lm-close {
      position: absolute;
      top: 8px;
      right: 10px;
      background: #fff;
      border: 1.5px solid #000;
      border-radius: 5px;
      font-size: 0.9rem;
      cursor: pointer;
      color: #000;
      z-index: 1;
      line-height: 1;
      padding: 4px 8px;
      font-weight: 700;
      font-family: inherit;
      transition: background 0.1s, color 0.1s;
    }
    .lm-close:hover { background: #000; color: #fff; }
    .lm-frame { width: 100%; border: none; display: block; }

    /* ── Recent Files modal ─────────────────────────────── */
    .rf-modal-box { display: flex; flex-direction: column; max-height: 88vh; }
    .rf-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 18px 20px 14px; border-bottom: 2px solid #000; flex-shrink: 0; gap: 8px;
    }
    .rf-title    { font-size: 1.2rem; font-weight: 800; }
    .rf-subtitle { font-size: 0.86rem; font-weight: 600; margin-top: 3px; }
    .rf-close-btn {
      flex-shrink: 0; background: #fff; border: 1.5px solid #000; border-radius: 5px;
      font-size: 0.9rem; cursor: pointer; color: #000; line-height: 1; padding: 4px 8px;
      font-weight: 700; font-family: inherit; transition: background 0.1s, color 0.1s;
    }
    .rf-close-btn:hover { background: #000; color: #fff; }
    .rf-body { padding: 14px 20px 20px; overflow-y: auto; flex: 1; }
    .rf-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .rf-toolbar input[type="search"] {
      flex: 1; min-width: 130px; border: 2px solid #000; border-radius: 6px;
      padding: 6px 10px; font-family: inherit; font-size: 0.87rem; color: #000; background: #fff;
    }
    .rf-toolbar input[type="search"]:focus { outline: none; box-shadow: 2px 2px 0 #000; }
    .rf-toolbar select {
      border: 2px solid #000; border-radius: 6px; padding: 6px 10px;
      font-family: inherit; font-size: 0.87rem; font-weight: 600; color: #000; background: #fff; cursor: pointer;
    }
    .rf-toolbar select:focus { outline: none; box-shadow: 2px 2px 0 #000; }
    .rf-result-count { font-size: 0.82rem; font-weight: 700; white-space: nowrap; margin-left: auto; }
    .rf-file-list { display: flex; flex-direction: column; gap: 7px; }
    .rf-file-row {
      border: 2px solid #000; border-radius: 8px; padding: 10px 14px;
      display: flex; align-items: center; gap: 12px; transition: box-shadow 0.1s, transform 0.1s;
    }
    .rf-file-row:hover { box-shadow: 3px 3px 0 #000; transform: translate(-1px,-1px); }
    .rf-type-tag {
      flex-shrink: 0; font-size: 0.68rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.5px; padding: 3px 6px; border-radius: 4px; border: 1.5px solid #000; white-space: nowrap;
    }
    .rf-section-heading {
      font-size: 0.68rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.8px; margin-top: 24px; margin-bottom: 10px;
    }
    .rf-file-info { flex: 1; min-width: 0; }
    .rf-file-name {
      font-size: 0.91rem; font-weight: 700; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;
    }
    .rf-file-meta { font-size: 0.77rem; font-weight: 600; }
    .rf-open-btn {
      flex-shrink: 0; padding: 6px 12px; border-radius: 6px; border: 2px solid #000;
      background: #000; color: #fff; font-family: inherit; font-size: 0.83rem; font-weight: 700;
      cursor: pointer; white-space: nowrap; transition: background 0.1s, color 0.1s;
    }
    .rf-open-btn:hover { background: #fff; color: #000; }
    .rf-state-msg {
      text-align: center; padding: 36px 24px; font-size: 0.91rem; font-weight: 600;
      border: 2px solid #000; border-radius: 10px;
    }
    .rf-state-icon { font-size: 1.8rem; margin-bottom: 8px; display: block; }
    .rf-file-snippet {
      font-size: 0.74rem; font-weight: 500; color: #555; font-style: italic;
      margin-top: 3px; white-space: normal; overflow: hidden;
      display: -webkit-box; line-clamp: 2; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }

    /* ── Context menu ───────────────────────────────────── */
    #rfCtxMenu {
      position: fixed;
      background: #fff;
      border: 2px solid #000;
      border-radius: 8px;
      box-shadow: 4px 4px 0 #000;
      min-width: 190px;
      z-index: 9999;
      padding: 4px 0;
      display: none;
    }
    #rfCtxMenu.open { display: block; }
    .rf-ctx-item {
      display: block;
      width: 100%;
      padding: 8px 16px;
      background: none;
      border: none;
      text-align: left;
      cursor: pointer;
      color: #111;
      font-family: inherit;
      font-size: 0.84rem;
      font-weight: 600;
    }
    .rf-ctx-item:hover { background: #f0f0f0; }
    .rf-ctx-item.danger { color: #c00; }
    .rf-ctx-item.danger:hover { background: #fff0f0; }
    .rf-ctx-sep { height: 1px; background: #ddd; margin: 4px 8px; }

    /* ── Config popup ───────────────────────────────────── */
    .cfg-popup {
      position: fixed;
      z-index: 1000;
      background: #fff;
      border: 2px solid #000;
      border-radius: 8px;
      box-shadow: 4px 4px 0 #000;
      width: 280px;
      padding: 14px 16px 16px;
    }
    .cfg-label {
      display: block;
      font-size: 0.71rem;
      font-weight: 800;
      color: #000;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 4px;
    }
    .cfg-input {
      width: 100%;
      border: 2px solid #000;
      border-radius: 5px;
      padding: 6px 9px;
      font-family: inherit;
      font-size: 0.88rem;
      color: #000;
      background: #fff;
      margin-bottom: 12px;
      transition: box-shadow 0.1s;
    }
    .cfg-input:focus {
      outline: none;
      box-shadow: 2px 2px 0 #000;
    }
    .cfg-notes {
      resize: vertical;
      min-height: 54px;
      margin-bottom: 0;
    }
    .cfg-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    .cfg-row > div { flex: 1; }
    .cfg-row .cfg-input { margin-bottom: 0; }
  </style>
</head>
<body>
<div id="sbCountPopup" class="sb-count-popup" hidden>
  <label data-i18n="sbCountTooltip">Number of items to show</label>
  <input type="number" id="sbCountInput" min="1" max="20" step="1">
</div>
<div id="cfgPopup" class="cfg-popup" hidden>
  <label class="cfg-label" data-i18n="cfgLabelCustomLabel">Custom label</label>
  <input class="cfg-input cfg-label-input" type="text" placeholder="">
  <label class="cfg-label" data-i18n="cfgLabelNotes">Personal notes</label>

<script>
  const APPS = [
    {
      id: 'board',
      pageFile: 'board.html',
      icon: '🖥',
      title: 'Board',
      desc: 'Interactive classroom display for activities, group games, timers, and constellation mind maps.'
    },
    {
      id: 'classManagement',
      pageFile: 'class-management.html',
      icon: '👥',

      desc: 'Manage class groups, track participation, and export session data for individual classes.'
    },
    {

      title: 'Participation Tracker',

    },
    {

      icon: '✏️',
      title: 'Group Editor',
      desc: 'Create, edit, archive, and delete class groups stored in class-groups.js.'
    },
    {
      id: 'learningTools',
      pageFile: 'learning-tools.html',
      icon: '📖',
      title: 'Learning Tools',
      desc: 'Vocabulary, word work, grammar practice, and custom activity presentation for the classroom.'
    },
    {
      id: 'manageDatabase',
      pageFile: 'manage-database.html',
      icon: '🗂',
      title: 'Manage Database',
      desc: 'Create and edit custom word banks, dictations, grammar banks, stories, and quiz content.'
    },
    {
      id: 'classPlan',
      pageFile: 'class-plan.html',
      icon: '🪑',
      title: 'Class Plan',
      desc: 'Design and manage seating plans with grid, U-shape, and pod desk layouts. Assign students by drag-and-drop.'
    },
    {
      id: 'scheduleMaker',
      pageFile: 'schedule-maker.html',
      icon: '🗓',
      title: 'Schedule Maker',
      desc: 'Plan oral exam sessions with concurrent prep/exam timing and SEN accommodations.'
    },
    {
      id: 'oralMarking',
      pageFile: 'oral-marking.html',
      icon: '🎙',
      title: 'Oral Marking',
      desc: 'Run oral exam sessions with per-student timers, criteria scoring, and live presenter view.'
    },
    {
      id: 'generalConfig',
      pageFile: 'pages/general-config.html',
      icon: '⚙',
      title: 'General Config',
      desc: 'Set the app title, configure data and backup folders, and adjust launcher preferences.',
      modal: true
    },
    {
      id: 'fileManager',
      pageFile: 'file-manager.html',
      icon: '📂',
      title: 'File Manager',
      desc: 'Browse, rename, and sync your data files.'
    },
    {
      id: 'documentEditor',
      pageFile: 'document-editor.html',
      icon: '✍️',
      title: 'Document Editor',
      desc: 'Write Markdown with LaTeX math (KaTeX), custom CSS stylesheets, templates, and PDF export.'
    },
    {
      id: 'planner',
      pageFile: 'planner.html',
      icon: '📅',
      title: 'Planner',
      desc: 'Plan your semester: schedule lessons, tests, and assignments by class with ICS export.'
    },
    {
      id: 'importTool',
      pageFile: 'import-tool.html',
      icon: '📥',
      title: 'Import',
      desc: 'Import students and class groups from CSV, XLSX, or JSON files with flexible column mapping.'
    }
  ];

  // ── Group (section) data ────────────────────────────────
  var DEFAULT_GROUPS = [
    { id: 'grp-classroom', labelKey: 'sectionClassroom', cardIds: ['board', 'classManagement', 'learningTools'] },
    { id: 'grp-students',  labelKey: 'sectionStudents',  cardIds: ['participationTracker', 'gradeSheet', 'groupEditor', 'classPlan', 'planner', 'importTool'] },
    { id: 'grp-content',   labelKey: 'sectionContent',   cardIds: ['manageDatabase', 'documentEditor', 'scheduleMaker'] },
    { id: 'grp-system',    labelKey: 'sectionSystem',    cardIds: ['generalConfig', 'fileManager'] }
  ];

  function getGroups() {
    try {
      var raw = localStorage.getItem('cmt-launcher-groups');
      if (!raw) return null;
      return JSON.parse(raw);
    } catch (e) { return null; }
  }

  function saveGroups(groups) {
    localStorage.setItem('cmt-launcher-groups', JSON.stringify(groups));
  }

  function resolveGroups() {
    var groups = getGroups();
    if (!groups) {
      groups = DEFAULT_GROUPS.map(function(dg) {
        return { id: dg.id, label: (typeof t === 'function' ? t(dg.labelKey) : dg.labelKey), cardIds: dg.cardIds.slice() };
      });
    }
    var allIds = APPS.map(function(a) { return a.id; });
    var validIds = {};
    allIds.forEach(function(id) { validIds[id] = true; });
    var assigned = {};
    groups.forEach(function(g) { g.cardIds.forEach(function(id) { assigned[id] = true; }); });
    var unassigned = allIds.filter(function(id) { return !assigned[id]; });
    if (unassigned.length && groups.length) groups[groups.length - 1].cardIds = groups[groups.length - 1].cardIds.concat(unassigned);
    groups.forEach(function(g) { g.cardIds = g.cardIds.filter(function(id) { return validIds[id]; }); });
    return groups;
  }

  function genGroupId() {
    return 'grp-' + Math.random().toString(36).slice(2, 9);
  }

  // ── Drag state ──────────────────────────────────────────
  var dragState        = null;
  var draggedEl        = null;
  var dragPlaceholder  = null;
  var sectionDropLine  = null;
  var dropBeforeSection = null;

  // ── Render sections ─────────────────────────────────────
  function renderSections() {
    closePopup();
    var container = document.getElementById('sectionsContainer');
    container.innerHTML = '';
    var groups = resolveGroups();
    groups.forEach(function(group) { container.appendChild(buildSection(group)); });
    setupSectionContainerDrag(container);
  }

  function buildSection(group) {
    var appMap = {};
    APPS.forEach(function(a) { appMap[a.id] = a; });

    var section = document.createElement('div');
    section.className = 'app-section';
    section.dataset.sectionId = group.id;

    // Header
    var header = document.createElement('div');
    header.className = 'section-header';

    var handle = document.createElement('span');
    handle.className = 'section-drag-handle';
    handle.textContent = '⠿';
    handle.title = typeof t === 'function' ? t('sectionDragHandleTitle') : 'Drag to reorder';
    handle.setAttribute('aria-hidden', 'true');

    var title = document.createElement('span');
    title.className = 'section-title';
    title.contentEditable = 'true';
    title.textContent = group.label;
    title.setAttribute('data-placeholder', typeof t === 'function' ? t('sectionNamePlaceholder') : 'Section name');
    title.spellcheck = false;
    title.addEventListener('mousedown', function(e) { e.stopPropagation(); });
    title.addEventListener('dragstart', function(e) { e.stopPropagation(); e.preventDefault(); });
    title.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); this.blur(); }
      if (e.key === 'Escape') { this.textContent = group.label; this.blur(); }
    });
    title.addEventListener('blur', function() {
      var newLabel = this.textContent.trim();
      if (!newLabel) { this.textContent = group.label; return; }
      group.label = newLabel;
      var groups = resolveGroups();
      var g = groups.find(function(g) { return g.id === group.id; });
      if (g) { g.label = newLabel; saveGroups(groups); }
    });

    var deleteBtn = document.createElement('button');
    deleteBtn.className = 'section-delete-btn';
    deleteBtn.title = typeof t === 'function' ? t('sectionDeleteTitle') : 'Delete section';
    deleteBtn.textContent = '✕';
    deleteBtn.addEventListener('click', function() {
      var groups = resolveGroups();
      var g = groups.find(function(g) { return g.id === group.id; });
      if (!g) return;
      if (g.cardIds.length > 0) {
        header.style.transition = 'background 0.1s';
        header.style.background = '#fee2e2';
        title.title = typeof t === 'function' ? t('sectionNotEmptyHint') : 'Move all cards out before deleting';
        setTimeout(function() { header.style.background = ''; header.style.transition = ''; title.title = ''; }, 800);
        return;
      }
      var newGroups = groups.filter(function(g) { return g.id !== group.id; });
      if (!newGroups.length) return;
      saveGroups(newGroups);
      renderSections();
    });

    header.appendChild(handle);
    header.appendChild(title);
    header.appendChild(deleteBtn);
    setupSectionHandleDrag(handle, section, group.id);

    // Grid
    var grid = document.createElement('div');
    grid.className = 'apps-grid section-grid';
    grid.dataset.sectionId = group.id;
    group.cardIds.forEach(function(id) {
      var app = appMap[id];
      if (app) grid.appendChild(buildCard(app));
    });
    setupGridDrag(grid, group.id);

    section.appendChild(header);
    section.appendChild(grid);
    return section;
  }

  // ── Card drag ───────────────────────────────────────────
  function setupCardHandleDrag(handle, card, appId) {
    var _ok = false;
    handle.addEventListener('mousedown', function() { _ok = true; });
    card.addEventListener('dragstart', function(e) {
      if (!_ok) { e.preventDefault(); return; }
      _ok = false;
      e.stopPropagation();
      var sectionEl = card.closest('.app-section');
      dragState = { type: 'card', appId: appId, fromSectionId: sectionEl ? sectionEl.dataset.sectionId : null };
      draggedEl = card;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', appId);
      dragPlaceholder = document.createElement('div');
      dragPlaceholder.className = 'drag-placeholder';
      requestAnimationFrame(function() { card.classList.add('is-dragging'); });
    });
    card.addEventListener('dragend', function() {
      _ok = false;
      card.classList.remove('is-dragging');
      if (dragPlaceholder) { dragPlaceholder.remove(); dragPlaceholder = null; }
      dragState = null;
      draggedEl = null;
    });
  }

  function findInsertionCard(grid, clientX, clientY) {
    var cards = Array.from(grid.querySelectorAll('.app-card:not(.is-dragging):not(.drag-placeholder)'));
    for (var i = 0; i < cards.length; i++) {
      var r = cards[i].getBoundingClientRect();
      var midY = r.top + r.height / 2;
      var midX = r.left + r.width / 2;
      if (Math.abs(clientY - midY) < r.height / 2 && clientX < midX) return cards[i];
      if (clientY < midY) return cards[i];
    }
    return null;
  }

  function setupGridDrag(grid, sectionId) {
    grid.addEventListener('dragover', function(e) {
      if (!dragState || dragState.type !== 'card') return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (!dragPlaceholder) return;
      var insertBefore = findInsertionCard(grid, e.clientX, e.clientY);
      if (insertBefore) grid.insertBefore(dragPlaceholder, insertBefore);
      else grid.appendChild(dragPlaceholder);
    });
    grid.addEventListener('drop', function(e) {
      if (!dragState || dragState.type !== 'card') return;
      e.preventDefault();
      var insertBeforeId = null;
      if (dragPlaceholder && dragPlaceholder.parentNode === grid && dragPlaceholder.nextElementSibling) {
        insertBeforeId = dragPlaceholder.nextElementSibling.dataset.id;
      }
      var appId = dragState.appId;
      var groups = resolveGroups();
      groups.forEach(function(g) {
        var i = g.cardIds.indexOf(appId);
        if (i !== -1) g.cardIds.splice(i, 1);
      });
      var toGroup = groups.find(function(g) { return g.id === sectionId; });
      if (toGroup) {
        if (insertBeforeId) {
          var bi = toGroup.cardIds.indexOf(insertBeforeId);
          if (bi !== -1) toGroup.cardIds.splice(bi, 0, appId);
          else toGroup.cardIds.push(appId);
        } else {
          toGroup.cardIds.push(appId);
        }
      }
      saveGroups(groups);
      renderSections();
    });
  }

  // ── Section drag ────────────────────────────────────────
  function setupSectionHandleDrag(handle, sectionEl, sectionId) {
    var _ok = false;
    sectionEl.draggable = true;
    handle.addEventListener('mousedown', function() { _ok = true; });
    sectionEl.addEventListener('dragstart', function(e) {
      if (!_ok) { e.preventDefault(); return; }
      _ok = false;
      dragState = { type: 'section', sectionId: sectionId };
      draggedEl = sectionEl;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', sectionId);
      requestAnimationFrame(function() { sectionEl.classList.add('is-dragging'); });
    });
    sectionEl.addEventListener('dragend', function() {
      _ok = false;
      sectionEl.classList.remove('is-dragging');
      if (sectionDropLine) { sectionDropLine.remove(); sectionDropLine = null; }
      dropBeforeSection = null;
      dragState = null;
      draggedEl = null;
    });
  }

  function setupSectionContainerDrag(container) {
    container.addEventListener('dragover', function(e) {
      if (!dragState || dragState.type !== 'section') return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (!sectionDropLine) {
        sectionDropLine = document.createElement('div');
        sectionDropLine.className = 'section-drop-line';
      }
      var sections = Array.from(container.querySelectorAll('.app-section:not(.is-dragging)'));
      dropBeforeSection = null;
      for (var i = 0; i < sections.length; i++) {
        var r = sections[i].getBoundingClientRect();
        if (e.clientY < r.top + r.height / 2) { dropBeforeSection = sections[i]; break; }
      }
      if (dropBeforeSection) container.insertBefore(sectionDropLine, dropBeforeSection);
      else container.appendChild(sectionDropLine);
    });
    container.addEventListener('drop', function(e) {
      if (!dragState || dragState.type !== 'section') return;
      e.preventDefault();
      var sectionId = dragState.sectionId;
      var groups = resolveGroups();
      var draggedGroup = groups.find(function(g) { return g.id === sectionId; });
      if (!draggedGroup) return;
      var newGroups = groups.filter(function(g) { return g.id !== sectionId; });
      var insertIdx = newGroups.length;
      if (dropBeforeSection) {
        var beforeId = dropBeforeSection.dataset.sectionId;
        var bi = newGroups.findIndex(function(g) { return g.id === beforeId; });
        if (bi !== -1) insertIdx = bi;
      }
      newGroups.splice(insertIdx, 0, draggedGroup);
      saveGroups(newGroups);
      renderSections();
    });
    container.addEventListener('dragleave', function(e) {
      if (!sectionDropLine) return;
      if (!container.contains(e.relatedTarget)) { sectionDropLine.remove(); sectionDropLine = null; }
    });
  }

  function getCardConfig(id) {
    try { return JSON.parse(localStorage.getItem('cmt-card-config-' + id) || '{}'); } catch { return {}; }
  }

  function saveCardConfig(id, data) {
    localStorage.setItem('cmt-card-config-' + id, JSON.stringify(data));
  }

  function getGeneralConfig() {
    try { return JSON.parse(localStorage.getItem('cmt-general-config') || '{}'); } catch { return {}; }
  }

  function applyTitle() {
    const cfg = getGeneralConfig();
    const title = (cfg.appTitle && cfg.appTitle.trim()) || 'Class Management Tools';
    document.getElementById('appTitle').textContent = title;
    document.title = title;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function openApp(pageFile, cardCfg) {
    if (window.Desktop && Desktop.isElectron()) {
      const opts = {};
      const size = cardCfg ? Number(cardCfg.windowSize) : 0;
      if (size >= 20 && size <= 100) opts.windowSizeRatio = size / 100;
      if (cardCfg && cardCfg.windowPosition) opts.windowPosition = cardCfg.windowPosition;
      Desktop.openTool(pageFile, opts);
    } else {
      window.location.href = pageFile;
    }
  }

  function buildCard(app) {
    const cfg = getCardConfig(app.id);
    const localTitle = (typeof t === 'function' ? t('app_' + app.id + '_title') : null) || app.title;
    const localDesc  = (typeof t === 'function' ? t('app_' + app.id + '_desc')  : null) || app.desc;
    const label = (cfg.customLabel && cfg.customLabel.trim()) || localTitle;

    const card = document.createElement('div');
    card.className = 'app-card';
    card.draggable = true;
    card.dataset.id = app.id;

    const gearTitle = typeof t === 'function' ? t('cfgGearTitle') : 'Card settings';
    card.innerHTML =
      '<div class="card-body">' +
        '<span class="card-icon" aria-hidden="true">' + app.icon + '</span>' +
        '<div class="card-title">' + escHtml(label) + '</div>' +
        '<div class="card-desc">' + escHtml(localDesc) + '</div>' +
      '</div>' +
      '<div class="card-footer">' +
        '<span class="card-drag-handle" aria-hidden="true">⠿</span>' +
        '<button class="card-gear-btn" title="' + escHtml(gearTitle) + '" aria-label="' + escHtml(gearTitle) + '">⚙</button>' +
      '</div>';

    const cardBody = card.querySelector('.card-body');
    const gearBtn  = card.querySelector('.card-gear-btn');
    const dragHdl  = card.querySelector('.card-drag-handle');
    setupCardHandleDrag(dragHdl, card, app.id);

    cardBody.addEventListener('click', function () {
      if (app.modal) {
        openModal(app.pageFile);
      } else {
        openApp(app.pageFile, getCardConfig(app.id));
      }
    });

    gearBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      const popup = document.getElementById('cfgPopup');
      if (!popup.hidden && currentGearBtn === gearBtn) {
        closePopup();
      } else {
        showPopup(gearBtn, card, app);
      }
    });

    return card;
  }

  let currentPopupApp = null;

  function showPopup(gearBtn, card, app) {
    const popup = document.getElementById('cfgPopup');
    currentPopupApp = app;
    currentGearBtn  = gearBtn;
    currentCard     = card;

    const cfg = getCardConfig(app.id);
    const localTitle = (typeof t === 'function' ? t('app_' + app.id + '_title') : null) || app.title;
    popup.querySelector('.cfg-label-input').placeholder = localTitle + ' (default)';
    popup.querySelector('.cfg-label-input').value = cfg.customLabel || '';
    popup.querySelector('.cfg-notes').value        = cfg.notes || '';
    popup.querySelector('.cfg-size-input').value   = cfg.windowSize || '';
    popup.querySelector('.cfg-pos-select').value   = cfg.windowPosition || '';

    // Measure off-screen then position
    popup.style.visibility = 'hidden';
    popup.hidden = false;

    const rect   = gearBtn.getBoundingClientRect();
    const pw     = popup.offsetWidth;
    const ph     = popup.offsetHeight;
    let top  = rect.top - ph - 8;
    if (top < 8) top = rect.bottom + 8;
    let left = rect.left;
    if (left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
    if (left < 8) left = 8;

    popup.style.top  = top  + 'px';
    popup.style.left = left + 'px';
    popup.style.visibility = '';

    gearBtn.classList.add('active');
    card.classList.add('config-open');
  }

  var rfAllFiles = [];
  var rfAllDocs  = [];
  var rfAllArchivedFiles = [];
  var rfContentCache = new Map();
  var rfGroupMeta = {};
  var rfContentSearchTimer = null;
  var RF_IMAGE_EXTS = ['.png', '.jpg', '.jpeg', '.gif', '.webp', '.svg'];
  var RF_SOUND_EXTS = ['.mp3', '.wav', '.ogg', '.m4a', '.aac'];
  var RF_DOC_EXTS   = RF_IMAGE_EXTS.concat(RF_SOUND_EXTS, ['.pdf', '.epub']);
  var RF_SESSION_TYPES    = ['mindmaps'];
  var RF_DOC_TYPE_FILTERS = ['pdf', 'image', 'sound', 'book'];

  function rfGetSnippet(text, query) {
    if (!text || !query) return '';
    var idx = text.indexOf(query);
    if (idx === -1) return '';
    var ctx = 55;
    var start = Math.max(0, idx - ctx);
    var end = Math.min(text.length, idx + query.length + ctx);
    var snippet = text.slice(start, end).trim();
    if (start > 0) snippet = '[…] ' + snippet;
    if (end < text.length) snippet += ' […]';
    return snippet;
  }

  function rfExtractSearchText(rawContent) {
    var parts = [];
    var re = /"(?:baseWord|text|label|title)"\s*:\s*"((?:[^"\\]|\\.)*)"/g;
    var m;
    while ((m = re.exec(rawContent)) !== null) {
      if (m[1]) parts.push(m[1].replace(/\\n/g, ' ').replace(/\\r/g, ' ').replace(/\\"/g, '"'));
    }
    return parts.join(' ').toLowerCase();
  }

  async function rfRunContentSearch() {
    rfContentSearchTimer = null;
    var search = document.getElementById('rfSearchBox').value.trim().toLowerCase();
    if (!search) { rfApplyFilters(); return; }
    if (!(window.Desktop && Desktop.isElectron() && typeof Desktop.readByPath === 'function')) {
      rfApplyFilters(); return;
    }
    var allConstellationFiles = rfAllFiles.concat(rfAllArchivedFiles);
    var toRead = allConstellationFiles.filter(function(f) {
      var key = (f.target || 'mindmaps') + ':' + (f.relativePath || f.filename);
      return !rfContentCache.has(key);
    });
    if (toRead.length > 0) {
      document.getElementById('rfResultCount').textContent = typeof t === 'function' ? t('rfSearching') : 'Searching…';
      var BATCH = 8;
      for (var i = 0; i < toRead.length; i += BATCH) {
        var batch = toRead.slice(i, i + BATCH);
        await Promise.all(batch.map(async function(f) {
          var key = (f.target || 'mindmaps') + ':' + (f.relativePath || f.filename);
          try {
            var result = await Desktop.readByPath(f.target || 'mindmaps', f.relativePath || f.filename);
            rfContentCache.set(key, rfExtractSearchText(result && result.content ? result.content : ''));
          } catch(e) {
            rfContentCache.set(key, '');
          }
        }));
      }
    }
    rfApplyFilters();
  }

  function rfFormatDate(ms) {
    if (!ms) return '—';
    var d = new Date(ms);
    return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }) +
           ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
  }

  function rfStripClassPrefix(fn) {
    var base = fn.replace(/\.(js|json)$/i, '');
    for (var _id in rfGroupMeta) {
      var _safe = String(_id).trim().replace(/[\\/:*?"<>|]/g, '').replace(/\s+/g, '_');
      if (_safe && base.startsWith(_safe + '_')) {
        var _rest = base.slice(_safe.length + 1);
        var _name = (rfGroupMeta[_id] && rfGroupMeta[_id].name) || null;
        return { title: _rest.replace(/_/g, ' ').replace(/-Autosave$/, ' (autosave)').trim(), className: _name };
      }
    }
    return { title: base.replace(/_/g, ' ').replace(/-Autosave$/, ' (autosave)').trim(), className: null };
  }

  function rfPrettyName(fn) {
    return rfStripClassPrefix(fn).title;
  }

  function rfFileDateMs(f) { return f.savedAt || f.createdAt || f.mtimeMs || 0; }

  function rfGetSortFn(order) {
    if (order === 'date-asc')  return function(a,b){ return rfFileDateMs(a) - rfFileDateMs(b); };
    if (order === 'name-asc')  return function(a,b){ return rfPrettyName(a.filename).localeCompare(rfPrettyName(b.filename)); };
    if (order === 'name-desc') return function(a,b){ return rfPrettyName(b.filename).localeCompare(rfPrettyName(a.filename)); };
    if (order === 'size-desc') return function(a,b){ return (b.size||0) - (a.size||0); };
    return function(a,b){ return rfFileDateMs(b) - rfFileDateMs(a); };
  }

  function rfDocTypeInfo(filename) {
    var ext = '.' + (filename || '').split('.').pop().toLowerCase();
    if (RF_IMAGE_EXTS.indexOf(ext) !== -1) return { label: 'Image', cssClass: 'image' };
    if (RF_SOUND_EXTS.indexOf(ext) !== -1) return { label: 'Sound', cssClass: 'sound' };
    if (ext === '.pdf')  return { label: 'PDF',  cssClass: 'pdf' };
    if (ext === '.epub') return { label: 'Book', cssClass: 'book' };
    return { label: ext.slice(1).toUpperCase(), cssClass: '' };
  }

  function rfMakeRow(tag, name, nameTitle, meta, btn) {
    var row = document.createElement('div');
    row.className = 'rf-file-row';
    var tagEl = document.createElement('span');
    tagEl.className = 'rf-type-tag'; tagEl.textContent = tag;
    var fi = document.createElement('div'); fi.className = 'rf-file-info';
    var nm = document.createElement('div'); nm.className = 'rf-file-name';
    nm.textContent = name; nm.title = nameTitle;
    var mt = document.createElement('div'); mt.className = 'rf-file-meta'; mt.textContent = meta;
    fi.appendChild(nm); fi.appendChild(mt);
    row.appendChild(tagEl); row.appendChild(fi);
    if (btn) row.appendChild(btn);
    return row;
  }

  function rfRenderFiles(files) {
    var list = document.getElementById('rfFileList');
    if (!files.length) {
      list.innerHTML = '<div class="rf-state-msg"><span class="rf-state-icon">📭</span>' + (typeof t === 'function' ? t('rfNoFiles') : 'No files found.') + '</div>';
      return;
    }
    list.innerHTML = '';
    files.forEach(function(f) {
      var rel = (f.relativePath || f.filename || '').replace(/\\/g, '/');
      var isArchived = rel.split('/').indexOf('archived') !== -1;
      var label = isArchived ? (typeof t === 'function' ? t('rfArchivedLabel') : 'Archived') : (RF_TYPE_LABELS[f.target] || f.target);
      var kb = f.size ? (f.size / 1024).toFixed(1) + ' KB' : '';
      var stripped = rfStripClassPrefix(f.filename);
      var meta = (stripped.className ? stripped.className + ' · ' : '') + rfFormatDate(rfFileDateMs(f)) + (kb ? ' · ' + kb : '');
      var btn = document.createElement('button');
      btn.className = 'rf-open-btn'; btn.textContent = typeof t === 'function' ? t('rfOpenInBoard') : 'Open in Board ↗';
      (function(target, filename, relPath) {
        btn.addEventListener('click', function() { rfOpenFile(target, filename, relPath); });
      })(f.target, f.filename, f.relativePath);
      var row = rfMakeRow(label, stripped.title, f.filename, meta, btn);
      if (typeof rfAttachCtx === 'function') { (function(f, r) { rfAttachCtx(r, f); })(f, row); }
      var search = document.getElementById('rfSearchBox').value.trim().toLowerCase();
      if (search) {
        var cacheKey = (f.target || 'mindmaps') + ':' + (f.relativePath || f.filename);
        var cached = rfContentCache.get(cacheKey);
        if (cached) {
          var snippet = rfGetSnippet(cached, search);
          if (snippet) {
            var fi = row.querySelector('.rf-file-info');
            if (fi) {
              var snEl = document.createElement('div');
              snEl.className = 'rf-file-snippet';
              snEl.textContent = snippet;
              fi.appendChild(snEl);
            }
          }
        }
      }
      list.appendChild(row);
    });
  }

  function rfRenderDocs(files) {
    var heading = document.getElementById('rfDocsHeading');
    var list    = document.getElementById('rfDocsList');
    if (!files.length) { heading.style.display = 'none'; list.innerHTML = ''; return; }
    heading.style.display = '';
    list.innerHTML = '';
    files.forEach(function(f) {
      var info = rfDocTypeInfo(f.filename);
      var kb = f.size ? (f.size / 1024).toFixed(1) + ' KB' : '';
      var row = rfMakeRow(info.label, f.filename, f.relativePath || f.filename,
        rfFormatDate(f.mtimeMs) + (kb ? ' · ' + kb : ''), null);
      if (typeof rfAttachCtx === 'function') { (function(f, r) { rfAttachCtx(r, f); })(f, row); }
      list.appendChild(row);
    });
  }

  function rfApplyFilters() {
    var filter = document.getElementById('rfTypeFilter').value;
    var search = document.getElementById('rfSearchBox').value.trim().toLowerCase();
    var sort   = document.getElementById('rfSortOrder').value;
    var isDoc  = RF_DOC_TYPE_FILTERS.indexOf(filter) !== -1;
    var isSess = RF_SESSION_TYPES.indexOf(filter) !== -1;
    // When searching constellation files, include archived files too
    var sessionPool = (search && !isDoc) ? rfAllFiles.concat(rfAllArchivedFiles) : rfAllFiles;
    var ff = isDoc ? [] : sessionPool.filter(function(f) {
      if (isSess && f.target !== filter) return false;
      if (search) {
        var _sp = rfStripClassPrefix(f.filename);
        var _searchable = (_sp.className ? _sp.className + ' ' : '') + _sp.title;
        if (_searchable.toLowerCase().indexOf(search) !== -1) return true;
        var key = (f.target || 'mindmaps') + ':' + (f.relativePath || f.filename);
        if (rfContentCache.has(key)) return rfContentCache.get(key).indexOf(search) !== -1;
        return false;
      }
      return true;
    });
    ff.sort(rfGetSortFn(sort));
    rfRenderFiles(ff);
    var fd = isSess ? [] : rfAllDocs.filter(function(f) {
      if (isDoc && rfDocTypeInfo(f.filename).cssClass !== filter) return false;
      if (search && f.filename.toLowerCase().indexOf(search) === -1) return false;
      return true;
    });
    fd.sort(rfGetSortFn(sort));
    rfRenderDocs(fd);
    var total = ff.length + fd.length;
    var fileWord = typeof t === 'function' ? (total === 1 ? t('rfFile') : t('rfFiles')) : (total === 1 ? 'file' : 'files');
    document.getElementById('rfResultCount').textContent = total + ' ' + fileWord;
  }

  function rfOpenFile(target, filename, relativePath) {

    Desktop.openTool('board.html', { query: { openSession: '1', openTarget: target, openFilename: filename, openRelPath: relativePath || filename } });
  }

        var cgd = cgFn();
        if (cgd && cgd.classGroupsMeta) rfGroupMeta = cgd.classGroupsMeta;
      }
    } catch(e) {}

    rfApplyFilters();

  function sbTodayStr() { return new Date().toISOString().slice(0, 10); }
  function sbTomorrowStr() {
    var d = new Date(); d.setDate(d.getDate() + 1); return d.toISOString().slice(0, 10);
  }
  function sbFormatDate(dateStr) {
    if (!dateStr) return '';
    var td = sbTodayStr(), tm = sbTomorrowStr();
    if (dateStr === td) return typeof t === 'function' ? t('sbToday')    : 'Today';
    if (dateStr === tm) return typeof t === 'function' ? t('sbTomorrow') : 'Tomorrow';
    return new Date(dateStr + 'T12:00:00').toLocaleDateString(undefined, { weekday: 'short', day: 'numeric', month: 'short' });
  }

  function sbTypeLabel(type) {
    var map = { lesson: 'sbTypeLesson', test: 'sbTypeTest', assignment: 'sbTypeAssignment' };
    var key = map[type];
    return (key && typeof t === 'function') ? t(key) : (typeof t === 'function' ? t('sbTypeOther') : 'Event');
  }
  function sbTypeClass(type) {
    return { lesson: 'sb-tag-lesson', test: 'sb-tag-test', assignment: 'sb-tag-assignment' }[type] || 'sb-tag-other';
  }

  async function sbLoadEvents() {
    var list = document.getElementById('sbEventsList');
    list.innerHTML = '<div class="sb-empty">' + escHtml(typeof t === 'function' ? t('sbLoading') : 'Loading…') + '</div>';
    if (!window.Desktop || !Desktop.isElectron()) {
      list.innerHTML = '<div class="sb-empty">' + escHtml(typeof t === 'function' ? t('sbEmpty') : 'Nothing here yet') + '</div>';
      return;
    }

    // Load planner config, class-groups, and entries in parallel
    var cfg = null;
    var classMeta = {};  // classId → { name }
    var entries = [];
    await Promise.all([
      (async function() {
        try {
          var rc = await Desktop.readByPath('user', 'planner-config.js');
          if (rc && rc.content) {
            var mc = rc.content.match(/PLANNER_CONFIG\s*=\s*(\{[\s\S]*\})\s*;/);
            if (mc) cfg = JSON.parse(mc[1]);
          }
        } catch(e) {}
      })(),
      (async function() {
        try {
          var rg = await Desktop.readByPath('user', 'class-groups.js');
          if (rg && rg.content) {
            var fn = new Function(rg.content + '\nreturn typeof CLASS_GROUPS_DATA !== "undefined" ? CLASS_GROUPS_DATA : null;');
            var cgd = fn();
            if (cgd && cgd.classGroupsMeta) classMeta = cgd.classGroupsMeta;
          }
        } catch(e) {}
      })(),
      (async function() {
        try {
          var r = await Desktop.listByPath('user', 'planner', { extensions: ['.js'] });
          if (r && r.ok && r.files && r.files.length) {
            var reads = r.files.map(async function(f) {
              try {
                var rr = await Desktop.readByPath('user', f.relativePath || ('planner/' + f.filename));
                if (rr && rr.content) {
                  var m = rr.content.match(/PLANNER_ENTRIES_BY_CLASS\[[^\]]+\]\s*=\s*(\[[\s\S]*?\]);/);
                  if (m) return JSON.parse(m[1]);
                }
              } catch(e) {}
              return [];
            });
            var results = await Promise.all(reads);
            results.forEach(function(arr) { if (Array.isArray(arr)) entries = entries.concat(arr); });
          }
        } catch(e) {}
        if (!entries.length) {
          try {
            var r2 = await Desktop.readByPath('user', 'planner-entries.js');
            if (r2 && r2.content) {
              var m2 = r2.content.match(/PLANNER_ENTRIES\s*=\s*(\[[\s\S]*?\])\s*;/);
              if (m2) entries = JSON.parse(m2[1]);
            }
          } catch(e) {}
        }
      })()
    ]);

    var todayStr = sbTodayStr();
    var count = Number(sbGetPrefs().eventsCount) || 5;
    var slots = [];

    if (cfg && cfg.semesters && cfg.semesters.length) {
      var activeSem = cfg.semesters.find(function(s) { return s.id === cfg.activeSemesterId; }) || cfg.semesters[0];
      var semIdx    = cfg.semesters.indexOf(activeSem);
      var semKey    = semIdx >= 0 ? 'sem' + (semIdx + 1) : null;

      if (activeSem && activeSem.semesterStart && activeSem.semesterEnd) {
        // Build holiday date set
        var holDates = new Set();
        (activeSem.holidays || []).forEach(function(h) {
          if (!h.date) return;
          var hd = new Date(h.date + 'T12:00:00');
          var hEnd = h.dateTo ? new Date(h.dateTo + 'T12:00:00') : hd;
          var d2 = new Date(hd);
          while (d2 <= hEnd) { holDates.add(d2.toISOString().slice(0, 10)); d2.setDate(d2.getDate() + 1); }
        });

        // Entry map keyed by "date|classId"
        var emap = {}, consumed = {};
        entries.forEach(function(e) {
          if (!e || !e.date) return;
          var k = e.date + '|' + (e.classId || '');
          if (!emap[k]) emap[k] = [];
          emap[k].push(e);
        });

        // Iterate days from today to semester end (cap at +120 days to keep it fast)
        var startD = new Date(Math.max(
          new Date(todayStr + 'T12:00:00').getTime(),
          new Date(activeSem.semesterStart + 'T12:00:00').getTime()
        ));
        var endD = new Date(Math.min(
          new Date(activeSem.semesterEnd + 'T12:00:00').getTime(),
          new Date(startD.getTime() + 120 * 86400000).getTime()
        ));

        var d = new Date(startD);
        while (d <= endD) {
          var ds  = d.toISOString().slice(0, 10);
          var dow = d.getDay();
          if (!holDates.has(ds)) {
            Object.keys(cfg.classes || {}).forEach(function(cid) {
              // Skip archived classes
              if ((classMeta[cid] || {}).archived) return;
              // Skip classes disabled in this semester
              if (semKey) {
                var sems = (cfg.classes[cid] || {}).semesters;
                if (sems && sems[semKey] === false) return;
              }
              var sched = (cfg.classes[cid] || {}).schedule || [];
              sched.forEach(function(s) {
                if (parseInt(s.day) !== dow) return;
                var k = ds + '|' + cid;
                consumed[k] = true;
                var entArr = emap[k] || [null];
                entArr.forEach(function(e) {
                  slots.push({
                    date: ds, classId: cid,
                    time: s.time || '', timeEnd: s.timeEnd || '',
                    type: (e && e.type) || 'lesson',
                    topic: (e && e.topic) || ''
                  });
                });
              });
            });
          }
          d.setDate(d.getDate() + 1);
        }

        // Orphan entries (tests, assignments, etc. not on a scheduled slot)
        entries.forEach(function(e) {
          if (!e || !e.date || e.date < todayStr || e.type === 'holiday') return;
          if (e.classId && (classMeta[e.classId] || {}).archived) return;
          var k = e.classId ? (e.date + '|' + e.classId) : (e.date + '|__' + (e.id || ''));
          if (consumed[k]) return;
          if (holDates.has(e.date)) return;
          slots.push({ date: e.date, classId: e.classId || '', time: e.time || '',
                       type: e.type || 'lesson', topic: e.topic || '' });
        });
      }
    } else {
      // No config: fall back to entries only
      entries.forEach(function(e) {
        if (e && e.date && e.date >= todayStr && e.type !== 'holiday' &&
            !(e.classId && (classMeta[e.classId] || {}).archived)) {
          slots.push({ date: e.date, classId: e.classId || '', time: e.time || '',
                       type: e.type || 'lesson', topic: e.topic || '' });
        }
      });
    }

    slots.sort(function(a, b) {
      if (a.date !== b.date) return a.date < b.date ? -1 : 1;
      if (a.time && b.time && a.time !== b.time) return a.time < b.time ? -1 : 1;
      return 0;
    });
    slots = slots.slice(0, count);

    list.innerHTML = '';
    if (!slots.length) {
      list.innerHTML = '<div class="sb-empty">' + escHtml(typeof t === 'function' ? t('sbEmpty') : 'Nothing here yet') + '</div>';
      return;
    }
    slots.forEach(function(s) {
      var ds = sbFormatDate(s.date);
      var isToday = s.date === sbTodayStr(), isTom = s.date === sbTomorrowStr();
      var item = document.createElement('div');
      item.className = 'sb-item';
      var clsName = (classMeta[s.classId] && classMeta[s.classId].name) || s.classId || '';
      item.innerHTML =
        '<div class="sb-item-top">' +
          '<span class="sb-tag ' + sbTypeClass(s.type) + '">' + escHtml(sbTypeLabel(s.type)) + '</span>' +
          '<span class="sb-date' + (isToday ? ' sb-today' : isTom ? ' sb-tomorrow' : '') + '">' + escHtml(ds) + '</span>' +
          (s.time ? '<span class="sb-date"> ' + escHtml(s.time) + '</span>' : '') +
        '</div>' +
        '<div class="sb-name" title="' + escHtml(s.topic || clsName || '') + '">' + escHtml(s.topic || clsName || '—') + '</div>' +
        (s.topic && clsName ? '<div class="sb-meta">' + escHtml(clsName) + '</div>' : '');
      (function(slot) {
        item.addEventListener('click', function() {
          try { localStorage.removeItem('cmt-planner-todo'); localStorage.setItem('cmt-planner-nav', JSON.stringify({ date: slot.date, classId: slot.classId || '', time: slot.time || '' })); } catch(e) {}
          openApp('planner.html');
        });
        if (typeof sbEventAttachCtx === 'function') sbEventAttachCtx(item, slot);
      })(s);
      list.appendChild(item);
    });
  }

  async function sbLoadDocs() {
    var list = document.getElementById('sbDocsList');
    list.innerHTML = '<div class="sb-empty">' + escHtml(typeof t === 'function' ? t('sbLoading') : 'Loading…') + '</div>';
    if (!window.Desktop || !Desktop.isElectron()) {
      list.innerHTML = '<div class="sb-empty">' + escHtml(typeof t === 'function' ? t('sbEmpty') : 'Nothing here yet') + '</div>';
      return;
    }
    var docs = [];
    try {
      var r = await Desktop.listByPath('mindmaps', '', { extensions: ['.js', '.json'] });
      if (r && r.ok && Array.isArray(r.files)) {
        r.files.forEach(function(f) {
          var rel = (f.relativePath || f.filename || '').replace(/\\/g, '/');
          if (rel.indexOf('archived') === -1
              && !/-Autosave\.(js|json)$/i.test(f.filename)
              && !/\.v\d{8}-\d{6}\.(js|json)$/i.test(f.filename)) {
            docs.push(Object.assign({}, f, { _type: 'mindmap' }));
          }
        });
      }
    } catch(e) {}
    try {
      var r2 = await Desktop.listByPath('docEditorDocs', '', { extensions: ['.md', '.html'] });

      var ms = rfFileDateMs(f);
      var dateLbl = ms ? new Date(ms).toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' }) : '';
      var item = document.createElement('div');
      item.className = 'sb-item';
      item.innerHTML =
        '<div class="sb-item-top">' +
          '<span class="sb-tag ' + tagClass + '">' + escHtml(tagLabel) + '</span>' +
          (dateLbl ? '<span class="sb-date">' + escHtml(dateLbl) + '</span>' : '') +
        '</div>' +
        '<div class="sb-name" title="' + escHtml(name) + '">' + escHtml(name) + '</div>';
      (function(fileData) {
        item.addEventListener('click', function() {
          if (!window.Desktop || !Desktop.isElectron()) return;
          if (fileData._type === 'mindmap') {
            Desktop.openTool('board.html', { query: { openSession: '1', openTarget: 'mindmaps', openFilename: fileData.filename, openRelPath: fileData.relativePath || fileData.filename } });
          } else {
            Desktop.openTool('document-editor.html', { query: { editTarget: 'docEditorDocs', editRelPath: fileData.relativePath || fileData.filename } });
          }
        });
        if (typeof sbDocAttachCtx === 'function') sbDocAttachCtx(item, fileData);
      })(f);
      list.appendChild(item);
    });
  }

  function sbOpenPlanner() {
    if (window.Desktop && Desktop.isElectron()) Desktop.openTool('planner.html');
  }

  async function sbLoadTodos() {
    var list = document.getElementById('sbTodoList');
    if (!list) return;
    list.innerHTML = '<div class="sb-empty">' + escHtml(typeof t === 'function' ? t('sbLoading') : 'Loading…') + '</div>';
    if (!window.Desktop || !Desktop.isElectron()) {
      list.innerHTML = '<div class="sb-empty">' + escHtml(typeof t === 'function' ? t('sbEmpty') : 'Nothing here yet') + '</div>';
      return;
    }
    var todos = [];
    try {
      var r = await Desktop.readByPath('user', 'todos.js');
      if (r && r.content) {
        var m = r.content.match(/TODOS\s*=\s*(\[[\s\S]*\])\s*;/);
        if (m) todos = JSON.parse(m[1]);
      }
    } catch(e) {}
    var today = new Date().toISOString().slice(0, 10);
    var active = todos.filter(function(td) { return !td.archivedAt; });
    active.sort(function(a, b) {
      var aOver = a.dueDate && a.dueDate < today;
      var bOver = b.dueDate && b.dueDate < today;
      if (aOver !== bOver) return aOver ? -1 : 1;
      if (a.dueDate && b.dueDate) return a.dueDate < b.dueDate ? -1 : 1;
      if (a.dueDate) return -1;
      if (b.dueDate) return 1;
      return (a.createdAt || 0) - (b.createdAt || 0);
    });
    list.innerHTML = '';
    if (!active.length) {
      list.innerHTML = '<div class="sb-empty">' + escHtml(typeof t === 'function' ? t('sbTodoEmpty') : 'No to-dos yet') + '</div>';
      return;
    }
    active.slice(0, 10).forEach(function(td) {
      var overdue = td.dueDate && td.dueDate < today;
      var item = document.createElement('div');
      item.className = 'sb-item' + (overdue ? ' sb-todo-overdue' : '');
      var dateLbl = td.dueDate ? sbFormatDate(td.dueDate) : '';
      var clsName = td.classId ? ((rfGroupMeta[td.classId] && rfGroupMeta[td.classId].name) || td.classId) : '';
      var subs = Array.isArray(td.subtodos) ? td.subtodos : [];
      var subsHtml = '';
      if (subs.length) {
        subsHtml = '<div class="sb-subtodos">' +
          subs.map(function(st) {
            return '<div class="sb-std-row">' +
              '<span class="sb-std-check' + (st.done ? ' sb-std-checked' : '') + '"></span>' +
              '<span class="sb-std-text' + (st.done ? ' sb-std-done' : '') + '">' + escHtml(st.text || '') + '</span>' +
              '</div>';
          }).join('') +
          '</div>';
      }
      item.innerHTML =
        '<div class="sb-item-top">' +
          (overdue ? '<span class="sb-tag sb-tag-test">' + escHtml(typeof t === 'function' ? t('td_overdue') : 'Overdue') + '</span>' : '') +
          (dateLbl ? '<span class="sb-date">' + escHtml(dateLbl) + '</span>' : '') +
        '</div>' +
        '<div class="sb-name" title="' + escHtml(td.text || '') + '">' + escHtml(td.text || '—') + '</div>' +
        subsHtml +
        (clsName ? '<div class="sb-meta">' + escHtml(clsName) + '</div>' : '');
      item.addEventListener('click', (function(todoId) { return function() {
        if (window.Desktop && Desktop.isElectron()) {
          try { localStorage.removeItem('cmt-planner-nav'); localStorage.setItem('cmt-planner-todo', todoId); } catch(e) {}
          Desktop.openTool('planner.html');
        }
      }; })(td.id));
      list.appendChild(item);
    });
  }

  async function sbLoadAll() {
    // Pre-load group meta so rfPrettyName works in sidebar context menus
    if (window.Desktop && Desktop.isElectron() && Object.keys(rfGroupMeta).length === 0) {
      try {
        var cgr = await Desktop.readByPath('user', 'class-groups.js');
        if (cgr && cgr.content) {

        }

    }

  }

  // ── Count popup ─────────────────────────────────────────
  var _sbCountTarget = null;

  function sbShowCountPopup(btn, target) {
    _sbCountTarget = target;
    _sbCountBtn    = btn;
    var prefs = sbGetPrefs();
    var n = target === 'events' ? (prefs.eventsCount || 5) : (prefs.docsCount || 5);
    var popup = document.getElementById('sbCountPopup');
    document.getElementById('sbCountInput').value = n;
    popup.style.visibility = 'hidden';
    popup.hidden = false;
    var rect = btn.getBoundingClientRect();
    var pw = popup.offsetWidth, ph = popup.offsetHeight;
    var top  = rect.bottom + 6;
    if (top + ph > window.innerHeight - 8) top = rect.top - ph - 6;
    var left = rect.left;
    if (left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
    if (left < 8) left = 8;
    popup.style.top  = top  + 'px';
    popup.style.left = left + 'px';
    popup.style.visibility = '';
    document.getElementById('sbCountInput').focus();
    document.getElementById('sbCountInput').select();
  }

  function sbHideCountPopup() {
    document.getElementById('sbCountPopup').hidden = true;
    _sbCountTarget = null;
    _sbCountBtn    = null;

  function sbApplyCount(val) {
    var n = Math.max(1, Math.min(20, parseInt(val, 10) || 5));
    if (_sbCountTarget === 'events') {
      sbSavePrefs({ eventsCount: n });
      document.getElementById('sbEventsCountBtn').textContent = String(n);
      sbLoadEvents();
    } else if (_sbCountTarget === 'docs') {
      sbSavePrefs({ docsCount: n });
      document.getElementById('sbDocsCountBtn').textContent = String(n);
      sbLoadDocs();
    }
    sbHideCountPopup();
  }

<!-- Context menu for recent files -->
<div id="rfCtxMenu"></div>
<script>
(function() {
  if (!window.Desktop || !Desktop.isElectron()) return;

  var menu = document.getElementById('rfCtxMenu');

  function hideCtx() {
    menu.classList.remove('open');
    menu.innerHTML = '';
  }

  document.addEventListener('pointerdown', function(e) {
    if (menu.classList.contains('open') && !menu.contains(e.target)) hideCtx();
  });
  document.addEventListener('contextmenu', function(e) {
    if (menu.classList.contains('open') && !menu.contains(e.target)) hideCtx();
  });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') hideCtx(); });

  function tl(key, fallback) {
    return (typeof t === 'function') ? t(key) || fallback : fallback;
  }

  function showCtx(x, y, items) {
    hideCtx();
    items.forEach(function(item) {
      if (item === '-') {
        var sep = document.createElement('div');
        sep.className = 'rf-ctx-sep';
        menu.appendChild(sep);
      } else {
        var btn = document.createElement('button');
        btn.className = 'rf-ctx-item' + (item.danger ? ' danger' : '');
        btn.textContent = item.label;
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          hideCtx();
          item.action();
        });
        menu.appendChild(btn);
      }
    });
    menu.classList.add('open');
    var vw = window.innerWidth, vh = window.innerHeight;
    var mw = menu.offsetWidth || 200, mh = menu.offsetHeight || 180;
    var left = x + mw > vw ? Math.max(0, vw - mw - 4) : x;
    var top  = y + mh > vh ? Math.max(0, vh - mh - 4) : y;
    menu.style.left = left + 'px';
    menu.style.top  = top  + 'px';
  }

  /* Wire context menu onto a recent-file row */
  window.rfAttachCtx = function(row, fileObj) {
    row.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      e.stopPropagation();

      var target  = fileObj.target || 'mindmaps';
      var relPath = fileObj.relativePath || fileObj.filename;
      var items = [];

      // Open in Board (session files only)
      var isSess = target === 'mindmaps' || target === 'data';
      if (isSess) {
        items.push({ label: tl('rfOpenInBoard', 'Open in Board ↗'), action: function() {
          Desktop.openTool('board.html', {
            query: { openSession:'1', openTarget: target, openFilename: fileObj.filename, openRelPath: relPath }
          });
        }});
      }

      items.push({ label: tl('fmOpenNative', 'Open with default app'), action: async function() {
        var res = await Desktop.openNative(target, relPath);
        if (res && !res.ok) showToast(tl('fmOpenNativeFailed', 'Could not open file.'), true);
      }});

      items.push({ label: tl('fmShowInFolder', 'Show in folder'), action: function() {
        Desktop.showInFolder(target, relPath);
      }});

      items.push('-');

      items.push({ label: tl('fmRename', 'Rename'), action: async function() {
        var base = (fileObj.filename || '').replace(/\.(js|json)$/i, '');
        var ext  = fileObj.filename.slice(base.length);
        var newBase = await showPrompt(tl('fmRename','Rename'), base);
        if (!newBase || newBase.trim() === '' || newBase.trim() === base) return;
        newBase = newBase.trim();
        if (/[\\/:*?"<>|]/.test(newBase)) {
          showToast(tl('fmRenameInvalidChars', 'Name contains invalid characters.'), true);
          return;
        }
        var newFilename = newBase + ext;
        var dir = relPath.includes('/') ? relPath.slice(0, relPath.lastIndexOf('/') + 1) : '';
        var newRelPath = dir + newFilename;
        try {
          var pathParts = relPath.split('/').filter(Boolean);
          if (target === 'mindmaps' && pathParts.length === 2 && typeof Desktop.listByPath === 'function') {
            var oldFolder = pathParts[0];
            if (oldFolder !== newBase) {
              var fr = await Desktop.renameByPath(target, oldFolder, newBase);
              if (!fr || !fr.ok) throw new Error(fr && fr.error ? fr.error : 'Rename failed.');
            }
            var innerFrom = newBase + '/' + (fileObj.filename || '');
            var innerTo   = newBase + '/' + newFilename;
            if (innerFrom !== innerTo) {
              await Desktop.renameByPath(target, innerFrom, innerTo).catch(function(){});
            }
            var histPath = newBase + '/history';
            try {
              var listed = await Desktop.listByPath(target, histPath, { extensions: ['.js', '.json'], recursive: false });
              var vFiles = (listed && listed.ok && Array.isArray(listed.files)) ? listed.files : [];
              for (var vi = 0; vi < vFiles.length; vi++) {
                var vfname = (vFiles[vi].relativePath || '').split('/').pop() || vFiles[vi].filename || '';
                if (vfname.startsWith(base + '.v')) {
                  var suffix = vfname.slice(base.length);
                  await Desktop.renameByPath(target, histPath + '/' + vfname, histPath + '/' + newBase + suffix).catch(function(){});
                }
              }
            } catch(e) {}
            fileObj.filename = newFilename;
            fileObj.relativePath = newBase + '/' + newFilename;
            rfApplyFilters();
          } else {
            var r = await Desktop.renameByPath(target, relPath, newRelPath);
            if (r && r.ok) {
              fileObj.filename = newFilename;
              fileObj.relativePath = newRelPath;
              rfApplyFilters();
            } else {
              showToast(tl('fmRenameFailed', 'Rename failed.'), true);
            }
          }
        } catch(ex) { showToast(tl('fmRenameFailed', 'Rename failed.'), true); }
      }});

      items.push({ label: tl('fmDelete', 'Delete'), danger: true, action: async function() {
        if (!await showConfirm(tl('fmDeleteConfirm', 'Delete this file? This cannot be undone.'))) return;
        try {
          var r = await Desktop.deleteByPath(target, relPath, { trash: true });
          if (r && r.ok) {
            rfAllFiles        = rfAllFiles.filter(function(x) { return x !== fileObj; });
            rfAllArchivedFiles= rfAllArchivedFiles.filter(function(x) { return x !== fileObj; });
            rfAllDocs         = rfAllDocs.filter(function(x) { return x !== fileObj; });
            rfApplyFilters();
          } else {
            showToast(tl('fmDeleteFailed', 'Delete failed.'), true);
          }
        } catch(ex) { showToast(tl('fmDeleteFailed', 'Delete failed.'), true); }
      }});

      showCtx(e.clientX, e.clientY, items);
    });
  };

  /* ── Sidebar: Recent Docs context menu ── */
  window.sbDocAttachCtx = function(item, fileData) {
    item.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      e.stopPropagation();

      var isMm    = fileData._type === 'mindmap';
      var target  = isMm ? 'mindmaps' : 'docEditorDocs';
      var relPath = fileData.relativePath || fileData.filename;
      var items   = [];

      if (isMm) {
        items.push({ label: tl('rfOpenInBoard', 'Open in Board ↗'), action: function() {
          Desktop.openTool('board.html', { query: { openSession: '1', openTarget: 'mindmaps', openFilename: fileData.filename, openRelPath: relPath } });
        }});
      } else {
        items.push({ label: tl('sbOpenInDocEditor', 'Open in Doc Editor'), action: function() {
          Desktop.openTool('document-editor.html', { query: { editTarget: 'docEditorDocs', editRelPath: relPath } });
        }});
      }

      items.push({ label: tl('fmOpenNative', 'Open with default app'), action: async function() {
        var res = await Desktop.openNative(target, relPath);
        if (res && !res.ok) showToast(tl('fmOpenNativeFailed', 'Could not open file.'), true);
      }});

      items.push({ label: tl('fmShowInFolder', 'Show in folder'), action: function() {
        Desktop.showInFolder(target, relPath);
      }});

      items.push('-');

      items.push({ label: tl('fmRename', 'Rename'), action: async function() {
        var base = isMm
          ? rfPrettyName(fileData.filename)
          : fileData.filename.replace(/\.md$/i, '');
        var ext = fileData.filename.slice(base.length);
        var newBase = await showPrompt(tl('fmRename', 'Rename'), base);
        if (!newBase || newBase.trim() === '' || newBase.trim() === base) return;
        newBase = newBase.trim();
        if (/[\\/:*?"<>|]/.test(newBase)) {
          showToast(tl('fmRenameInvalidChars', 'Name contains invalid characters.'), true);
          return;
        }
        var newFilename = newBase + ext;
        var dir = relPath.includes('/') ? relPath.slice(0, relPath.lastIndexOf('/') + 1) : '';
        var newRelPath = dir + newFilename;
        try {
          var pathParts = relPath.split('/').filter(Boolean);
          if (isMm && pathParts.length === 2 && typeof Desktop.listByPath === 'function') {
            var oldFolder = pathParts[0];
            var oldActualBase = (fileData.filename || '').replace(/\.(js|json)$/i, '');
            if (oldFolder !== newBase) {
              var fr = await Desktop.renameByPath(target, oldFolder, newBase);
              if (!fr || !fr.ok) throw new Error(fr && fr.error ? fr.error : 'Rename failed.');
            }
            var innerFrom = newBase + '/' + (fileData.filename || '');
            var innerTo   = newBase + '/' + newFilename;
            if (innerFrom !== innerTo) {
              await Desktop.renameByPath(target, innerFrom, innerTo).catch(function(){});
            }
            var histPath = newBase + '/history';
            try {
              var listed = await Desktop.listByPath(target, histPath, { extensions: ['.js', '.json'], recursive: false });
              var vFiles = (listed && listed.ok && Array.isArray(listed.files)) ? listed.files : [];
              for (var vi = 0; vi < vFiles.length; vi++) {
                var vfname = (vFiles[vi].relativePath || '').split('/').pop() || vFiles[vi].filename || '';
                if (vfname.startsWith(oldActualBase + '.v')) {
                  var suffix = vfname.slice(oldActualBase.length);
                  await Desktop.renameByPath(target, histPath + '/' + vfname, histPath + '/' + newBase + suffix).catch(function(){});
                }
              }
            } catch(e) {}
            sbLoadDocs();
          } else {
            var r = await Desktop.renameByPath(target, relPath, newRelPath);
            if (r && r.ok) { sbLoadDocs(); }
            else showToast(tl('fmRenameFailed', 'Rename failed.'), true);
          }
        } catch(ex) { showToast(tl('fmRenameFailed', 'Rename failed.'), true); }
      }});

      items.push({ label: tl('fmDelete', 'Delete'), danger: true, action: async function() {
        if (!await showConfirm(tl('fmDeleteConfirm', 'Delete this file? This cannot be undone.'))) return;
        try {
          var r = await Desktop.deleteByPath(target, relPath, { trash: true });
          if (r && r.ok) { sbLoadDocs(); }
          else showToast(tl('fmDeleteFailed', 'Delete failed.'), true);
        } catch(ex) { showToast(tl('fmDeleteFailed', 'Delete failed.'), true); }
      }});

      showCtx(e.clientX, e.clientY, items);
    });
  };

  /* ── Sidebar: Upcoming Events context menu ── */
  window.sbEventAttachCtx = function(item, slot) {
    item.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      e.stopPropagation();
      showCtx(e.clientX, e.clientY, [
        { label: tl('sbOpenInPlanner', 'Open in Planner'), action: function() {
          try { localStorage.removeItem('cmt-planner-todo'); localStorage.setItem('cmt-planner-nav', JSON.stringify({ date: slot.date, classId: slot.classId || '', time: slot.time || '' })); } catch(ex) {}
          openApp('planner.html');
        }}
      ]);
    });
  };
})();
</script>
