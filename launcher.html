<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launcher</title>
  <script src="electron-bridge.js"></script>
  <script>
    // Startup: open configured apps in the background after the launcher renders.
    // Runs once per window session — navigating back to the launcher skips this.
    (function () {
      try {
        if (sessionStorage.getItem('cmt-launcher-started')) return;
        sessionStorage.setItem('cmt-launcher-started', '1');

        var cfg = JSON.parse(localStorage.getItem('cmt-general-config') || '{}');
        var layout  = cfg.startupLayout || 'separate';
        var apps    = Array.isArray(cfg.startupApps) ? cfg.startupApps : [];
        var hasApps = apps.length > 0;
        var isSplit = layout === 'split' && cfg.startupSplitLeft && cfg.startupSplitRight;

        if (!hasApps && !isSplit) return;

        // Wait for the launcher to render, then open apps silently in the background.
        window.addEventListener('DOMContentLoaded', function () {
          setTimeout(async function () {
            try {
              var api = window.electronApi;
              if (!api) return;
              if (isSplit && api.openSplit) {
                await api.openSplit({
                  pageFile1: cfg.startupSplitLeft,
                  pageFile2: cfg.startupSplitRight,
                  fraction:  cfg.startupSplitFraction || 0.5
                });
              } else if (hasApps && api.openTool) {
                var maximize = layout === 'maximize';
                for (var i = 0; i < apps.length; i++) {
                  await api.openTool({ pageFile: apps[i], maximize: maximize });
                }
              }
            } catch (e) {}
          }, 200);
        });
      } catch (e) {}
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #fff;
      color: #000;
      min-height: 100vh;
    }

    .launcher {
      max-width: 1200px;
      margin: 0 auto;
      padding: 44px 24px 60px;
    }

    /* ── Header ─────────────────────────────────────────── */
    .l-header {
      text-align: center;
      margin-bottom: 44px;
    }
    .l-header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.4px;
    }
    .l-header .subtitle {
      margin-top: 8px;
      font-size: 0.93rem;
      font-weight: 600;
      color: #000;
    }
    .l-header-actions {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      justify-content: center;
    }
    .l-header-btn {
      background: #fff;
      border: 2px solid #000;
      border-radius: 7px;
      padding: 7px 16px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      color: #000;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .l-header-btn:hover {
      background: #000;
      color: #fff;
    }

    /* ── Grid ───────────────────────────────────────────── */
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(268px, 1fr));
      gap: 10px;
    }

    /* ── Card ───────────────────────────────────────────── */
    .app-card {
      background: #fff;
      border: 2px solid #000;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: box-shadow 0.14s, transform 0.1s;
    }
    .app-card:hover {
      box-shadow: 4px 4px 0 #000;
      transform: translate(-2px, -2px);
    }
    .app-card.config-open {
      box-shadow: 4px 4px 0 #000;
    }

    .card-body {
      padding: 12px 14px 8px;
      flex: 1;
      cursor: pointer;
      user-select: none;
    }
    .card-body:hover .card-title {
      text-decoration: underline;
    }
    .card-icon {
      font-size: 1.7rem;
      display: block;
      margin-bottom: 6px;
      user-select: none;
    }
    .card-title {
      font-size: 1.06rem;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .card-desc {
      font-size: 0.86rem;
      color: #000;
      font-weight: 500;
      line-height: 1.55;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px 8px;
      border-top: 1.5px solid #000;
    }
    .card-gear-btn {
      background: none;
      border: 1.5px solid #000;
      cursor: pointer;
      color: #000;
      font-size: 1.05rem;
      padding: 4px 7px;
      border-radius: 5px;
      line-height: 1;
      transition: background 0.1s, color 0.1s;
    }
    .card-gear-btn:hover {
      background: #000;
      color: #fff;
    }
    .card-gear-btn.active {
      background: #000;
      color: #fff;
    }

    /* ── Config popup ───────────────────────────────────── */
    .cfg-popup {
      position: fixed;
      z-index: 1000;
      background: #fff;
      border: 2px solid #000;
      border-radius: 8px;
      box-shadow: 4px 4px 0 #000;
      width: 280px;
      padding: 14px 16px 16px;
    }
    .cfg-label {
      display: block;
      font-size: 0.71rem;
      font-weight: 800;
      color: #000;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 4px;
    }
    .cfg-input {
      width: 100%;
      border: 2px solid #000;
      border-radius: 5px;
      padding: 6px 9px;
      font-family: inherit;
      font-size: 0.88rem;
      color: #000;
      background: #fff;
      margin-bottom: 12px;
      transition: box-shadow 0.1s;
    }
    .cfg-input:focus {
      outline: none;
      box-shadow: 2px 2px 0 #000;
    }
    .cfg-notes {
      resize: vertical;
      min-height: 54px;
      margin-bottom: 0;
    }
    .cfg-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    .cfg-row > div { flex: 1; }
    .cfg-row .cfg-input { margin-bottom: 0; }
  </style>
</head>
<body>
<div id="cfgPopup" class="cfg-popup" hidden>
  <label class="cfg-label">Custom label</label>
  <input class="cfg-input cfg-label-input" type="text" placeholder="">
  <label class="cfg-label">Personal notes</label>
  <textarea class="cfg-input cfg-notes" rows="3" placeholder="Notes or reminders about this tool..."></textarea>
  <div class="cfg-row">
    <div>
      <label class="cfg-label">Size (%)</label>
      <input class="cfg-input cfg-size-input" type="number" min="20" max="100" step="5" placeholder="Default">
    </div>
    <div>
      <label class="cfg-label">Position</label>
      <select class="cfg-input cfg-pos-select">
        <option value="">Default</option>
        <option value="center">Center</option>
        <option value="top-left">Top-left</option>
        <option value="top-right">Top-right</option>
        <option value="bottom-left">Bottom-left</option>
        <option value="bottom-right">Bottom-right</option>
        <option value="left">Left (full height)</option>
        <option value="right">Right (full height)</option>
      </select>
    </div>
  </div>
</div>
<div class="launcher">
  <header class="l-header">
    <h1 id="appTitle">Class Management Tools</h1>
    <p class="subtitle">Select a tool to get started</p>
    <div class="l-header-actions">
      <button class="l-header-btn" onclick="openApp('general-config.html')" title="General settings">⚙ Config</button>
      <button class="l-header-btn" onclick="openApp('how-to.html')" title="How to use this app">? How To</button>
      <button class="l-header-btn" onclick="openApp('credits.html')" title="Credits">ℹ️ Credits</button>
    </div>
  </header>
  <div class="apps-grid" id="appsGrid"></div>
</div>

<script>
  const APPS = [
    {
      id: 'board',
      pageFile: 'board.html',
      icon: '🖥',
      title: 'Board',
      desc: 'Interactive classroom display for activities, group games, timers, and constellation mind maps.'
    },
    {
      id: 'classManagement',
      pageFile: 'class-management.html',
      icon: '👥',
      title: 'Class Management',
      desc: 'Manage class groups, track participation, and export session data for individual classes.'
    },
    {
      id: 'participationTracker',
      pageFile: 'participation-tracker.html',
      icon: '✅',
      title: 'Participation Tracker',
      desc: 'Track and log individual and group participation scores across sessions.'
    },
    {
      id: 'gradeSheet',
      pageFile: 'grade-sheet.html',
      icon: '📊',
      title: 'Grade Sheet',
      desc: 'Record, view, and export student grades and assessments by class.'
    },
    {
      id: 'groupEditor',
      pageFile: 'group-editor.html',
      icon: '✏️',
      title: 'Group Editor',
      desc: 'Create, edit, archive, and delete class groups stored in class-groups.js.'
    },
    {
      id: 'learningTools',
      pageFile: 'learning-tools.html',
      icon: '📖',
      title: 'Learning Tools',
      desc: 'Vocabulary, word work, grammar practice, and custom activity presentation for the classroom.'
    },
    {
      id: 'manageDatabase',
      pageFile: 'manage-database.html',
      icon: '🗂',
      title: 'Manage Database',
      desc: 'Create and edit custom word banks, dictations, grammar banks, stories, and quiz content.'
    },
    {
      id: 'generalConfig',
      pageFile: 'general-config.html',
      icon: '⚙',
      title: 'General Config',
      desc: 'Set the app title, configure data and backup folders, and adjust launcher preferences.'
    },
    {
      id: 'recentFiles',
      pageFile: 'recent-files.html',
      icon: '📂',
      title: 'Recent Files',
      desc: 'Browse and reopen recent constellation maps, board sessions, and analyses.'
    }
  ];

  function getCardConfig(id) {
    try { return JSON.parse(localStorage.getItem('cmt-card-config-' + id) || '{}'); } catch { return {}; }
  }

  function saveCardConfig(id, data) {
    localStorage.setItem('cmt-card-config-' + id, JSON.stringify(data));
  }

  function getGeneralConfig() {
    try { return JSON.parse(localStorage.getItem('cmt-general-config') || '{}'); } catch { return {}; }
  }

  function applyTitle() {
    const cfg = getGeneralConfig();
    const title = (cfg.appTitle && cfg.appTitle.trim()) || 'Class Management Tools';
    document.getElementById('appTitle').textContent = title;
    document.title = title;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function openApp(pageFile, cardCfg) {
    if (window.Desktop && Desktop.isElectron()) {
      const opts = {};
      const size = cardCfg ? Number(cardCfg.windowSize) : 0;
      if (size >= 20 && size <= 100) opts.windowSizeRatio = size / 100;
      if (cardCfg && cardCfg.windowPosition) opts.windowPosition = cardCfg.windowPosition;
      Desktop.openTool(pageFile, opts);
    } else {
      window.location.href = pageFile;
    }
  }

  function buildCard(app) {
    const cfg = getCardConfig(app.id);
    const label = (cfg.customLabel && cfg.customLabel.trim()) || app.title;

    const card = document.createElement('div');
    card.className = 'app-card';
    card.dataset.id = app.id;

    card.innerHTML =
      '<div class="card-body">' +
        '<span class="card-icon" aria-hidden="true">' + app.icon + '</span>' +
        '<div class="card-title">' + escHtml(label) + '</div>' +
        '<div class="card-desc">' + escHtml(app.desc) + '</div>' +
      '</div>' +
      '<div class="card-footer">' +
        '<button class="card-gear-btn" title="Card settings" aria-label="Card settings">⚙</button>' +
      '</div>';

    const cardBody = card.querySelector('.card-body');
    const gearBtn = card.querySelector('.card-gear-btn');

    cardBody.addEventListener('click', function () {
      openApp(app.pageFile, getCardConfig(app.id));
    });

    gearBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      const popup = document.getElementById('cfgPopup');
      if (!popup.hidden && currentGearBtn === gearBtn) {
        closePopup();
      } else {
        showPopup(gearBtn, card, app);
      }
    });

    return card;
  }

  let currentPopupApp = null;
  let currentGearBtn  = null;
  let currentCard     = null;

  function showPopup(gearBtn, card, app) {
    const popup = document.getElementById('cfgPopup');
    currentPopupApp = app;
    currentGearBtn  = gearBtn;
    currentCard     = card;

    const cfg = getCardConfig(app.id);
    popup.querySelector('.cfg-label-input').placeholder = app.title + ' (default)';
    popup.querySelector('.cfg-label-input').value = cfg.customLabel || '';
    popup.querySelector('.cfg-notes').value        = cfg.notes || '';
    popup.querySelector('.cfg-size-input').value   = cfg.windowSize || '';
    popup.querySelector('.cfg-pos-select').value   = cfg.windowPosition || '';

    // Measure off-screen then position
    popup.style.visibility = 'hidden';
    popup.hidden = false;

    const rect   = gearBtn.getBoundingClientRect();
    const pw     = popup.offsetWidth;
    const ph     = popup.offsetHeight;
    let top  = rect.top - ph - 8;
    if (top < 8) top = rect.bottom + 8;
    let left = rect.left;
    if (left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
    if (left < 8) left = 8;

    popup.style.top  = top  + 'px';
    popup.style.left = left + 'px';
    popup.style.visibility = '';

    gearBtn.classList.add('active');
    card.classList.add('config-open');
  }

  function closePopup() {
    const popup = document.getElementById('cfgPopup');
    popup.hidden = true;
    if (currentGearBtn) currentGearBtn.classList.remove('active');
    if (currentCard)    currentCard.classList.remove('config-open');
    currentPopupApp = null;
    currentGearBtn  = null;
    currentCard     = null;
  }

  function persistPopupConfig() {
    if (!currentPopupApp) return;
    const popup = document.getElementById('cfgPopup');
    const labelVal = popup.querySelector('.cfg-label-input').value;
    saveCardConfig(currentPopupApp.id, {
      customLabel:    labelVal,
      notes:          popup.querySelector('.cfg-notes').value,
      windowSize:     popup.querySelector('.cfg-size-input').value,
      windowPosition: popup.querySelector('.cfg-pos-select').value
    });
    if (currentCard) {
      currentCard.querySelector('.card-title').textContent = labelVal.trim() || currentPopupApp.title;
    }
  }

  document.addEventListener('mousedown', function (e) {
    const popup = document.getElementById('cfgPopup');
    if (!popup.hidden && !popup.contains(e.target) && e.target !== currentGearBtn) {
      closePopup();
    }
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closePopup();
  });

  async function init() {
    if (window.Desktop && Desktop.isElectron() && typeof Desktop.readJson === 'function') {
      try {
        const fileResult = await Desktop.readJson('user', 'general-config-settings.js');
        if (fileResult && fileResult.ok && fileResult.data && typeof fileResult.data === 'object') {
          localStorage.setItem('cmt-general-config', JSON.stringify(fileResult.data));
        }
      } catch (e) { console.warn('launcher: could not read general-config from file:', e); }
    }
    const popup = document.getElementById('cfgPopup');
    popup.querySelector('.cfg-label-input').addEventListener('input',  persistPopupConfig);
    popup.querySelector('.cfg-notes').addEventListener('input',        persistPopupConfig);
    popup.querySelector('.cfg-size-input').addEventListener('input',   persistPopupConfig);
    popup.querySelector('.cfg-pos-select').addEventListener('change',  persistPopupConfig);

    applyTitle();
    const grid = document.getElementById('appsGrid');
    APPS.forEach(function (app) { grid.appendChild(buildCard(app)); });

    window.addEventListener('storage', function (e) {
      if (e.key === 'cmt-general-config') applyTitle();
    });
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
